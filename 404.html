<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — GigLega</title>
  <link rel="stylesheet" href="src/styles.css" />
  <link rel="stylesheet" href="src/theme-dark.css" />
  <style>
    body{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0f0f0f;margin:0;font-family:system-ui,sans-serif}
    .wrap{text-align:center;padding:40px 24px;max-width:420px}
    .code{font-size:6rem;font-weight:900;color:#0d9488;line-height:1;margin-bottom:8px;letter-spacing:-4px}
    .msg{font-size:1.15rem;font-weight:700;color:#f0f0f0;margin-bottom:10px}
    .sub{font-size:.85rem;color:#888;margin-bottom:32px;line-height:1.6}
    .actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
    .btn-p{background:#0d9488;color:#fff;padding:11px 24px;border-radius:10px;font-weight:700;font-size:.9rem;text-decoration:none;transition:.15s}
    .btn-p:hover{background:#0b7a70}
    .btn-g{background:transparent;color:#0d9488;padding:11px 24px;border-radius:10px;font-weight:700;font-size:.9rem;text-decoration:none;border:1.5px solid #0d9488;transition:.15s}
    .btn-g:hover{background:rgba(13,148,136,.1)}
    .logo{font-size:1.1rem;font-weight:800;color:#0d9488;margin-bottom:36px;letter-spacing:-.5px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">GigLega</div>
    <div class="code">404</div>
    <div class="msg">Page not found</div>
    <div class="sub">The page you're looking for doesn't exist or may have moved. Don't worry — there are plenty of gigs waiting for you.</div>
    <div class="actions">
      <a href="src/index.html" class="btn-p">🏠 Go Home</a>
      <a href="src/browse.html" class="btn-g">🔍 Browse Gigs</a>
    </div>
  </div>
</body>
</html>
