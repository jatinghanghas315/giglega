<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - GigLega</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body style="background: var(--bg)">
    <header>
      <nav class="container nav-container">
        <a href="index.html" class="logo">Gig<span>Lega</span></a>
        <div class="nav-links">
          <a href="index.html">Home</a>
          <a href="browse.html">Browse Gigs</a>
          <a href="post-gig.html">Post a Gig</a>
          <a href="login.html" class="active">Login</a>
          <a href="signup.html" class="btn btn-primary">Sign Up</a>
        </div>
      </nav>
    </header>

    <main>
      <section class="section">
        <div class="container" style="max-width: 450px">
          <div class="card">
            <h1
              style="
                margin-bottom: 0.5rem;
                color: var(--primary);
                text-align: center;
              "
            >
              Welcome Back
            </h1>
            <p
              style="
                margin-bottom: 2rem;
                color: var(--secondary);
                text-align: center;
              "
            >
              Login to your GigLega account.
            </p>

            <form id="loginForm">
              <div class="form-group">
                <label for="email">Phone or Email</label>
                <input
                  type="text"
                  id="email"
                  placeholder="91XXXXXXXX or email"
                  required
                />
              </div>

              <div class="form-group">
                <label for="password">Password</label>
                <input
                  type="password"
                  id="password"
                  placeholder="Enter your password"
                  required
                />
              </div>

              <div
                style="
                  display: flex;
                  justify-content: space-between;
                  align-items: center;
                  margin-bottom: 1.5rem;
                "
              >
                <label
                  style="
                    display: flex;
                    align-items: center;
                    gap: 0.5rem;
                    font-size: 0.9rem;
                    font-weight: normal;
                    color: var(--secondary);
                  "
                >
                  <input type="checkbox" /> Remember me
                </label>
                <a
                  href="#"
                  style="
                    color: var(--primary);
                    font-size: 0.9rem;
                    text-decoration: none;
                  "
                  >Forgot Password?</a
                >
              </div>

              <button
                type="submit"
                class="btn btn-primary"
                style="width: 100%; padding: 0.8rem; font-size: 1rem"
              >
                Login Now
              </button>
            </form>

            <p
              style="
                text-align: center;
                margin-top: 1.5rem;
                color: var(--secondary);
              "
            >
              New to GigLega?
              <a
                href="signup.html"
                style="
                  color: var(--primary);
                  font-weight: 500;
                  text-decoration: none;
                "
                >Create an account</a
              >
            </p>
          </div>
        </div>
      </section>
    </main>

    <script>
      document.getElementById("loginForm").addEventListener("submit", (e) => {
        e.preventDefault();
        alert("Aap login ho gaye hain! (Login successful)");
        window.location.href = "index.html";
      });
    </script>
  </body>
</html>
