<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browse Gigs — GigLega</title>
  <meta name="description" content="Gurugram ke best gigs browse karo. Hyperlocal aur remote dono available. Abhi apply karo." />
  <link rel="stylesheet" href="styles.css" />
  <script defer src="shared.js"></script>
  <style>
    /* ── Page layout ── */
    .browse-wrap{max-width:1100px;margin:0 auto;padding:32px 16px 80px}
    .browse-hero{margin-bottom:28px}
    .browse-hero h1{font-size:1.7rem;font-weight:800;color:var(--primary);margin-bottom:4px}
    .browse-hero p{color:var(--gray-500);font-size:.95rem}

    /* ── Filter bar ── */
    .filter-bar{background:var(--surface);border:1px solid var(--gray-200);border-radius:var(--radius);padding:18px 20px;margin-bottom:24px;box-shadow:var(--shadow-sm)}
    .filter-row{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
    .filter-row:last-child{margin-bottom:0}

    /* Search */
    .search-wrap{position:relative;flex:1;min-width:220px}
    .search-wrap input{width:100%;padding:10px 14px 10px 38px;border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);font-size:.93rem;background:var(--surface);color:var(--text);font-family:inherit;transition:border .2s;box-sizing:border-box}
    .search-wrap input:focus{outline:none;border-color:var(--teal)}
    .search-wrap .search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:1rem;pointer-events:none}

    /* Type toggle */
    .type-toggle{display:flex;gap:8px}
    .type-pill{padding:9px 20px;border-radius:20px;border:1.5px solid var(--gray-200);background:var(--surface);color:var(--gray-600);font-weight:600;font-size:.87rem;cursor:pointer;transition:all .2s;white-space:nowrap}
    .type-pill.active{border-color:var(--teal);background:var(--teal);color:#fff}
    .type-pill:hover:not(.active){border-color:var(--teal);color:var(--teal)}

    /* Category chips */
    .cat-chips{display:flex;gap:8px;flex-wrap:wrap}
    .cat-chip{padding:7px 16px;border-radius:20px;border:1.5px solid var(--gray-200);background:var(--surface);color:var(--gray-600);font-size:.82rem;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap}
    .cat-chip.active{border-color:var(--primary);background:var(--primary);color:#fff}
    .cat-chip:hover:not(.active){border-color:var(--primary);color:var(--primary)}

    /* Results count */
    .results-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px}
    .results-count{font-size:.88rem;color:var(--gray-500)}
    .results-count strong{color:var(--primary)}

    /* ── Gig Grid ── */
    .gig-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}

    /* ── Gig Card ── */
    .gig-card{background:var(--surface);border:1.5px solid var(--gray-200);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow-sm);transition:transform .2s,box-shadow .2s,opacity .3s;position:relative;display:flex;flex-direction:column}
    .gig-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-md)}
    .gig-card.taken{opacity:.55;pointer-events:none}
    .gig-card.taken-flash{border-color:var(--danger)!important}

    /* Status badge */
    .gig-status-badge{position:absolute;top:14px;right:14px;padding:4px 10px;border-radius:12px;font-size:.72rem;font-weight:700;letter-spacing:.3px}
    .badge-open{background:rgba(16,185,129,.12);color:#059669}
    .badge-taken{background:rgba(239,68,68,.12);color:#dc2626}

    /* Type tag */
    .gig-type-tag{display:inline-block;font-size:.72rem;font-weight:700;padding:3px 10px;border-radius:10px;margin-bottom:10px}
    .tag-hyperlocal{background:rgba(245,158,11,.12);color:#b45309}
    .tag-remote{background:rgba(99,102,241,.12);color:#4338ca}

    /* Card body */
    .gig-cat{font-size:.78rem;color:var(--gray-400);margin-bottom:4px}
    .gig-title{font-size:1rem;font-weight:700;color:var(--text);margin-bottom:8px;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .gig-desc{font-size:.82rem;color:var(--gray-500);line-height:1.5;margin-bottom:12px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

    .gig-meta{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
    .gig-meta-item{display:flex;align-items:center;gap:4px;font-size:.78rem;color:var(--gray-500)}

    /* Price row */
    .gig-price-row{display:flex;align-items:baseline;gap:8px;margin-bottom:6px}
    .gig-price{font-size:1.2rem;font-weight:800;color:var(--primary)}
    .gig-price-unit{font-size:.78rem;color:var(--gray-400)}

    /* Earnings strip */
    .gig-earn-strip{background:linear-gradient(90deg,rgba(13,148,136,.08) 0%,rgba(26,60,94,.06) 100%);border:1px solid rgba(13,148,136,.2);border-radius:8px;padding:8px 12px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
    .gig-earn-label{font-size:.75rem;color:var(--gray-500)}
    .gig-earn-val{font-size:.9rem;font-weight:800;color:var(--teal)}

    /* Taken countdown */
    .taken-bar{height:3px;background:var(--danger);border-radius:2px;margin-bottom:10px;display:none}
    .taken-bar.show{display:block}
    .taken-bar-inner{height:100%;background:var(--danger);border-radius:2px;width:100%;transition:width linear}

    /* Action button */
    .btn-accept{width:100%;padding:11px;background:linear-gradient(135deg,var(--primary) 0%,var(--teal) 100%);color:#fff;border:none;border-radius:var(--radius-sm);font-weight:700;font-size:.9rem;cursor:pointer;transition:opacity .2s,transform .15s;margin-top:auto}
    .btn-accept:hover{opacity:.9;transform:translateY(-1px)}
    .btn-accept:disabled{opacity:.5;cursor:not-allowed;transform:none}
    .btn-taken{width:100%;padding:11px;background:var(--gray-200);color:var(--gray-500);border:none;border-radius:var(--radius-sm);font-weight:700;font-size:.9rem;cursor:not-allowed;margin-top:auto}

    /* Empty state */
    .empty-state{text-align:center;padding:64px 24px;color:var(--gray-400)}
    .empty-state .empty-icon{font-size:3.5rem;margin-bottom:16px}
    .empty-state h3{font-size:1.1rem;font-weight:700;color:var(--gray-600);margin-bottom:8px}
    .empty-state p{font-size:.88rem;line-height:1.6}

    /* Loading skeleton */
    .skeleton-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
    .skeleton-card{background:var(--surface);border:1.5px solid var(--gray-200);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow-sm)}
    .skel{background:var(--gray-100);border-radius:6px;animation:skel-pulse 1.4s ease-in-out infinite}
    .skel-title{height:18px;width:70%;margin-bottom:10px}
    .skel-line{height:12px;width:100%;margin-bottom:8px}
    .skel-line.w60{width:60%}
    .skel-btn{height:40px;width:100%;margin-top:16px;border-radius:var(--radius-sm)}
    @keyframes skel-pulse{0%,100%{opacity:1}50%{opacity:.45}}

    /* Dark mode */
    [data-theme=dark] .filter-bar{border-color:var(--gray-700)}
    [data-theme=dark] .gig-card{border-color:var(--gray-700)}
    [data-theme=dark] .type-pill{border-color:var(--gray-600);color:var(--gray-300);background:var(--gray-800)}
    [data-theme=dark] .cat-chip{border-color:var(--gray-600);color:var(--gray-300);background:var(--gray-800)}
    [data-theme=dark] .cat-chip.active{background:var(--primary);border-color:var(--primary);color:#fff}
    [data-theme=dark] .search-wrap input{border-color:var(--gray-600);background:var(--gray-800)}
    [data-theme=dark] .btn-taken{background:var(--gray-700);color:var(--gray-500)}
    [data-theme=dark] .skel{background:var(--gray-700)}
    [data-theme=dark] .skeleton-card{border-color:var(--gray-700)}
    [data-theme=dark] .gig-earn-strip{background:rgba(13,148,136,.1);border-color:rgba(13,148,136,.25)}
  </style>
</head>
<body>
  <div id="announce-bar"></div>
  <nav id="main-nav"></nav>

  <main class="page-wrapper">
    <div class="browse-wrap">

      <div class="browse-hero">
        <h1>🔍 Browse Gigs</h1>
        <p>Find work near you — accept a gig and start earning today.</p>
      </div>

      <nav id="breadcrumb" aria-label="breadcrumb"></nav>

      <!-- Filter Bar -->
      <div class="filter-bar">
        <div class="filter-row">
          <!-- Search -->
          <div class="search-wrap">
            <span class="search-icon">🔎</span>
            <input type="text" id="searchInput" placeholder="Search gigs, skills, locations..." />
          </div>
          <!-- Type toggle -->
          <div class="type-toggle">
            <button type="button" class="type-pill active" id="pillAll">All</button>
            <button type="button" class="type-pill" id="pillHyperlocal">📍 Hyperlocal</button>
            <button type="button" class="type-pill" id="pillRemote">💻 Remote</button>
          </div>
        </div>
        <!-- Category chips -->
        <div class="filter-row">
          <div class="cat-chips" id="catChips"></div>
        </div>
      </div>

      <!-- Results meta -->
      <div class="results-meta">
        <div class="results-count" id="resultsCount"></div>
        <div style="font-size:.78rem;color:var(--gray-400)">
          Gigs disappear once a worker accepts them
        </div>
      </div>

      <!-- Gig Grid -->
      <div id="gigGrid"></div>

    </div>
  </main>

  <footer id="main-footer"></footer>
  <div id="toast-container"></div>

  <script>
  (function () {

    var CATS = {
      hyperlocal: [
        { value:"house-help",    label:"🧹 House Help" },
        { value:"errands",       label:"🛒 Errands" },
        { value:"moving-help",   label:"📦 Moving Help" },
        { value:"handyman",      label:"🔧 Handyman" },
        { value:"tech-help",     label:"💻 Tech Help" },
        { value:"elderly-care",  label:"🧓 Elderly Care" },
        { value:"pet-care",      label:"🐕 Pet Care" },
        { value:"tutoring",      label:"📚 Tutoring" },
        { value:"event-help",    label:"🎉 Event Help" },
        { value:"gardening",     label:"🏡 Gardening" },
        { value:"deep-cleaning", label:"🧼 Deep Cleaning" },
        { value:"driver",        label:"🚗 Driver" }
      ],
      remote: [
        { value:"logo-design",     label:"🎨 Logo Design" },
        { value:"video-editing",   label:"🎬 Video Editing" },
        { value:"web-dev",         label:"🌐 Web Dev" },
        { value:"content-writing", label:"✍️ Content Writing" },
        { value:"social-media",    label:"📱 Social Media" },
        { value:"data-entry",      label:"📊 Data Entry" },
        { value:"graphic-design",  label:"🖼️ Graphic Design" },
        { value:"voiceover",       label:"🎙️ Voiceover" },
        { value:"translation",     label:"🌍 Translation" },
        { value:"customer-support",label:"🎧 Customer Support" }
      ]
    };

    var FEE_RATE   = 0.06;
    var TAKEN_SHOW = 30000; // 30 seconds before card vanishes
    var GIG_KEY    = (typeof GL !== "undefined" && GL.STORAGE_KEY_GIGS) ? GL.STORAGE_KEY_GIGS : "gl_gigs";

    var currentType = "all";
    var currentCat  = "all";
    var searchQuery = "";
    var takenTimers = {};

    /* ── DOM refs ── */
    var gigGrid    = document.getElementById("gigGrid");
    var searchInput= document.getElementById("searchInput");
    var catChipsEl = document.getElementById("catChips");
    var resultsCount = document.getElementById("resultsCount");

    /* ── Breadcrumb ── */
    if (typeof buildBreadcrumb === "function") {
      buildBreadcrumb("breadcrumb", [
        { label: "Home", href: "index.html" },
        { label: "Browse Gigs" }
      ]);
    }

    /* ═══════════════════════════════════════
       TYPE TOGGLE
    ═══════════════════════════════════════ */
    document.getElementById("pillAll").addEventListener("click", function () { setType("all"); });
    document.getElementById("pillHyperlocal").addEventListener("click", function () { setType("hyperlocal"); });
    document.getElementById("pillRemote").addEventListener("click", function () { setType("remote"); });

    function setType(type) {
      currentType = type;
      currentCat  = "all";
      document.getElementById("pillAll").classList.toggle("active", type === "all");
      document.getElementById("pillHyperlocal").classList.toggle("active", type === "hyperlocal");
      document.getElementById("pillRemote").classList.toggle("active", type === "remote");
      buildCatChips();
      render();
    }

    /* ═══════════════════════════════════════
       CATEGORY CHIPS
    ═══════════════════════════════════════ */
    function buildCatChips() {
      catChipsEl.innerHTML = "";

      var allChip = document.createElement("button");
      allChip.type = "button";
      allChip.className = "cat-chip" + (currentCat === "all" ? " active" : "");
      allChip.textContent = "All";
      allChip.addEventListener("click", function () { setCat("all"); });
      catChipsEl.appendChild(allChip);

      var list = currentType === "all"
        ? CATS.hyperlocal.concat(CATS.remote)
        : (CATS[currentType] || []);

      list.forEach(function (c) {
        var chip = document.createElement("button");
        chip.type = "button";
        chip.className = "cat-chip" + (currentCat === c.value ? " active" : "");
        chip.textContent = c.label;
        chip.addEventListener("click", function () { setCat(c.value); });
        catChipsEl.appendChild(chip);
      });
    }

    function setCat(val) {
      currentCat = val;
      document.querySelectorAll(".cat-chip").forEach(function (ch) {
        ch.classList.toggle("active", ch.textContent.trim() === (val === "all" ? "All" : getCatLabel(val)));
      });
      render();
    }

    function getCatLabel(val) {
      var all = CATS.hyperlocal.concat(CATS.remote);
      var found = all.find(function (c) { return c.value === val; });
      return found ? found.label : val;
    }

    /* ═══════════════════════════════════════
       SEARCH
    ═══════════════════════════════════════ */
    searchInput.addEventListener("input", function () {
      searchQuery = searchInput.value.trim().toLowerCase();
      render();
    });

    /* ═══════════════════════════════════════
       DATA
    ═══════════════════════════════════════ */
    function getGigs() {
      return JSON.parse(localStorage.getItem(GIG_KEY) || "[]");
    }

    function saveGigs(gigs) {
      localStorage.setItem(GIG_KEY, JSON.stringify(gigs));
    }

    function getFilteredGigs() {
      var gigs = getGigs();

      // Exclude fully vanished (taken + past 30s window)
      var now = Date.now();
      gigs = gigs.filter(function (g) {
        if (g.status === "taken" && g.takenAt) {
          var elapsed = now - new Date(g.takenAt).getTime();
          return elapsed < TAKEN_SHOW;
        }
        if (g.status === "completed") return false;
        return true;
      });

      // Type filter
      if (currentType !== "all") {
        gigs = gigs.filter(function (g) { return g.type === currentType; });
      }
      // Category filter
      if (currentCat !== "all") {
        gigs = gigs.filter(function (g) { return g.category === currentCat; });
      }
      // Search
      if (searchQuery) {
        gigs = gigs.filter(function (g) {
          return (
            g.title.toLowerCase().includes(searchQuery) ||
            (g.description || "").toLowerCase().includes(searchQuery) ||
            (g.location || "").toLowerCase().includes(searchQuery) ||
            (g.categoryLabel || "").toLowerCase().includes(searchQuery)
          );
        });
      }
      return gigs;
    }

    /* ═══════════════════════════════════════
       TIME AGO
    ═══════════════════════════════════════ */
    function timeAgo(isoStr) {
      var diff = Math.floor((Date.now() - new Date(isoStr).getTime()) / 1000);
      if (diff < 60)  return diff + "s ago";
      if (diff < 3600) return Math.floor(diff / 60) + "m ago";
      if (diff < 86400) return Math.floor(diff / 3600) + "h ago";
      return Math.floor(diff / 86400) + "d ago";
    }

    /* ═══════════════════════════════════════
       RENDER
    ═══════════════════════════════════════ */
    function render() {
      var gigs = getFilteredGigs();

      // Update count
      var openCount = gigs.filter(function (g) { return g.status === "open"; }).length;
      resultsCount.innerHTML = "<strong>" + gigs.length + "</strong> gig" + (gigs.length !== 1 ? "s" : "") + " found" +
        (openCount < gigs.length ? " (<span style='color:var(--teal)'>" + openCount + " open</span>)" : "");

      if (gigs.length === 0) {
        gigGrid.innerHTML = '<div class="empty-state">' +
          '<div class="empty-icon">🔍</div>' +
          '<h3>Koi gig nahi mila!</h3>' +
          '<p>No gigs match your filters right now.<br>Try changing the category or check back soon.</p>' +
          '<a href="post-gig.html" class="btn btn-primary" style="margin-top:16px;display:inline-block">+ Post a Gig</a>' +
          '</div>';
        return;
      }

      gigGrid.className = "gig-grid";
      gigGrid.innerHTML = "";
      gigs.forEach(function (gig) { gigGrid.appendChild(buildCard(gig)); });
    }

    /* ═══════════════════════════════════════
       BUILD CARD
    ═══════════════════════════════════════ */
    function buildCard(gig) {
      var isTaken = gig.status === "taken";
      var fee     = Math.round(gig.pricePerHr * FEE_RATE);
      var earn    = gig.pricePerHr - fee;
      var payIcon = gig.payType === "cash" ? "💵" : gig.payType === "wallet" ? "🔒" : "✅";

      var card = document.createElement("div");
      card.className = "gig-card" + (isTaken ? " taken taken-flash" : "");
      card.dataset.gigId = gig.id;

      // Countdown bar (only for taken)
      var barHtml = "";
      if (isTaken) {
        barHtml = '<div class="taken-bar show" id="bar_' + gig.id + '">' +
                  '<div class="taken-bar-inner" id="barInner_' + gig.id + '"></div></div>';
      }

      var typeTag = gig.type === "hyperlocal"
        ? '<span class="gig-type-tag tag-hyperlocal">📍 Hyperlocal</span>'
        : '<span class="gig-type-tag tag-remote">💻 Remote</span>';

      var statusBadge = isTaken
        ? '<span class="gig-status-badge badge-taken">🔒 Taken</span>'
        : '<span class="gig-status-badge badge-open">🟢 Open</span>';

      var actionBtn = isTaken
        ? '<button class="btn-taken" disabled>🔒 Already Taken</button>'
        : '<button class="btn-accept" data-id="' + gig.id + '">⚡ Accept Gig</button>';

      card.innerHTML =
        barHtml +
        statusBadge +
        typeTag +
        '<div class="gig-cat">' + (gig.categoryLabel || gig.category) + '</div>' +
        '<div class="gig-title">' + escHtml(gig.title) + '</div>' +
        '<div class="gig-desc">' + escHtml(gig.description || "") + '</div>' +
        '<div class="gig-meta">' +
          (gig.location ? '<span class="gig-meta-item">📍 ' + escHtml(gig.location) + '</span>' : '') +
          '<span class="gig-meta-item">🕒 ' + timeAgo(gig.postedAt) + '</span>' +
          '<span class="gig-meta-item">' + payIcon + ' ' + payLabel(gig.payType) + '</span>' +
        '</div>' +
        '<div class="gig-price-row">' +
          '<span class="gig-price">₹' + gig.pricePerHr + '</span>' +
          '<span class="gig-price-unit">/ hour</span>' +
        '</div>' +
        '<div class="gig-earn-strip">' +
          '<span class="gig-earn-label">You receive (after 6% support fee)</span>' +
          '<span class="gig-earn-val">₹' + earn + '/hr</span>' +
        '</div>' +
        actionBtn;

      // Accept handler
      if (!isTaken) {
        card.querySelector(".btn-accept").addEventListener("click", function () {
          acceptGig(gig.id, card);
        });
      }

      // Start countdown animation if taken
      if (isTaken && gig.takenAt) {
        var elapsed = Date.now() - new Date(gig.takenAt).getTime();
        var remaining = Math.max(0, TAKEN_SHOW - elapsed);
        startCountdownBar(gig.id, remaining);
      }

      return card;
    }

    function payLabel(type) {
      if (type === "cash")   return "Cash";
      if (type === "wallet") return "Secure Wallet";
      return "Pay After";
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    /* ═══════════════════════════════════════
       ACCEPT GIG
    ═══════════════════════════════════════ */
    function acceptGig(gigId, card) {
      // Auth check
      var user = typeof getCurrentUser === "function" ? getCurrentUser() : null;
      if (!user) {
        if (typeof showToast === "function") showToast("Please log in to accept a gig.", "error");
        setTimeout(function () { window.location.href = "login.html?redirect=browse.html"; }, 1200);
        return;
      }

      // Prevent poster accepting their own gig
      var gigs = getGigs();
      var gig  = gigs.find(function (g) { return g.id === gigId; });
      if (!gig) return;
      if (gig.posterId && user.id && gig.posterId === user.id) {
        if (typeof showToast === "function") showToast("You can't accept your own gig!", "error");
        return;
      }
      if (gig.status !== "open") {
        if (typeof showToast === "function") showToast("This gig was just taken by someone else!", "error");
        render();
        return;
      }

      // Lock gig
      gig.status  = "taken";
      gig.takenAt = new Date().toISOString();
      gig.takenBy = user.id || user.name || "worker";
      saveGigs(gigs);

      // Update card UI immediately
      card.classList.add("taken", "taken-flash");
      var acceptBtn = card.querySelector(".btn-accept");
      if (acceptBtn) {
        acceptBtn.outerHTML = '<button class="btn-taken" disabled>🔒 Already Taken</button>';
      }
      var badge = card.querySelector(".gig-status-badge");
      if (badge) { badge.className = "gig-status-badge badge-taken"; badge.textContent = "🔒 Taken"; }

      // Add countdown bar
      var bar = document.createElement("div");
      bar.className = "taken-bar show";
      bar.id = "bar_" + gigId;
      bar.innerHTML = '<div class="taken-bar-inner" id="barInner_' + gigId + '"></div>';
      card.insertBefore(bar, card.firstChild);

      if (typeof showToast === "function") showToast("✅ Gig accepted! Check your dashboard.", "success");

      // Redirect worker to chat/dashboard
      setTimeout(function () {
        window.location.href = "dashboard-worker.html?gigId=" + gigId;
      }, 1800);

      // Start 30s countdown then remove card
      startCountdownBar(gigId, TAKEN_SHOW);
      takenTimers[gigId] = setTimeout(function () {
        var el = document.querySelector('[data-gig-id="' + gigId + '"]');
        if (el) {
          el.style.transition = "opacity .5s, transform .5s";
          el.style.opacity = "0";
          el.style.transform = "scale(.95)";
          setTimeout(function () { if (el.parentNode) el.parentNode.removeChild(el); }, 500);
        }
        render();
      }, TAKEN_SHOW);
    }

    /* ═══════════════════════════════════════
       COUNTDOWN BAR ANIMATION
    ═══════════════════════════════════════ */
    function startCountdownBar(gigId, duration) {
      setTimeout(function () {
        var inner = document.getElementById("barInner_" + gigId);
        if (!inner) return;
        inner.style.transition = "width " + (duration / 1000) + "s linear";
        inner.style.width = "0%";
      }, 50);
    }

    /* ═══════════════════════════════════════
       AUTO REFRESH every 15s
    ═══════════════════════════════════════ */
    setInterval(function () { render(); }, 15000);

    /* ── Storage change (multi-tab sync) ── */
    window.addEventListener("storage", function (e) {
      if (e.key === GIG_KEY) render();
    });

    /* ═══════════════════════════════════════
       INIT
    ═══════════════════════════════════════ */
    buildCatChips();
    render();

  })();
  </script>
</body>
</html>
