<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messages — GigLega</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .msg-bubble { max-width:72%;padding:10px 14px;border-radius:16px;font-size:.88rem;line-height:1.6;word-break:break-word; }
    .msg-sent   { background:linear-gradient(135deg,var(--primary,#1a3c5e),var(--teal,#0d9488));color:#fff;border-radius:16px 16px 4px 16px;margin-left:auto; }
    .msg-recv   { background:var(--surface,#f9f8f5);border:1.5px solid var(--gray-200,#e5e7eb);border-radius:16px 16px 16px 4px;color:var(--text,#111); }
    .msg-system { background:#fef9c3;border:1px solid #fde68a;border-radius:10px;color:#78350f;font-size:.8rem;text-align:center;padding:8px 14px;margin:8px auto;max-width:85%; }
    .msg-time   { font-size:.68rem;margin-top:4px;opacity:.65; }
    .msg-media img,.msg-media video { border-radius:10px;max-width:100%;margin-top:6px;display:block; }
    .chat-input-btn { width:38px;height:38px;border-radius:10px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;transition:background .15s; }
    .uploading-bar  { height:3px;background:linear-gradient(90deg,var(--teal,#0d9488) 0%,transparent 100%);animation:uploading 1s infinite; }
    @keyframes uploading { 0%{width:0%} 100%{width:100%} }
  </style>
  <script type="module">
    import { auth, db } from './firebase-config.js';
    import {
      collection, doc, getDoc, setDoc, addDoc, query,
      orderBy, onSnapshot, serverTimestamp
    } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';
    import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
    // Storage imported directly in chat only — not from firebase-config
    import { getStorage } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js';
    import { ref as storageRef, uploadBytes, getDownloadURL }
      from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js';
    import { getApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';

    let currentUser = null;
    let convId      = null;
    const params    = new URLSearchParams(window.location.search);
    const otherUID  = params.get("with");
    const gigId     = params.get("gig");

    function escH(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

    function showErr(msg){
      document.getElementById("chatHeader").innerHTML=
        '<div style="padding:16px;background:#fee2e2;border-bottom:1px solid #fca5a5;color:#dc2626;font-weight:600">⚠️ '+escH(msg)+'</div>';
    }

    /* ── Load chat ── */
    async function loadChat(){
      const ids = [currentUser.uid, otherUID].sort();
      convId    = ids.join("_")+"_"+gigId;

      const convRef  = doc(db,"conversations",convId);
      const convSnap = await getDoc(convRef);
      if(!convSnap.exists()){
        await setDoc(convRef,{
          participants:  [currentUser.uid, otherUID],
          gigId:         gigId,
          createdAt:     serverTimestamp(),
          lastMessageAt: serverTimestamp()
        });
      }

      const [otherSnap, gigSnap] = await Promise.all([
        getDoc(doc(db,"users",otherUID)),
        getDoc(doc(db,"gigs",gigId))
      ]);
      // Build other user's name: user doc → gig workerName/posterName → "User"
      const otherData = otherSnap.exists() ? otherSnap.data() : {};
      const isOtherWorker = currentUser.uid === gig.posterId;
      const gigFallbackName = isOtherWorker
        ? (gig.workerName || gig.posterName || "Worker")
        : (gig.posterName || gig.workerName || "Poster");
      const other = {
        ...otherData,
        name: otherData.name || otherData.displayName || gigFallbackName
      };
      const gig   = gigSnap.exists()   ? gigSnap.data()   : { title:"Gig"  };

      renderHeader(other, gig);

      onSnapshot(query(collection(db,"conversations",convId,"messages"),orderBy("timestamp","asc")), snap=>{
        renderMessages(snap.docs.map(d=>({id:d.id,...d.data()})));
      });
    }

    function renderHeader(other, gig){
      const inits = (other.name||"U").split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2);
      document.getElementById("chatHeader").innerHTML =
        `<div style="display:flex;align-items:center;gap:12px;padding:14px 20px;background:var(--surface);border-bottom:1.5px solid var(--gray-200)">
          <a href="browse.html" style="color:var(--teal,#0d9488);font-size:1.3rem;text-decoration:none;flex-shrink:0">←</a>
          <div style="width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--primary,#1a3c5e),var(--teal,#0d9488));display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;flex-shrink:0">${escH(inits)}</div>
          <div style="flex:1;min-width:0">
            <div style="font-weight:800;color:var(--primary,#1a3c5e);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escH(other.name||"User")}</div>
            <div style="font-size:.74rem;color:var(--gray-400);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escH(gig.title||"Gig")}</div>
          </div>
        </div>`;
    }

    function renderMessages(msgs){
      const c = document.getElementById("messagesContainer");
      if(!msgs.length){
        c.innerHTML='<div style="text-align:center;padding:48px 20px;color:var(--gray-400);font-size:.85rem">Koi message nahi. Pehla message bhejo! 👋</div>';
        return;
      }
      c.innerHTML = msgs.map(m=>{
        const isSent = m.senderId===currentUser.uid;
        const isSystem = m.type==="system" || m.senderId==="system";
        const time = m.timestamp ? new Date(m.timestamp.seconds*1000).toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"}) : "";

        if(isSystem) return `<div class="msg-system">${escH(m.text)}</div>`;

        /* Media message */
        let mediaHtml = "";
        if(m.mediaUrl && m.mediaType==="image")
          mediaHtml=`<div class="msg-media"><img src="${escH(m.mediaUrl)}" alt="image" loading="lazy" /></div>`;
        else if(m.mediaUrl && m.mediaType==="video")
          mediaHtml=`<div class="msg-media"><video src="${escH(m.mediaUrl)}" controls style="max-width:100%;border-radius:10px;margin-top:6px"></video></div>`;

        /* Location message */
        let locHtml = "";
        if(m.type==="location" && m.lat && m.lng){
          locHtml=`<a href="https://maps.google.com/?q=${m.lat},${m.lng}" target="_blank" rel="noopener noreferrer" style="display:block;margin-top:6px;background:rgba(255,255,255,.2);border-radius:8px;padding:8px 12px;color:inherit;text-decoration:none;font-size:.82rem">
            📍 Location Share — Maps mein kholo →</a>`;
        }

        return `<div style="display:flex;align-items:flex-end;gap:8px;margin-bottom:10px;${isSent?"flex-direction:row-reverse":""}">
          <div class="msg-bubble ${isSent?"msg-sent":"msg-recv"}">
            ${m.text ? escH(m.text) : ""}${locHtml}${mediaHtml}
            <div class="msg-time">${time}</div>
          </div>
        </div>`;
      }).join("");
      c.scrollTop = c.scrollHeight;
    }

    /* ── Send text ── */
    async function sendMessage(){
      if(!convId||!currentUser) return;
      const input = document.getElementById("msgInput");
      const text  = input.value.trim();
      if(!text) return;
      input.value = "";
      try{
        await addDoc(collection(db,"conversations",convId,"messages"),{
          text, senderId:currentUser.uid, timestamp:serverTimestamp()
        });
        await setDoc(doc(db,"conversations",convId),{lastMessageAt:serverTimestamp(),lastMessage:text},{merge:true});
      }catch(e){ console.error("Send failed:",e); input.value=text; }
    }

    /* ── Send GPS location ── */
    async function sendLocation(){
      if(!convId||!currentUser){ alert("Chat load hone do pehle."); return; }
      if(!navigator.geolocation){ alert("Browser GPS support nahi karta."); return; }
      const btn = document.getElementById("btnLocation");
      btn.textContent="⏳"; btn.disabled=true;
      navigator.geolocation.getCurrentPosition(async pos=>{
        try{
          const {latitude:lat, longitude:lng} = pos.coords;
          await addDoc(collection(db,"conversations",convId,"messages"),{
            text:"📍 Location share ki gayi",
            type:"location", lat, lng,
            senderId:currentUser.uid,
            timestamp:serverTimestamp()
          });
          await setDoc(doc(db,"conversations",convId),{lastMessageAt:serverTimestamp(),lastMessage:"📍 Location"},{merge:true});
        }catch(e){ console.error(e); }
        btn.textContent="📍"; btn.disabled=false;
      }, err=>{
        alert("GPS access denied. Browser settings mein location allow karo.");
        btn.textContent="📍"; btn.disabled=false;
      });
    }

    /* ── Upload photo/video ── */
    async function uploadMedia(file){
      if(!convId||!currentUser) return;
      const storage = getStorage(); // init Storage per-module
      const maxSize = 20*1024*1024; // 20MB
      if(file.size > maxSize){ alert("File 20MB se chhoti honi chahiye."); return; }

      const isImage = file.type.startsWith("image/");
      const isVideo = file.type.startsWith("video/");
      if(!isImage && !isVideo){ alert("Sirf image ya video upload kar sakte ho."); return; }

      /* Show upload bar */
      document.getElementById("uploadBar").style.display="block";

      try{
        const path = `chats/${convId}/${Date.now()}_${file.name}`;
        const sRef  = storageRef(storage, path);
        await uploadBytes(sRef, file);
        const url  = await getDownloadURL(sRef);

        await addDoc(collection(db,"conversations",convId,"messages"),{
          text:"",
          mediaUrl:  url,
          mediaType: isImage?"image":"video",
          senderId:  currentUser.uid,
          timestamp: serverTimestamp()
        });
        await setDoc(doc(db,"conversations",convId),{
          lastMessageAt:serverTimestamp(),
          lastMessage: isImage?"📷 Photo":"🎥 Video"
        },{merge:true});
      }catch(e){ console.error("Upload failed:",e); alert("Upload failed: "+e.message); }
      document.getElementById("uploadBar").style.display="none";
    }

    /* ── Expose globals ── */
    window.sendMessage   = sendMessage;
    window.sendLocation  = sendLocation;
    window.handleKeydown = e=>{ if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMessage();} };
    window.triggerMedia  = ()=>{ document.getElementById("mediaInput").click(); };

    /* ── Auth guard ── */
    onAuthStateChanged(auth, async user=>{
      if(!user){
        window.location.href="login.html?redirect="+encodeURIComponent(window.location.href);
        return;
      }
      currentUser=user;
      if(!otherUID||!gigId){
        document.getElementById("messagesContainer").innerHTML=
          '<div style="padding:40px;text-align:center;color:var(--gray-400)">Conversation select nahi hai. Gig detail pe jao aur Message Poster click karo.</div>';
        return;
      }
      document.getElementById("chatHeader").innerHTML=
        '<div style="padding:14px 20px;color:var(--gray-400);font-size:.84rem">⏳ Loading chat...</div>';
      try{ await loadChat(); }
      catch(err){
        console.error("Chat error:",err);
        showErr("Chat load failed: "+err.message+" — Firestore rules check karo.");
      }
    });
  </script>
</head>
<body>
  <div id="nav"></div>
  <script src="shared.js"></script>

  <div style="height:calc(100vh - 64px);display:flex;flex-direction:column;background:var(--bg)">
    <div id="chatHeader"></div>
    <div id="uploadBar" class="uploading-bar" style="display:none"></div>
    <div id="messagesContainer" style="flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column"></div>

    <input type="file" id="mediaInput" accept="image/*,video/*" style="display:none"
      onchange="if(this.files[0]) uploadMedia(this.files[0])" />

    <div style="background:var(--surface);border-top:1.5px solid var(--gray-200);padding:10px 14px">
      <div style="display:flex;align-items:center;gap:8px">

        <!-- GPS location button -->
        <button id="btnLocation" onclick="sendLocation()" class="chat-input-btn"
          style="background:var(--surface-offset,#f3f0ec)" title="Share Location">📍</button>

        <!-- Media upload button -->
        <button onclick="triggerMedia()" class="chat-input-btn"
          style="background:var(--surface-offset,#f3f0ec)" title="Photo / Video">📷</button>

        <!-- Text input -->
        <input type="text" id="msgInput" placeholder="Type your message…" onkeydown="handleKeydown(event)"
          style="flex:1;padding:10px 14px;border:1.5px solid var(--gray-200);border-radius:20px;background:var(--bg);color:var(--text);font-family:var(--font);font-size:.9rem" />

        <!-- Send button -->
        <button onclick="sendMessage()" class="chat-input-btn"
          style="background:linear-gradient(135deg,var(--primary,#1a3c5e),var(--teal,#0d9488));color:#fff">➤</button>
      </div>
    </div>
  </div>
</body>
</html>
