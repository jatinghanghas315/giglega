<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat — GigLega</title>
  <meta name="description" content="GigLega gig chat — worker aur poster ke beech direct messaging." />
  <link rel="stylesheet" href="styles.css" />
  <!-- ✅ FIX 1: NO defer — shared.js must load synchronously -->
  <script src="shared.js"></script>
  <style>
    .chat-page{max-width:800px;margin:0 auto;padding:24px 16px 80px}

    .gig-header{background:var(--surface);border:1.5px solid var(--gray-200);border-radius:var(--radius);padding:16px 20px;margin-bottom:16px;box-shadow:var(--shadow-sm);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
    .gig-header-left{display:flex;flex-direction:column;gap:4px}
    .gig-header-title{font-size:1rem;font-weight:700;color:var(--primary);line-height:1.3}
    .gig-header-meta{display:flex;flex-wrap:wrap;gap:10px}
    .gig-meta-chip{font-size:.75rem;color:var(--gray-500);display:flex;align-items:center;gap:4px}
    .gig-status-badge{font-size:.73rem;font-weight:700;padding:4px 12px;border-radius:12px}
    .badge-taken{background:rgba(245,158,11,.12);color:#b45309}
    .badge-completed{background:rgba(16,185,129,.12);color:#059669}
    .badge-open{background:rgba(99,102,241,.12);color:#4338ca}

    .chat-outer{background:var(--surface);border:1.5px solid var(--gray-200);border-radius:var(--radius);box-shadow:var(--shadow-sm);display:flex;flex-direction:column;height:68vh;min-height:420px;overflow:hidden}

    .messages-area{flex:1;overflow-y:auto;padding:20px 16px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth}
    .messages-area::-webkit-scrollbar{width:4px}
    .messages-area::-webkit-scrollbar-thumb{background:var(--gray-200);border-radius:2px}

    .date-sep{text-align:center;margin:8px 0}
    .date-sep span{font-size:.72rem;color:var(--gray-400);background:var(--gray-50);padding:3px 12px;border-radius:10px}

    .msg-row{display:flex;align-items:flex-end;gap:8px}
    .msg-row.sent{flex-direction:row-reverse}
    .msg-avatar{width:30px;height:30px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;flex-shrink:0}
    .msg-avatar.worker{background:var(--teal)}

    .bubble-wrap{display:flex;flex-direction:column;max-width:68%}
    .msg-row.sent .bubble-wrap{align-items:flex-end}
    .bubble-name{font-size:.72rem;color:var(--gray-400);margin-bottom:3px;padding:0 4px}

    .bubble{padding:10px 14px;border-radius:18px;font-size:.9rem;line-height:1.5;word-break:break-word}
    .bubble.received{background:var(--gray-100);color:var(--text);border-bottom-left-radius:4px}
    .bubble.sent{background:linear-gradient(135deg,var(--primary) 0%,var(--teal) 100%);color:#fff;border-bottom-right-radius:4px}
    .bubble img{max-width:100%;border-radius:10px;display:block;margin-top:4px;cursor:pointer;max-height:200px;object-fit:cover}
    .bubble-time{font-size:.68rem;margin-top:4px;padding:0 4px;opacity:.6}
    .bubble.sent .bubble-time{text-align:right;color:#fff}
    .bubble.received .bubble-time{color:var(--gray-400)}

    .sys-msg{text-align:center;padding:6px 12px}
    .sys-msg span{font-size:.78rem;color:var(--gray-500);background:var(--gray-50);border:1px solid var(--gray-200);padding:5px 14px;border-radius:10px;display:inline-block;line-height:1.5}

    .chat-locked{display:none;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;text-align:center;flex:1}
    .chat-locked.show{display:flex}
    .lock-icon{font-size:2.5rem;margin-bottom:12px}
    .lock-title{font-size:1rem;font-weight:700;color:var(--gray-600);margin-bottom:6px}
    .lock-sub{font-size:.83rem;color:var(--gray-400);line-height:1.6}

    .earn-banner{background:linear-gradient(135deg,var(--primary) 0%,var(--teal) 100%);color:#fff;border-radius:var(--radius-sm);padding:14px 18px;margin-bottom:12px;display:none}
    .earn-banner.show{display:block}
    .earn-banner-title{font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;opacity:.8;margin-bottom:6px}
    .earn-banner-amount{font-size:1.4rem;font-weight:800;margin-bottom:2px}
    .earn-banner-sub{font-size:.78rem;opacity:.75}
    .earn-banner-rows{margin-top:10px;display:flex;flex-direction:column;gap:4px}
    .earn-banner-row{display:flex;justify-content:space-between;font-size:.82rem;opacity:.85}
    .earn-banner-row.total{font-weight:800;opacity:1;padding-top:6px;border-top:1px solid rgba(255,255,255,.3);margin-top:2px}

    .input-bar{border-top:1.5px solid var(--gray-200);padding:12px 14px;display:flex;align-items:flex-end;gap:10px;background:var(--surface)}
    .input-bar.locked{opacity:.5;pointer-events:none}

    .img-preview-wrap{padding:8px 14px 0;border-top:1px solid var(--gray-100);display:none}
    .img-preview-wrap.show{display:flex;align-items:center;gap:10px}
    .img-preview-wrap img{width:60px;height:60px;object-fit:cover;border-radius:8px;border:1.5px solid var(--gray-200)}
    .btn-remove-img{background:var(--danger);color:#fff;border:none;border-radius:50%;width:22px;height:22px;font-size:.75rem;cursor:pointer;display:flex;align-items:center;justify-content:center}

    .input-grow{flex:1}
    textarea#msgInput{width:100%;resize:none;border:1.5px solid var(--gray-200);border-radius:12px;padding:10px 14px;font-size:.9rem;font-family:inherit;background:var(--surface);color:var(--text);min-height:42px;max-height:120px;line-height:1.5;transition:border .2s;box-sizing:border-box}
    textarea#msgInput:focus{outline:none;border-color:var(--teal)}

    .btn-attach{background:none;border:1.5px solid var(--gray-200);border-radius:10px;width:42px;height:42px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.15rem;color:var(--gray-500);transition:all .2s;flex-shrink:0}
    .btn-attach:hover{border-color:var(--teal);color:var(--teal)}

    .btn-send{background:linear-gradient(135deg,var(--primary) 0%,var(--teal) 100%);color:#fff;border:none;border-radius:10px;width:42px;height:42px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;transition:opacity .2s,transform .15s;box-shadow:0 2px 8px rgba(13,148,136,.3)}
    .btn-send:hover{opacity:.9;transform:scale(1.05)}
    .btn-send:disabled{opacity:.4;cursor:not-allowed;transform:none}

    .mark-complete-wrap{padding:10px 14px;border-top:1px solid var(--gray-100);display:none}
    .mark-complete-wrap.show{display:block}
    .btn-mark-complete{width:100%;padding:11px;background:var(--success);color:#fff;border:none;border-radius:var(--radius-sm);font-weight:700;font-size:.88rem;cursor:pointer;transition:opacity .2s}
    .btn-mark-complete:hover{opacity:.88}
    .btn-mark-complete:disabled{opacity:.5;cursor:not-allowed}

    .lightbox{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9999;display:none;align-items:center;justify-content:center}
    .lightbox.show{display:flex}
    .lightbox img{max-width:92vw;max-height:88vh;border-radius:12px;object-fit:contain}
    .lightbox-close{position:absolute;top:18px;right:22px;background:none;border:none;color:#fff;font-size:1.8rem;cursor:pointer;line-height:1}

    /* Error screen */
    .chat-error{text-align:center;padding:64px 24px}
    .chat-error .ei{font-size:3rem;margin-bottom:16px;display:block}
    .chat-error h3{font-size:1rem;font-weight:700;color:var(--primary);margin-bottom:8px}
    .chat-error p{font-size:.85rem;color:var(--gray-500);line-height:1.6}

    [data-theme=dark] .chat-outer{border-color:var(--gray-700)}
    [data-theme=dark] .gig-header{border-color:var(--gray-700)}
    [data-theme=dark] .input-bar{border-color:var(--gray-700);background:var(--gray-900)}
    [data-theme=dark] .bubble.received{background:var(--gray-700);color:var(--gray-100)}
    [data-theme=dark] textarea#msgInput{border-color:var(--gray-600);background:var(--gray-800)}
    [data-theme=dark] .btn-attach{border-color:var(--gray-600);color:var(--gray-400)}
    [data-theme=dark] .date-sep span{background:var(--gray-800);color:var(--gray-500)}
    [data-theme=dark] .sys-msg span{background:var(--gray-800);border-color:var(--gray-700);color:var(--gray-400)}
    [data-theme=dark] .img-preview-wrap{border-color:var(--gray-700)}
    [data-theme=dark] .img-preview-wrap img{border-color:var(--gray-600)}
    [data-theme=dark] .mark-complete-wrap{border-color:var(--gray-700)}
    [data-theme=dark] .messages-area::-webkit-scrollbar-thumb{background:var(--gray-600)}
  </style>
</head>
<body>
  <div id="announce-bar"></div>
  <nav id="main-nav"></nav>

  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightboxClose">✕</button>
    <img id="lightboxImg" src="" alt="Preview" />
  </div>

  <main class="page-wrapper">
    <div class="chat-page">
      <nav id="breadcrumb" aria-label="breadcrumb"></nav>
      <div class="gig-header" id="gigHeader">
        <div class="gig-header-left">
          <div class="gig-header-title" id="headerTitle">Loading...</div>
          <div class="gig-header-meta" id="headerMeta"></div>
        </div>
        <span class="gig-status-badge" id="headerBadge"></span>
      </div>
      <div class="earn-banner" id="earnBanner">
        <div class="earn-banner-title">🎉 Gig Completed — Earnings Credited!</div>
        <div class="earn-banner-amount" id="earnAmount">₹0</div>
        <div class="earn-banner-sub">Credited to your GigLega Balance</div>
        <div class="earn-banner-rows">
          <div class="earn-banner-row"><span>Gig Price</span><span id="earnGigPrice">₹0</span></div>
          <div class="earn-banner-row"><span>GigLega Support Fee (6%)</span><span id="earnFee">–₹0</span></div>
          <div class="earn-banner-row total"><span>You Received</span><span id="earnNet">₹0</span></div>
        </div>
      </div>
      <div class="chat-outer">
        <div class="mark-complete-wrap" id="markCompleteWrap">
          <button class="btn-mark-complete" id="markCompleteBtn">✅ Mark Gig as Complete — Release Payment</button>
        </div>
        <div class="img-preview-wrap" id="imgPreviewWrap">
          <img id="imgPreviewThumb" src="" alt="preview" />
          <button class="btn-remove-img" id="btnRemoveImg" title="Remove">✕</button>
          <span style="font-size:.78rem;color:var(--gray-500)">Ready to send</span>
        </div>
        <div class="messages-area" id="messagesArea"></div>
        <div class="chat-locked" id="chatLocked">
          <div class="lock-icon">🔒</div>
          <div class="lock-title">Chat Archived</div>
          <div class="lock-sub">This gig has been completed.<br>Chat is now read-only and archived.</div>
        </div>
        <div class="input-bar" id="inputBar">
          <input type="file" id="fileInput" accept="image/*" style="display:none" />
          <button class="btn-attach" id="btnAttach" title="Send image">📎</button>
          <div class="input-grow">
            <textarea id="msgInput" placeholder="Type a message..." rows="1"></textarea>
          </div>
          <button class="btn-send" id="btnSend" title="Send">➤</button>
        </div>
      </div>
    </div>
  </main>

  <footer id="main-footer"></footer>
  <div id="toast-container"></div>

  <script>
  /* ✅ FIX 2: Wrap EVERYTHING in DOMContentLoaded so shared.js
     functions (getCurrentUser, showToast etc.) are guaranteed loaded */
  document.addEventListener("DOMContentLoaded", function () {

    var FEE_RATE = 0.06;
    var GIG_KEY  = (typeof GL !== "undefined" && GL.STORAGE_KEY_GIGS)  ? GL.STORAGE_KEY_GIGS  : "gl_gigs";
    var CHAT_KEY = (typeof GL !== "undefined" && GL.STORAGE_KEY_CHATS) ? GL.STORAGE_KEY_CHATS : "gl_chats";
    var POLL_MS  = 3000;

    /* ✅ FIX 3: Safe user read — falls back to direct localStorage
       so it NEVER returns null when user IS logged in */
    var user = (function () {
      if (typeof getCurrentUser === "function") return getCurrentUser();
      try {
        var u = JSON.parse(localStorage.getItem("gl_user") || "null");
        return (u && u.id) ? u : null;
      } catch(e) { return null; }
    })();

    var gigId = new URLSearchParams(window.location.search).get("gigId") ||
                new URLSearchParams(window.location.search).get("id");

    /* ── DOM refs ── */
    var messagesArea     = document.getElementById("messagesArea");
    var msgInput         = document.getElementById("msgInput");
    var btnSend          = document.getElementById("btnSend");
    var btnAttach        = document.getElementById("btnAttach");
    var fileInput        = document.getElementById("fileInput");
    var imgPreviewWrap   = document.getElementById("imgPreviewWrap");
    var imgPreviewThumb  = document.getElementById("imgPreviewThumb");
    var btnRemoveImg     = document.getElementById("btnRemoveImg");
    var markCompleteWrap = document.getElementById("markCompleteWrap");
    var markCompleteBtn  = document.getElementById("markCompleteBtn");
    var inputBar         = document.getElementById("inputBar");
    var chatLocked       = document.getElementById("chatLocked");
    var earnBanner       = document.getElementById("earnBanner");
    var lightbox         = document.getElementById("lightbox");
    var lightboxImg      = document.getElementById("lightboxImg");
    var lightboxClose    = document.getElementById("lightboxClose");

    var pendingImage = null;
    var lastMsgCount = -1;

    /* ── Breadcrumb ── */
    if (typeof buildBreadcrumb === "function") {
      buildBreadcrumb("breadcrumb", [
        { label: "Home",      href: "index.html" },
        { label: "Dashboard", href: "dashboard-worker.html" },
        { label: "Chat" }
      ]);
    }

    /* ═══════════════════════════════════════
       DATA HELPERS
    ═══════════════════════════════════════ */
    function getGigs()       { return JSON.parse(localStorage.getItem(GIG_KEY)  || "[]"); }
    function saveGigs(g)     { localStorage.setItem(GIG_KEY, JSON.stringify(g)); }
    function getAllChats()   { return JSON.parse(localStorage.getItem(CHAT_KEY) || "{}"); }
    function saveAllChats(c){ localStorage.setItem(CHAT_KEY, JSON.stringify(c)); }
    function getChat(id)    { return getAllChats()[id] || []; }
    function addMessage(id, msg) {
      var all = getAllChats();
      if (!all[id]) all[id] = [];
      all[id].push(msg);
      saveAllChats(all);
    }
    function findGig(id) {
      return getGigs().find(function (g) { return g.id === id; }) || null;
    }

    function escHtml(s) {
      return String(s || "")
        .replace(/&/g,"&amp;").replace(/</g,"&lt;")
        .replace(/>/g,"&gt;");
    }
    function fmtTime(iso) {
      return new Date(iso).toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"});
    }
    function fmtDate(iso) {
      var d = new Date(iso), now = new Date();
      var diff = Math.floor((now - d) / 86400000);
      if (diff === 0) return "Today";
      if (diff === 1) return "Yesterday";
      return d.toLocaleDateString("en-IN",{day:"numeric",month:"short"});
    }

    /* ═══════════════════════════════════════
       ✅ FIX 4: GUARD — shows error UI, never redirect-loops
    ═══════════════════════════════════════ */
    function showError(icon, title, msg, linkHref, linkLabel) {
      document.getElementById("gigHeader").style.display = "none";
      document.querySelector(".chat-outer").innerHTML =
        '<div class="chat-error">' +
          '<span class="ei">' + icon + '</span>' +
          '<h3>' + title + '</h3>' +
          '<p>' + msg + '</p>' +
          (linkHref ? '<a href="' + linkHref + '" style="display:inline-block;margin-top:16px;padding:10px 24px;background:var(--teal);color:#fff;border-radius:var(--radius-sm);font-weight:700;text-decoration:none">' + linkLabel + '</a>' : '') +
        '</div>';
    }

    function guardCheck() {
      /* Not logged in */
      if (!user) {
        showError("🔐", "Login Required", "Please log in to access this chat.",
          "login.html?redirect=" + encodeURIComponent("chat.html?gigId=" + gigId), "Login →");
        return false;
      }
      /* No gigId in URL */
      if (!gigId) {
        showError("❓", "No Gig Specified", "Open a chat from your dashboard.", "dashboard-worker.html", "Go to Dashboard");
        return false;
      }
      var gig = findGig(gigId);
      /* Gig not found */
      if (!gig) {
        showError("🔍", "Gig Not Found", "This gig may have been removed.", "browse.html", "Browse Gigs");
        return false;
      }
      /* Not involved */
      var isInvolved = (gig.posterId === user.id) ||
                       (gig.takenBy  === user.id) ||
                       (gig.takenBy  === user.name);
      if (!isInvolved) {
        showError("🚫", "Access Denied", "You are not part of this gig.", "browse.html", "Browse Gigs");
        return false;
      }
      /* Gig still open */
      if (gig.status === "open") {
        showError("⏳", "Gig Not Accepted Yet", "This gig hasn't been taken yet. Check back once a worker accepts it.",
          "dashboard-client.html", "My Posted Gigs");
        return false;
      }
      return true;
    }

    /* ═══════════════════════════════════════
       RENDER HEADER
    ═══════════════════════════════════════ */
    function renderHeader(gig) {
      document.getElementById("headerTitle").textContent = gig.title;
      var badge = document.getElementById("headerBadge");
      if (gig.status === "completed") {
        badge.className   = "gig-status-badge badge-completed";
        badge.textContent = "✅ Completed";
      } else {
        badge.className   = "gig-status-badge badge-taken";
        badge.textContent = "🔒 In Progress";
      }
      document.getElementById("headerMeta").innerHTML =
        '<span class="gig-meta-chip">💰 ₹' + gig.pricePerHr + '/hr</span>' +
        (gig.location ? '<span class="gig-meta-chip">📍 ' + escHtml(gig.location) + '</span>' : '') +
        '<span class="gig-meta-chip">' + (gig.type === "hyperlocal" ? "📍 Hyperlocal" : "💻 Remote") + '</span>';
      document.title = "Chat: " + gig.title + " — GigLega";
    }

    /* ═══════════════════════════════════════
       RENDER MESSAGES
    ═══════════════════════════════════════ */
    function renderMessages(gig) {
      var msgs = getChat(gigId);
      if (msgs.length === lastMsgCount) return;
      lastMsgCount = msgs.length;

      var html = "";
      var lastDate = "";

      if (!msgs.length) {
        html = '<div class="sys-msg"><span>Chat started. Say hello! 👋</span></div>';
      } else {
        msgs.forEach(function (msg) {
          var dl = fmtDate(msg.sentAt);
          if (dl !== lastDate) {
            html += '<div class="date-sep"><span>' + dl + '</span></div>';
            lastDate = dl;
          }
          if (msg.type === "system") {
            html += '<div class="sys-msg"><span>' + escHtml(msg.text) + '</span></div>';
            return;
          }
          var isSent = (msg.senderId === user.id) || (msg.senderName === user.name);
          var initials = (msg.senderName || "?").split(" ").map(function(w){return w[0];}).join("").slice(0,2).toUpperCase();
          html +=
            '<div class="msg-row ' + (isSent ? "sent" : "") + '">' +
              '<div class="msg-avatar ' + (msg.role === "worker" ? "worker" : "") + '">' + initials + '</div>' +
              '<div class="bubble-wrap">' +
                (!isSent ? '<div class="bubble-name">' + escHtml(msg.senderName||"User") + '</div>' : '') +
                '<div class="bubble ' + (isSent ? "sent" : "received") + '">' +
                  (msg.text  ? '<div>'  + escHtml(msg.text)  + '</div>' : '') +
                  (msg.image ? '<img src="' + msg.image + '" data-src="' + msg.image + '" alt="photo" />' : '') +
                  '<div class="bubble-time">' + fmtTime(msg.sentAt) + '</div>' +
                '</div>' +
              '</div>' +
            '</div>';
        });
      }

      messagesArea.innerHTML = html;
      messagesArea.querySelectorAll("img[data-src]").forEach(function (img) {
        img.addEventListener("click", function () {
          lightboxImg.src = img.getAttribute("data-src");
          lightbox.classList.add("show");
        });
      });
      messagesArea.scrollTop = messagesArea.scrollHeight;
    }

    /* ═══════════════════════════════════════
       RENDER CHAT STATE
    ═══════════════════════════════════════ */
    function renderChatState(gig) {
      var isCompleted = gig.status === "completed";
      var isPoster    = gig.posterId === user.id;
      var isWorker    = gig.takenBy  === user.id || gig.takenBy === user.name;

      if (isCompleted) {
        inputBar.classList.add("locked");
        chatLocked.classList.add("show");
        messagesArea.style.display = "none";
        markCompleteWrap.classList.remove("show");
      } else {
        inputBar.classList.remove("locked");
        chatLocked.classList.remove("show");
        messagesArea.style.display = "flex";
      }

      markCompleteWrap.classList.toggle("show", isPoster && gig.status === "taken");

      if (isWorker && isCompleted) {
        var fee = Math.round(gig.pricePerHr * FEE_RATE);
        var net = gig.pricePerHr - fee;
        earnBanner.classList.add("show");
        document.getElementById("earnAmount").textContent   = "₹" + net;
        document.getElementById("earnGigPrice").textContent = "₹" + gig.pricePerHr;
        document.getElementById("earnFee").textContent      = "–₹" + fee;
        document.getElementById("earnNet").textContent      = "₹" + net;
      }
    }

    /* ═══════════════════════════════════════
       SEND MESSAGE
    ═══════════════════════════════════════ */
    function sendMessage() {
      var gig = findGig(gigId);
      if (!gig || gig.status === "completed") return;
      var text  = msgInput.value.trim();
      var image = pendingImage;
      if (!text && !image) return;
      var isWorker = gig.takenBy === user.id || gig.takenBy === user.name;
      addMessage(gigId, {
        id:         "msg_" + Date.now(),
        senderId:   user.id   || null,
        senderName: user.name || "User",
        role:       isWorker ? "worker" : "poster",
        text:       text  || null,
        image:      image || null,
        sentAt:     new Date().toISOString(),
        type:       "message"
      });
      msgInput.value = "";
      clearImagePreview();
      autoResize();
      lastMsgCount = -1; // force re-render
      renderMessages(gig);
      btnSend.disabled = true;
      setTimeout(function () { btnSend.disabled = false; }, 500);
    }

    /* ═══════════════════════════════════════
       MARK COMPLETE
    ═══════════════════════════════════════ */
    markCompleteBtn.addEventListener("click", function () {
      var gig = findGig(gigId);
      if (!gig || gig.status !== "taken") return;
      if (!confirm("Mark this gig as complete and release payment to the worker?")) return;
      markCompleteBtn.disabled    = true;
      markCompleteBtn.textContent = "⏳ Processing...";
      var gigs = getGigs();
      var g    = gigs.find(function (x) { return x.id === gigId; });
      if (g) { g.status = "completed"; g.completedAt = new Date().toISOString(); saveGigs(gigs); }
      addMessage(gigId, {
        id: "sys_" + Date.now(), type: "system",
        text: "✅ Gig marked complete by poster. Payment released to worker.",
        sentAt: new Date().toISOString()
      });
      if (typeof showToast === "function") showToast("✅ Gig completed! Payment released.", "success");
      lastMsgCount = -1;
      setTimeout(fullRender, 600);
    });

    /* ═══════════════════════════════════════
       IMAGE ATTACH
    ═══════════════════════════════════════ */
    btnAttach.addEventListener("click", function () { fileInput.click(); });
    fileInput.addEventListener("change", function () {
      var file = fileInput.files[0];
      if (!file) return;
      if (file.size > 2 * 1024 * 1024) {
        if (typeof showToast === "function") showToast("Image must be under 2MB.", "error");
        fileInput.value = "";
        return;
      }
      var reader = new FileReader();
      reader.onload = function (e) {
        pendingImage = e.target.result;
        imgPreviewThumb.src = pendingImage;
        imgPreviewWrap.classList.add("show");
      };
      reader.readAsDataURL(file);
      fileInput.value = "";
    });
    btnRemoveImg.addEventListener("click", clearImagePreview);
    function clearImagePreview() {
      pendingImage = null;
      imgPreviewThumb.src = "";
      imgPreviewWrap.classList.remove("show");
    }

    /* ── Textarea ── */
    function autoResize() {
      msgInput.style.height = "auto";
      msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + "px";
    }
    msgInput.addEventListener("input", autoResize);
    msgInput.addEventListener("keydown", function (e) {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
    btnSend.addEventListener("click", sendMessage);

    /* ── Lightbox ── */
    lightboxClose.addEventListener("click", function () { lightbox.classList.remove("show"); });
    lightbox.addEventListener("click", function (e) {
      if (e.target === lightbox) lightbox.classList.remove("show");
    });

    /* ═══════════════════════════════════════
       FULL RENDER
    ═══════════════════════════════════════ */
    function fullRender() {
      var gig = findGig(gigId);
      if (!gig) return;
      renderHeader(gig);
      renderChatState(gig);
      renderMessages(gig);
    }

    setInterval(function () {
      var gig = findGig(gigId);
      if (gig) renderMessages(gig);
    }, POLL_MS);

    window.addEventListener("storage", function (e) {
      if (e.key === GIG_KEY || e.key === CHAT_KEY) { lastMsgCount = -1; fullRender(); }
    });

    /* ═══════════════════════════════════════
       ✅ INIT — guard first, then render
    ═══════════════════════════════════════ */
    if (!guardCheck()) return;
    fullRender();

  }); // end DOMContentLoaded
  </script>
</body>
</html>
