<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="description" content="Real-time chat on GigLega — message workers and posters directly for your active gigs in Gurugram.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messages — GigLega</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="theme-dark.css" />
  
  <link rel="stylesheet" href="mobile.css?v=20260411-0215" />
<style>
    /* ── Layout ── */
    .chat-shell {
      height: calc(100vh - 64px);
      display: flex;
      background: var(--bg);
    }

    /* ── Sidebar (inbox) ── */
    .chat-sidebar {
      width: 320px;
      flex-shrink: 0;
      border-right: 1.5px solid var(--gray-200, #e5e7eb);
      display: flex;
      flex-direction: column;
      background: var(--surface, #f9f8f5);
    }
    .chat-sidebar-header {
      padding: 16px 18px 12px;
      border-bottom: 1.5px solid var(--gray-200, #e5e7eb);
      font-weight: 800;
      font-size: 1rem;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .chat-sidebar-list {
      flex: 1;
      overflow-y: auto;
    }
    .conv-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      cursor: pointer;
      border-bottom: 1px solid var(--gray-100, #f3f4f6);
      transition: background .15s;
      text-decoration: none;
      color: var(--text);
    }
    .conv-item:hover { background: var(--surface-offset, #f3f0ec); }
    .conv-item.active { background: rgba(13,148,136,.10); box-shadow: inset 3px 0 0 var(--teal, #0d9488); }
    .btn-report-user {
      background: none; border: 1.5px solid rgba(239,68,68,.3);
      color: #dc2626; border-radius: 8px; padding: 6px 12px;
      font-size: .78rem; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; gap: 5px; white-space: nowrap;
      transition: background .15s;
    }
    .btn-report-user:hover { background: rgba(239,68,68,.07); }
    .report-modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5);
      z-index: 9998; align-items: center; justify-content: center;
    }
    .report-modal-overlay.show { display: flex; }
    .report-modal {
      background: var(--surface, #fff); border-radius: 16px; padding: 28px 24px;
      max-width: 400px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,.2);
    }
    .report-modal h3 { font-size: 1.1rem; margin-bottom: 8px; }
    .report-modal p  { font-size: .88rem; color: var(--gray-500,#6b7280); margin-bottom: 18px; }
    .report-reason-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
    .report-reason-item {
      padding: 10px 14px; border: 1.5px solid var(--gray-200,#e5e7eb);
      border-radius: 8px; cursor: pointer; font-size: .9rem;
      transition: border-color .15s, background .15s;
    }
    .report-reason-item:hover, .report-reason-item.selected {
      border-color: var(--teal,#0d9488); background: rgba(13,148,136,.06);
    }
    .report-modal-actions { display: flex; gap: 10px; }
    .report-modal-actions button { flex: 1; padding: 11px; border-radius: 8px;
      font-weight: 700; font-size: .9rem; cursor: pointer; border: none; }
    .btn-report-cancel { background: var(--gray-100,#f3f4f6); color: var(--text,#111); }
    .btn-report-submit { background: #dc2626; color: #fff; }
    .conv-avatar {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary, #1a3c5e), var(--teal, #0d9488));
      color: #fff;
      font-weight: 800;
      font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .conv-info { flex: 1; min-width: 0; }
    .conv-name  { font-weight: 700; font-size: .9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .conv-gig   { font-size: .75rem; color: var(--gray-500, #6b7280); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
    .conv-last  { font-size: .76rem; color: var(--gray-400, #9ca3af); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
    .conv-time  { font-size: .68rem; color: var(--gray-400); align-self: flex-start; padding-top: 2px; white-space: nowrap; }
    .conv-unread-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: var(--teal, #0d9488);
      flex-shrink: 0;
    }

    /* ── Main chat panel ── */
    .chat-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    #chatHeader {
      border-bottom: 1.5px solid var(--gray-200, #e5e7eb);
      background: var(--surface, #f9f8f5);
    }
    #messagesContainer {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
    }
    .chat-empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--gray-400, #9ca3af);
      text-align: center;
      padding: 40px 24px;
    }
    .chat-empty-state .icon { font-size: 3rem; margin-bottom: 16px; }
    .chat-empty-state h3 { font-size: 1rem; font-weight: 700; color: var(--gray-500); margin-bottom: 8px; }
    .chat-empty-state p  { font-size: .84rem; line-height: 1.6; max-width: 28ch; }

    /* ── Messages ── */
    .msg-bubble { max-width: 72%; padding: 10px 14px; border-radius: 16px; font-size: .88rem; line-height: 1.6; word-break: break-word; }
    .msg-sent   { background: linear-gradient(135deg, var(--primary, #1a3c5e), var(--teal, #0d9488)); color: #fff; border-radius: 16px 16px 4px 16px; margin-left: auto; }
    .msg-recv   { background: var(--surface, #f9f8f5); border: 1.5px solid var(--gray-200, #e5e7eb); border-radius: 16px 16px 16px 4px; color: var(--text); }
    .msg-system { background: #fef9c3; border: 1px solid #fde68a; border-radius: 10px; color: #78350f; font-size: .8rem; text-align: center; padding: 8px 14px; margin: 8px auto; max-width: 85%; }
    .msg-time   { font-size: .68rem; margin-top: 4px; opacity: .65; }
    .msg-media img, .msg-media video { border-radius: 10px; max-width: 100%; margin-top: 6px; display: block; }

    /* ── Input bar ── */
    .chat-input-bar {
      background: var(--surface, #f9f8f5);
      border-top: 1.5px solid var(--gray-200, #e5e7eb);
      padding: 10px 14px;
    }
    .chat-input-row { display: flex; align-items: center; gap: 8px; }
    .chat-input-btn { width: 38px; height: 38px; border-radius: 10px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0; transition: background .15s; }
    .uploading-bar  { height: 3px; background: linear-gradient(90deg, var(--teal, #0d9488) 0%, transparent 100%); animation: uploading 1s infinite; }
    @keyframes uploading { 0%{width:0%} 100%{width:100%} }

    /* ── Mobile ── */
    @media (max-width: 640px) {
      .chat-sidebar { width: 100%; border-right: none; position: absolute; inset: 64px 0 0 0; z-index: 10; }
      .chat-sidebar.hidden { display: none; }
      .chat-main { width: 100%; }
      .chat-back-btn { display: flex !important; }
    }
    .chat-back-btn {
      display: none;
      align-items: center;
      gap: 6px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--teal, #0d9488);
      font-weight: 700;
      font-size: .9rem;
      padding: 12px 16px;
    }

    /* ── Inbox loading skeleton ── */
    .conv-skeleton {
      padding: 12px 16px;
      display: flex;
      gap: 12px;
      align-items: center;
      border-bottom: 1px solid var(--gray-100);
    }
    .skel { background: var(--gray-100, #f3f4f6); border-radius: 6px; animation: shimmer 1.4s ease-in-out infinite; background: linear-gradient(90deg,var(--gray-100,#f3f4f6) 25%,var(--gray-200,#e5e7eb) 50%,var(--gray-100,#f3f4f6) 75%); background-size: 200% 100%; }
    @keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
    .skel-circle { width:44px;height:44px;border-radius:50%;flex-shrink:0; }
    .skel-lines { flex:1; display:flex; flex-direction:column; gap:6px; }
    .skel-line { height:10px;border-radius:4px; }
    .skel-line.short { width:60%; }
  </style>

  <script type="module">
    import { auth, db } from './firebase-config.js';
    import {
      collection, doc, getDoc, setDoc, addDoc, query, where,
      orderBy, onSnapshot, serverTimestamp, getDocs
    } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';
    import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
    import { getStorage } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js';
    import { ref as storageRef, uploadBytes, getDownloadURL }
      from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js';
    import { getApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';

    let currentUser = null;
    let activeConvId = null;
    let unsubMessages = null;

    const params   = new URLSearchParams(window.location.search);
    const initWith = params.get("with");
    const initGig  = params.get("gig");

    function escH(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
    function timeAgo(ts){
      if(!ts) return "";
      const d = ts.toDate ? ts.toDate() : new Date(ts);
      const diff = (Date.now()-d.getTime())/1000;
      if(diff<60) return "just now";
      if(diff<3600) return Math.floor(diff/60)+"m ago";
      if(diff<86400) return Math.floor(diff/3600)+"h ago";
      return d.toLocaleDateString("en-IN",{day:"numeric",month:"short"});
    }

    function showErr(msg){
      document.getElementById("chatHeader").innerHTML=
        '<div style="padding:16px;background:#fee2e2;border-bottom:1px solid #fca5a5;color:#dc2626;font-weight:600">⚠️ '+escH(msg)+'</div>';
    }

    /* ── Load inbox (all conversations) ── */
    async function loadInbox(uid){
      const list = document.getElementById("convList");
      // Skeleton
      list.innerHTML = [1,2,3].map(()=>`
        <div class="conv-skeleton">
          <div class="skel skel-circle"></div>
          <div class="skel-lines">
            <div class="skel skel-line"></div>
            <div class="skel skel-line short"></div>
          </div>
        </div>`).join("");

      const q = query(
        collection(db,"conversations"),
        where("participants","array-contains",uid),
        orderBy("lastMessageAt","desc")
      );

      onSnapshot(q, async snap=>{
        if(snap.empty){
          list.innerHTML = `
            <div class="chat-empty-state" style="padding:40px 20px">
              <div class="icon">💬</div>
              <h3>Koi conversation nahi</h3>
              <p>Jab koi tumhara gig book karega ya tum kisi se message karoge, yahan dikhega.</p>
              <a href="browse.html" style="margin-top:16px;display:inline-block;padding:10px 20px;background:var(--teal,#0d9488);color:#fff;border-radius:8px;font-weight:700;text-decoration:none;font-size:.88rem">🔍 Browse Gigs</a>
            </div>`;
          return;
        }

        // Fetch other user names for all conversations
        const items = await Promise.all(snap.docs.map(async convDoc=>{
          const data = convDoc.data();
          const otherUID = (data.participants||[]).find(p=>p!==uid) || "";
          let otherName = "User";
          let gigTitle  = data.gigTitle || "Gig";
          try {
            // Primary: use gig fields (posterName / workerName) — always available
            const gigId2 = data.gigId;
            if(gigId2){
              const gSnap = await getDoc(doc(db,"gigs",gigId2));
              if(gSnap.exists()){
                const gd = gSnap.data();
                gigTitle = gd.title || gigTitle;
                // If otherUID is the worker, use workerName; else use posterName
                if(gd.workerId === otherUID)  otherName = gd.workerName  || "Worker";
                else if(gd.posterId === otherUID) otherName = gd.posterName || gd.postedByName || "Poster";
              }
            }
            // Fallback: users collection
            if(otherName === "User"){
              const uSnap = await getDoc(doc(db,"users",otherUID));
              if(uSnap.exists()) otherName = uSnap.data().name || uSnap.data().displayName || uSnap.data().fullName || "User";
            }
          } catch(_){}
          return { id: convDoc.id, data, otherUID, otherName, gigTitle };
        }));

        list.innerHTML = items.map(item=>{
          const initials = item.otherName.split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2);
          const isActive = item.id === activeConvId ? " active" : "";
          return `<div class="conv-item${isActive}" data-conv="${escH(item.id)}" data-other="${escH(item.otherUID)}" data-gig="${escH(item.data.gigId||"")}">
            <div class="conv-avatar">${escH(initials)}</div>
            <div class="conv-info">
              <div class="conv-name">${escH(item.otherName)}</div>
              <div class="conv-gig">📌 ${escH(item.gigTitle)}</div>
              <div class="conv-last">${escH(item.data.lastMessage||"Tap to open")}</div>
            </div>
            <div class="conv-time">${timeAgo(item.data.lastMessageAt)}</div>
          </div>`;
        }).join("");

        // Bind click events
        list.querySelectorAll(".conv-item").forEach(el=>{
          el.addEventListener("click",()=>{
            const convId  = el.dataset.conv;
            const other   = el.dataset.other;
            const gig     = el.dataset.gig;
            list.querySelectorAll(".conv-item").forEach(i=>i.classList.remove("active"));
            el.classList.add("active");
            openConversation(other, gig, convId);
            // Mobile: hide sidebar
            document.getElementById("chatSidebar").classList.add("hidden");
          });
        });

        // Auto-open if URL params were passed
        if(initWith && initGig && !activeConvId){
          const ids = [uid, initWith].sort();
          const targetConvId = ids.join("_")+"_"+initGig;
          const match = list.querySelector(`[data-conv="${targetConvId}"]`);
          if(match) match.click();
          else openConversation(initWith, initGig, null);
        }
      }, err=>{
        list.innerHTML=`<div style="padding:20px;color:#dc2626;font-size:.84rem">⚠️ Inbox load failed: ${escH(err.message)}</div>`;
      });
    }

    /* ── Open a conversation ── */
    async function openConversation(otherUID, gigId, knownConvId){
      if(unsubMessages){ unsubMessages(); unsubMessages=null; }

      const header = document.getElementById("chatHeader");
      const msgs   = document.getElementById("messagesContainer");
      const input  = document.getElementById("chatInputBar");

      msgs.innerHTML = '<div style="padding:40px;text-align:center;color:var(--gray-400)">⏳ Loading...</div>';
      input.style.display = "flex";

      // Build convId
      if(!knownConvId){
        const ids = [currentUser.uid, otherUID].sort();
        knownConvId = ids.join("_")+"_"+gigId;
      }
      activeConvId = knownConvId;

      // Ensure conversation doc exists
      const convRef = doc(db,"conversations",knownConvId);
      const convSnap = await getDoc(convRef);
      if(!convSnap.exists()){
        await setDoc(convRef,{
          participants:  [currentUser.uid, otherUID],
          gigId:         gigId,
          createdAt:     serverTimestamp(),
          lastMessageAt: serverTimestamp()
        });
      }

      // Fetch other user name
      let otherName = "User";
      let gigTitle  = "Gig";
      try {
        if(gigId){
          const gSnap = await getDoc(doc(db,"gigs",gigId));
          if(gSnap.exists()){
            const gd = gSnap.data();
            gigTitle = gd.title || "Gig";
            // Resolve other person's name from gig fields
            if(gd.workerId === otherUID)       otherName = gd.workerName  || "Worker";
            else if(gd.posterId === otherUID)   otherName = gd.posterName  || gd.postedByName || "Poster";
          }
        }
        // Fallback: users collection
        if(otherName === "User"){
          const uSnap = await getDoc(doc(db,"users",otherUID));
          if(uSnap.exists()) otherName = uSnap.data().name||uSnap.data().displayName||uSnap.data().fullName||"User";
        }
      } catch(_){}

      const initials = otherName.split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2);
      header.innerHTML = `
        <div style="display:flex;align-items:center;gap:12px;padding:12px 18px;background:var(--surface)">
          <button class="chat-back-btn" id="chatBackBtn" style="display:none">← Back</button>
          <div style="width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--primary,#1a3c5e),var(--teal,#0d9488));color:#fff;font-weight:800;display:flex;align-items:center;justify-content:center">${escH(initials)}</div>
          <div>
            <div style="font-weight:800;font-size:.95rem">${escH(otherName)}</div>
            <div style="font-size:.74rem;color:var(--gray-500)">📌 ${escH(gigTitle)}</div>
                    <div style="font-size:.7rem;color:var(--teal);font-weight:700;margin-top:2px">🆔 Gig ID: <span id="chatGigIdBadge" style="background:rgba(13,148,136,.12);padding:2px 8px;border-radius:20px;letter-spacing:.5px">${escH(data.gigId ? 'GL-'+data.gigId.slice(0,8).toUpperCase() : (gigId ? 'GL-'+gigId.slice(0,8).toUpperCase() : 'Loading...'))}</span></div>
          </div>
        </div>`;

      // Mobile back button
      const backBtn = document.getElementById("chatBackBtn");
      if(backBtn){
        backBtn.style.display="";
        backBtn.addEventListener("click",()=>{
          document.getElementById("chatSidebar").classList.remove("hidden");
          header.innerHTML="";
          msgs.innerHTML="";
          input.style.display="none";
        });
      }

      msgs.innerHTML="";

      // Listen for messages
      const msgsQ = query(collection(db,"conversations",knownConvId,"messages"),orderBy("timestamp","asc"));
      let _msgInitLoad = true;
    unsubMessages = onSnapshot(msgsQ, snap=>{
        const wasAtBottom = msgs.scrollHeight-msgs.scrollTop-msgs.clientHeight < 80;
        snap.docChanges().forEach(change=>{
          if(change.type!=="added") return;
          const m = change.doc.data();
          const isMine = m.senderId===currentUser.uid;
          const div = document.createElement("div");
          div.style.cssText="display:flex;flex-direction:column;margin-bottom:10px";

          if(m.type==="system"){
            div.innerHTML=`<div class="msg-system">${escH(m.text)}</div>`;
          } else if(m.type==="location"){
            div.style.alignItems=isMine?"flex-end":"flex-start";
            div.innerHTML=`<div class="msg-bubble ${isMine?"msg-sent":"msg-recv"}">
              📍 <a href="${escH(m.url)}" target="_blank" rel="noopener noreferrer" style="color:inherit">Location share kiya</a>
              <div class="msg-time">${m.timestamp?new Date(m.timestamp.seconds*1000).toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"}):""}</div>
            </div>`;
          } else if(m.type==="media"){
            div.style.alignItems=isMine?"flex-end":"flex-start";
            const mediaEl = m.mediaType==="video"
              ? `<video src="${escH(m.url)}" controls class="msg-media" style="max-width:200px;border-radius:10px"></video>`
              : `<img src="${escH(m.url)}" alt="media" class="msg-media" style="max-width:200px;border-radius:10px" loading="lazy">`;
            div.innerHTML=`<div class="msg-bubble ${isMine?"msg-sent":"msg-recv"} msg-media">
              ${mediaEl}
              <div class="msg-time">${m.timestamp?new Date(m.timestamp.seconds*1000).toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"}):""}</div>
            </div>`;
          } else {
            div.style.alignItems=isMine?"flex-end":"flex-start";
            div.innerHTML=`<div class="msg-bubble ${isMine?"msg-sent":"msg-recv"}">
              ${escH(m.text||"")}
              <div class="msg-time">${m.timestamp?new Date(m.timestamp.seconds*1000).toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"}):""}</div>
            </div>`;
          }
          msgs.appendChild(div);
          // Play sound for received messages (not on initial load)
          if (!isMine && !_msgInitLoad && typeof _glPlaySound === 'function') {
            _glPlaySound('message');
          }
        });
        _msgInitLoad = false;
        if(wasAtBottom) msgs.scrollTop=msgs.scrollHeight;
      }, err=>{
        showErr("Messages load failed: "+err.message);
      });

      // Store for send functions
      window._activeConv = { convId: knownConvId, otherUID, gigId };
    }

    /* ── Profanity Filter v2 — Roman + Devanagari + spacing bypass ── */

    // Roman / transliterated Hindi + English
    const _BAD_ROMAN = [
      "madarchod","madar chod","madarchood","maadar","bhenchod","bhen chod",
      "behenchod","benchod","bsdk","chutiya","chutiye","choot","chut","lund","lavda","lavde",
      "gandu","gaand","gaandu","randi","harami","kamina","kamine","saala","saali","saale",
      "haramzada","haramzadi","bhosdike","bhosdika","bhosdiwala","bsdke",
      "loda","lode","lodu","jhatu","jhaant","jhaatu",
      "maa ki aankh","teri maa","teri behen","teri ma",
      "bakrichod","bhadwa","bhadwe","rakhail",
      "fuck","fucker","fucking","fck","fuk","fuq",
      "shit","shitt","bullshit","bitch","biatch","asshole","ass hole","arse",
      "bastard","cunt","dick","cock","pussy","whore","slut",
      "motherfucker","mother fucker","nigger","nigga"
    ];

    // Devanagari script gaaliyan (Unicode)
    const _BAD_DEVA = [
      "मादरचोद","मादर चोद",
      "भेनचोद","बहनचोद","भड़वा","भडवा",
      "चूतिया","चुतिया","चूत","चुत",
      "लंड","लण्ड","रंडी","रांड",
      "गांडू","गांड","हरामी",
      "हरामज़ादा","हरामजादा",
      "कमीना","कमीने","साला","साली",
      "लोड़ा","लोडा",
      "झाटू","झाट","बकरीचोद"
    ];

    function containsProfanity(rawText) {
      const lowerRaw = rawText.toLowerCase();
      // 1. Devanagari — direct substring
      for(const w of _BAD_DEVA){
        if(lowerRaw.includes(w)) return true;
      }
      // 2. Roman — normalize leet/symbol bypasses
      const normalized = lowerRaw
        .replace(/[*]/g,'i').replace(/[@]/g,'a').replace(/[$]/g,'s')
        .replace(/[!]/g,'i').replace(/0/g,'o').replace(/3/g,'e')
        .replace(/4/g,'a').replace(/1/g,'i').replace(/5/g,'s').replace(/8/g,'b');
      // Collapse spaces to catch "m a d a r c h o d"
      const collapsed = normalized.replace(/\s+/g,'');
      for(const w of _BAD_ROMAN){
        const wc = w.replace(/\s+/g,'');
        if(collapsed.includes(wc)) return true;
        if(normalized.includes(w)) return true;
      }
      return false;
    }


    /* ── Send message ── */
    window.sendMessage = async function(){
      const input = document.getElementById("msgInput");
      const text  = (input.value||"").trim();
      if(!text || !window._activeConv) return;
      if(containsProfanity(text)){
        input.style.border = "1.5px solid #dc2626";
        setTimeout(()=>{ input.style.border = ""; }, 2000);
        if(typeof showToast==="function")
          showToast("🚫 Abusive language allowed nahi hai. Respectful raho!", "error", 3500);
        return;
      }
      input.value="";
      const { convId } = window._activeConv;
      try {
        await addDoc(collection(db,"conversations",convId,"messages"),{
          senderId: currentUser.uid,
          text, type:"text",
          timestamp: serverTimestamp()
        });
        await setDoc(doc(db,"conversations",convId),{
          lastMessageAt: serverTimestamp(),
          lastMessage: text
        },{merge:true});
        if (typeof _glPlaySound === 'function') _glPlaySound('send');
      } catch(e){ console.error(e); }
    };

    window.sendLocation = async function(){
      if(!window._activeConv){ showToast("Select a conversation to share location.","info"); return; return; }
      if(!navigator.geolocation){ showToast("Location sharing is not supported on this device.","error"); return; return; }
      navigator.geolocation.getCurrentPosition(async pos=>{
        const {latitude:lat,longitude:lng} = pos.coords;
        const url=`https://maps.google.com/?q=${lat},${lng}`;
        const { convId } = window._activeConv;
        await addDoc(collection(db,"conversations",convId,"messages"),{
          senderId:currentUser.uid, type:"location", url, timestamp:serverTimestamp()
        });
        await setDoc(doc(db,"conversations",convId),{lastMessageAt:serverTimestamp(),lastMessage:"📍 Location"},{merge:true});
      },()=>showToast("Location access was denied. Please allow it in browser settings.","error"));
    };

    window.triggerMedia  = ()=>{ document.getElementById("mediaInput").click(); };
    window.handleKeydown = e=>{ if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMessage();} };

    window.uploadMedia = async function(file){
      if(!window._activeConv){ showToast("Select a conversation to share location.","info"); return; return; }
      const { convId } = window._activeConv;
      document.getElementById("uploadBar").style.display="block";
      try{
        const storage = getStorage(getApp());
        const ref = storageRef(storage,`chat-media/${convId}/${Date.now()}_${file.name}`);
        await uploadBytes(ref,file);
        const url = await getDownloadURL(ref);
        const isImage = file.type.startsWith("image/");
        await addDoc(collection(db,"conversations",convId,"messages"),{
          senderId:currentUser.uid, type:"media",
          mediaType: isImage?"image":"video",
          url, timestamp:serverTimestamp()
        });
        await setDoc(doc(db,"conversations",convId),{
          lastMessageAt:serverTimestamp(),
          lastMessage:isImage?"📷 Photo":"🎥 Video"
        },{merge:true});
      }catch(e){ showToast("File upload failed. Please try a smaller file.","error"); }
      document.getElementById("uploadBar").style.display="none";
    };

    /* ── Auth guard ── */
    onAuthStateChanged(auth, async user=>{
      if(!user){
        window.location.href="login.html?redirect=chat.html";
        return;
      }
      currentUser = user;
      await loadInbox(user.uid);
    });
  </script>

  <meta name="twitter:title"      content="Chat — GigLega">

</head>
<body>
  <div id="announce-bar"></div>
  <nav id="main-nav"></nav>
  <script src="shared.js?v=20260411" defer></script>

  <div class="chat-shell">
    <!-- Sidebar: conversation list -->
    <div class="chat-sidebar" id="chatSidebar">
      <div class="chat-sidebar-header">
        💬 Messages
      </div>
      <div class="chat-sidebar-list" id="convList">
        <!-- Filled by JS -->
      </div>
    </div>

    <!-- Main: open conversation -->
    <div class="chat-main">
      <div id="chatHeader"></div>
      <div id="uploadBar" class="uploading-bar" style="display:none"></div>
      <div id="messagesContainer">
        <!-- Empty state when no conversation selected -->
        <div class="chat-empty-state">
          <div class="icon">💬</div>
          <h3>Koi chat select nahi hai</h3>
          <p>Left side se conversation choose karo ya kisi gig se message karo.</p>
        </div>
      </div>

      <!-- Input bar -->
      <div class="chat-input-bar" id="chatInputBar" style="display:none">
        <div id="uploadBar2" class="uploading-bar" style="display:none"></div>
        <div class="chat-input-row">
          <button class="chat-input-btn" onclick="sendLocation()"
            style="background:var(--surface-offset,#f3f0ec)" title="Share Location">📍</button>
          <button class="chat-input-btn" onclick="triggerMedia()"
            style="background:var(--surface-offset,#f3f0ec)" title="Photo / Video">📷</button>
          <input type="text" id="msgInput" placeholder="Type your message…"
            aria-label="Type your message…"
            onkeydown="handleKeydown(event)"
            style="flex:1;padding:10px 14px;border:1.5px solid var(--gray-200,#e5e7eb);border-radius:20px;background:var(--bg);color:var(--text);font-family:var(--font);font-size:.9rem" />
          <button class="chat-input-btn" onclick="sendMessage()"
            style="background:linear-gradient(135deg,var(--primary,#1a3c5e),var(--teal,#0d9488));color:#fff">➤</button>
        </div>
      </div>
    </div>
  </div>

  <input type="file" id="mediaInput" accept="image/*,video/*" style="display:none"
    onchange="if(this.files[0]) uploadMedia(this.files[0])" />

  <!-- Report / Block User Modal -->
  <div class="report-modal-overlay" id="reportModalOverlay">
    <div class="report-modal" role="dialog" aria-modal="true" aria-labelledby="reportModalTitle">
      <h3 id="reportModalTitle">Report User</h3>
      <p>Is there a problem? Tell us what happened and we'll review it.</p>
      <div class="report-reason-list" id="reportReasonList">
        <div class="report-reason-item" data-reason="spam">Spam or fake gig</div>
        <div class="report-reason-item" data-reason="harassment">Harassment or abusive language</div>
        <div class="report-reason-item" data-reason="fraud">Fraud or payment issue</div>
        <div class="report-reason-item" data-reason="no_show">Didn't show up for the gig</div>
        <div class="report-reason-item" data-reason="other">Other</div>
      </div>
      <div class="report-modal-actions">
        <button class="btn-report-cancel" onclick="closeReportModal()">Cancel</button>
        <button class="btn-report-submit" onclick="submitReport()">Submit Report</button>
      </div>
    </div>
  </div>

  <script>
    var _reportTargetUID = null;
    var _selectedReason  = null;

    function openReportModal(uid){
      _reportTargetUID = uid;
      _selectedReason  = null;
      document.querySelectorAll('.report-reason-item').forEach(function(el){
        el.classList.remove('selected');
        el.onclick = function(){
          document.querySelectorAll('.report-reason-item').forEach(function(e){ e.classList.remove('selected'); });
          el.classList.add('selected');
          _selectedReason = el.dataset.reason;
        };
      });
      document.getElementById('reportModalOverlay').classList.add('show');
    }

    function closeReportModal(){
      document.getElementById('reportModalOverlay').classList.remove('show');
      _reportTargetUID = null; _selectedReason = null;
    }

    async function submitReport(){
      if(!_selectedReason){ showToast('Please select a reason.','error'); return; return; }
      var reporter = (typeof currentUser !== 'undefined') ? currentUser : null;
      if(!reporter){ closeReportModal(); return; }
      try {
        const { db }        = await import('./firebase-config.js');
        const { addDoc, collection, serverTimestamp } =
          await import('https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js');
        await addDoc(collection(db,'reports'),{
          reporterId:  reporter.uid,
          reportedUID: _reportTargetUID,
          reason:      _selectedReason,
          createdAt:   serverTimestamp(),
          status:      'pending'
        });
        closeReportModal();
        if(typeof showToast==='function') showToast('Report submitted. We will review it.','success');
      } catch(e){
        closeReportModal();
        if(typeof showToast==='function') showToast('Report failed. Try again.','error');
      }
    }

    // Close on overlay click
    document.getElementById('reportModalOverlay').addEventListener('click', function(e){
      if(e.target === this) closeReportModal();
    });
  </script>

</body>
