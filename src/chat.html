<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messages — GigLega</title>
  <meta name="description" content="GigLega messaging — clients aur workers ke beech direct, secure chat." />
  <link rel="stylesheet" href="styles.css" />
  <script type="module">
    import { auth, db } from './firebase-config.js';
    import { collection, doc, getDoc, setDoc, addDoc, query, where, orderBy, onSnapshot, Timestamp, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';
    import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';

    let currentUser = null;
    let otherUserId = null;
    let gigId = null;
    let convId = null;
    let unsubMessages = null;

    // Get URL params
    const params = new URLSearchParams(window.location.search);
    otherUserId = params.get('with');
    gigId = params.get('gig');

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = 'login.html?redirect=chat.html';
        return;
      }
      currentUser = user;
      if (otherUserId && gigId) {
        await loadChat();
      } else {
        document.getElementById('chatWindow').innerHTML = '<div style="padding:40px;text-align:center;color:var(--gray-400)">No conversation selected. Please select a gig and user to chat with.</div>';
      }
    });

    async function loadChat() {
      // Create conversation ID: sorted userIds + gigId
      const ids = [currentUser.uid, otherUserId].sort();
      convId = ids.join('_') + '_' + gigId;

      // Create or get conversation doc
      const convRef = doc(db, 'conversations', convId);
      const convSnap = await getDoc(convRef);
      if (!convSnap.exists()) {
        await setDoc(convRef, {
          participants: [currentUser.uid, otherUserId],
          gigId: gigId,
          createdAt: serverTimestamp(),
          lastMessageAt: serverTimestamp()
        });
      }

      // Load other user info
      const otherUserSnap = await getDoc(doc(db, 'users', otherUserId));
      const otherUser = otherUserSnap.exists() ? otherUserSnap.data() : { name: 'User' };

      // Load gig info
      const gigSnap = await getDoc(doc(db, 'gigs', gigId));
      const gig = gigSnap.exists() ? gigSnap.data() : { title: 'Gig' };

      // Render header
      renderHeader(otherUser, gig);

      // Listen to messages real-time
      const messagesRef = collection(db, 'conversations', convId, 'messages');
      const q = query(messagesRef, orderBy('timestamp', 'asc'));
      unsubMessages = onSnapshot(q, (snapshot) => {
        renderMessages(snapshot.docs.map(d => ({id: d.id, ...d.data()})));
      });
    }

    function renderHeader(otherUser, gig) {
      const initials = (otherUser.name || 'U').split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2);
      document.getElementById('chatHeader').innerHTML = `
        <div style="display:flex;align-items:center;gap:14px;padding:16px 24px;background:var(--surface);border-bottom:1.5px solid var(--gray-200)">
          <div style="width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--teal));display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff">${escH(initials)}</div>
          <div style="flex:1">
            <div style="font-weight:800;color:var(--primary)">${escH(otherUser.name || 'User')}</div>
            <div style="font-size:.78rem;color:var(--gray-400)">${escH(gig.title || 'Gig')}</div>
          </div>
        </div>
      `;
    }

    function renderMessages(messages) {
      const container = document.getElementById('messagesContainer');
      container.innerHTML = messages.map(msg => {
        const isSent = msg.senderId === currentUser.uid;
        const time = msg.timestamp ? new Date(msg.timestamp.seconds * 1000).toLocaleTimeString('en-IN', {hour:'2-digit',minute:'2-digit'}) : '';
        return `
          <div style="display:flex;align-items:flex-end;gap:8px;margin-bottom:12px;${isSent ? 'flex-direction:row-reverse' : ''}">
            <div style="max-width:68%;padding:10px 14px;border-radius:16px;font-size:.88rem;line-height:1.6;${isSent ? 'background:linear-gradient(135deg,var(--primary),var(--teal));color:#fff;border-radius:16px 16px 4px 16px' : 'background:var(--surface);border:1.5px solid var(--gray-200);border-radius:16px 16px 16px 4px;color:var(--text)'}">
              ${escH(msg.text)}
              <div style="font-size:.7rem;margin-top:4px;opacity:.7">${time}</div>
            </div>
          </div>
        `;
      }).join('');
      container.scrollTop = container.scrollHeight;
    }

    async function sendMessage() {
      const input = document.getElementById('msgInput');
      const text = input.value.trim();
      if (!text || !convId) return;

      try {
        const messagesRef = collection(db, 'conversations', convId, 'messages');
        await addDoc(messagesRef, {
          text: text,
          senderId: currentUser.uid,
          timestamp: serverTimestamp()
        });

        // Update conversation lastMessageAt
        await setDoc(doc(db, 'conversations', convId), {
          lastMessageAt: serverTimestamp(),
          lastMessage: text
        }, { merge: true });

        input.value = '';
      } catch(e) {
        console.error('Send failed:', e);
      }
    }

    function escH(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // Attach to window for onclick
    window.sendMessage = sendMessage;
    window.handleKeydown = function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    };
  </script>
</head>
<body>
  <div id="nav"></div>
  <script src="shared.js"></script>

  <div style="height:calc(100vh - 64px);display:flex;flex-direction:column;background:var(--bg)">
    <div id="chatHeader"></div>
    <div id="messagesContainer" style="flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:4px"></div>
    <div style="background:var(--surface);border-top:1.5px solid var(--gray-200);padding:12px 16px">
      <div style="display:flex;align-items:flex-end;gap:9px">
        <input type="text" id="msgInput" placeholder="Type your message…" onkeydown="handleKeydown(event)" style="flex:1;padding:10px 14px;border:1.5px solid var(--gray-200);border-radius:20px;background:var(--bg);color:var(--text);font-family:var(--font);font-size:.9rem" />
        <button onclick="sendMessage()" style="width:40px;height:40px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--primary),var(--teal));color:#fff;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center">➤</button>
      </div>
    </div>
  </div>
</body>
</html>
