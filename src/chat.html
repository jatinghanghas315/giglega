<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messages — GigLega</title>
  <meta name="description" content="GigLega messaging — clients aur workers ke beech direct, secure chat." />
  <link rel="stylesheet" href="styles.css" />
  <script type="module">
    import { auth, db } from './firebase-config.js';
    import { collection, doc, getDoc, setDoc, addDoc, query, orderBy, onSnapshot, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';
    import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';

    let currentUser = null;
    let convId = null;

    const params   = new URLSearchParams(window.location.search);
    const otherUID = params.get('with');
    const gigId    = params.get('gig');

    function escH(s) {
      return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function showErr(msg) {
      document.getElementById('chatHeader').innerHTML =
        '<div style="padding:16px 20px;background:#fee2e2;border-bottom:1px solid #fca5a5;color:#dc2626;font-size:.85rem;font-weight:600">⚠️ ' + escH(msg) + '</div>';
    }

    /* ── Load & subscribe to chat ── */
    async function loadChat() {
      const ids = [currentUser.uid, otherUID].sort();
      convId    = ids.join('_') + '_' + gigId;

      const convRef  = doc(db, 'conversations', convId);
      const convSnap = await getDoc(convRef);
      if (!convSnap.exists()) {
        await setDoc(convRef, {
          participants:  [currentUser.uid, otherUID],
          gigId:         gigId,
          createdAt:     serverTimestamp(),
          lastMessageAt: serverTimestamp()
        });
      }

      const [otherSnap, gigSnap] = await Promise.all([
        getDoc(doc(db, 'users', otherUID)),
        getDoc(doc(db, 'gigs',  gigId))
      ]);
      const otherUser = otherSnap.exists() ? otherSnap.data() : { name: 'User' };
      const gig       = gigSnap.exists()   ? gigSnap.data()   : { title: 'Gig' };

      renderHeader(otherUser, gig);

      const msgsRef = collection(db, 'conversations', convId, 'messages');
      onSnapshot(query(msgsRef, orderBy('timestamp', 'asc')), snap => {
        renderMessages(snap.docs.map(d => ({ id: d.id, ...d.data() })));
      });
    }

    function renderHeader(otherUser, gig) {
      const initials = (otherUser.name || 'U').split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2);
      document.getElementById('chatHeader').innerHTML = `
        <div style="display:flex;align-items:center;gap:14px;padding:16px 24px;background:var(--surface);border-bottom:1.5px solid var(--gray-200)">
          <a href="browse.html" style="color:var(--teal);font-size:1.2rem;text-decoration:none" title="Back">←</a>
          <div style="width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--teal));display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;flex-shrink:0">${escH(initials)}</div>
          <div style="flex:1;min-width:0">
            <div style="font-weight:800;color:var(--primary)">${escH(otherUser.name || 'User')}</div>
            <div style="font-size:.78rem;color:var(--gray-400);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escH(gig.title || 'Gig')}</div>
          </div>
        </div>`;
    }

    function renderMessages(messages) {
      const container = document.getElementById('messagesContainer');
      if (!messages.length) {
        container.innerHTML = '<div style="text-align:center;color:var(--gray-400);padding:40px 20px;font-size:.85rem">Koi message nahi hai abhi. Pehla message bhejo! 👋</div>';
        return;
      }
      container.innerHTML = messages.map(msg => {
        const isSent = msg.senderId === currentUser.uid;
        const time   = msg.timestamp ? new Date(msg.timestamp.seconds * 1000).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}) : '';
        return `<div style="display:flex;align-items:flex-end;gap:8px;margin-bottom:12px;${isSent ? 'flex-direction:row-reverse' : ''}">
          <div style="max-width:70%;padding:10px 14px;border-radius:16px;font-size:.88rem;line-height:1.6;word-break:break-word;${isSent
            ? 'background:linear-gradient(135deg,var(--primary),var(--teal));color:#fff;border-radius:16px 16px 4px 16px'
            : 'background:var(--surface);border:1.5px solid var(--gray-200);border-radius:16px 16px 16px 4px;color:var(--text)'}">
            ${escH(msg.text)}
            <div style="font-size:.7rem;margin-top:4px;opacity:.7">${time}</div>
          </div>
        </div>`;
      }).join('');
      container.scrollTop = container.scrollHeight;
    }

    async function sendMessage() {
      if (!convId || !currentUser) return;
      const input = document.getElementById('msgInput');
      const text  = input.value.trim();
      if (!text) return;

      const btn = document.querySelector('#chatInputRow button');
      if (btn) btn.disabled = true;

      try {
        await addDoc(collection(db, 'conversations', convId, 'messages'), {
          text:      text,
          senderId:  currentUser.uid,
          timestamp: serverTimestamp()
        });
        await setDoc(doc(db, 'conversations', convId), {
          lastMessageAt: serverTimestamp(),
          lastMessage:   text
        }, { merge: true });
        input.value = '';
      } catch(e) {
        showErr('Message send failed: ' + e.message);
      } finally {
        if (btn) btn.disabled = false;
      }
    }

    window.sendMessage   = sendMessage;
    window.handleKeydown = function(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    };

    /* ── Auth guard + init ── */
    onAuthStateChanged(auth, async user => {
      if (!user) {
        window.location.href = 'login.html?redirect=' + encodeURIComponent(window.location.href);
        return;
      }
      currentUser = user;

      if (!otherUID || !gigId) {
        document.getElementById('messagesContainer').innerHTML =
          '<div style="padding:40px;text-align:center;color:var(--gray-400)">Koi conversation select nahi hai. Gig detail pe jao aur "Message Poster" click karo.</div>';
        return;
      }

      document.getElementById('chatHeader').innerHTML =
        '<div style="padding:14px 20px;color:var(--gray-400);font-size:.84rem">⏳ Chat load ho raha hai...</div>';

      try {
        await loadChat();
      } catch(err) {
        console.error('Chat error:', err);
        showErr('Chat load failed: ' + err.message + ' — Check Firestore rules.');
      }
    });
  </script>
</head>
<body>
  <div id="nav"></div>
  <script src="shared.js"></script>

  <div style="height:calc(100vh - 64px);display:flex;flex-direction:column;background:var(--bg)">
    <div id="chatHeader"></div>
    <div id="messagesContainer" style="flex:1;overflow-y:auto;padding:20px 16px;display:flex;flex-direction:column"></div>
    <div id="chatInputRow" style="background:var(--surface);border-top:1.5px solid var(--gray-200);padding:12px 16px">
      <div style="display:flex;align-items:center;gap:9px">
        <input type="text" id="msgInput" placeholder="Type your message…" onkeydown="handleKeydown(event)"
          style="flex:1;padding:10px 14px;border:1.5px solid var(--gray-200);border-radius:20px;background:var(--bg);color:var(--text);font-family:var(--font);font-size:.9rem" />
        <button onclick="sendMessage()"
          style="width:40px;height:40px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--primary),var(--teal));color:#fff;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0">➤</button>
      </div>
    </div>
  </div>
</body>
</html>
