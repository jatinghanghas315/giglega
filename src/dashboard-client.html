<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Poster Dashboard — GigLega</title>
  <meta name="description" content="GigLega poster dashboard — apne posted gigs manage karo." />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="stylesheet" href="styles.css" />  
  <link rel="stylesheet" href="theme-dark.css" />
    
  <link rel="stylesheet" href="mobile.css?v=20260410-1828" />
<script src="shared.js" defer></script>
    <script>
          if ('serviceWorker' in navigator && !sessionStorage.getItem('gl_sw_cleared')) {
                  sessionStorage.setItem('gl_sw_cleared', '1');
                  navigator.serviceWorker.getRegistrations().then(function(regs) {
                            Promise.all(regs.map(function(r){return r.unregister();})).then(function() {
                                        caches.keys().then(function(keys) {
                                                      Promise.all(keys.map(function(k){return caches.delete(k);})).then(function(){window.location.reload();});
                                                    });
                                      });
                          });
                }
              </script>
  <style>
    .dash-wrap{max-width:1000px;margin:0 auto;padding:28px 16px 80px}

    /* ── Top bar ── */
    .dash-topbar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:24px}
    .dash-greeting h1{font-size:1.4rem;font-weight:800;color:var(--primary);margin-bottom:2px}
    .dash-greeting p{font-size:.85rem;color:var(--gray-500)}
    .topbar-actions{display:flex;gap:10px;flex-wrap:wrap}
    .btn-switch-role{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border:1.5px solid var(--teal);border-radius:var(--radius-sm);background:transparent;color:var(--teal);font-weight:700;font-size:.83rem;cursor:pointer;transition:all .2s}
    .btn-switch-role:hover{background:var(--teal);color:#fff}
    .btn-post-new{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;background:var(--primary);color:#fff;border:none;border-radius:var(--radius-sm);font-weight:700;font-size:.83rem;cursor:pointer;transition:opacity .2s}
    .btn-post-new:hover{opacity:.88}

    /* ── Stats ── */
    .stats-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:16px;margin-bottom:24px}
    .stat-card{background:var(--surface);border:1.5px solid var(--gray-200);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow-sm)}
    .stat-label{font-size:.75rem;font-weight:700;color:var(--gray-400);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
    .stat-value{font-size:1.6rem;font-weight:800;color:var(--primary)}
    .stat-sub{font-size:.75rem;color:var(--gray-400);margin-top:3px}
    .stat-card.teal .stat-value{color:var(--teal)}
    .stat-card.amber .stat-value{color:var(--accent)}
    .stat-card.danger .stat-value{color:var(--danger)}

    /* ── Tabs ── */
    .tab-bar{display:flex;gap:4px;border-bottom:2px solid var(--gray-200);margin-bottom:20px;overflow-x:auto}
    .tab-btn{padding:10px 20px;border:none;background:transparent;font-weight:600;font-size:.88rem;color:var(--gray-500);cursor:pointer;border-bottom:2.5px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:all .2s}
    .tab-btn.active{color:var(--primary);border-bottom-color:var(--primary)}
    .tab-btn:hover:not(.active){color:var(--gray-700)}
    .tab-panel{display:none}
    .tab-panel.active{display:block}

    /* ── Gig cards ── */
    .gig-card{background:var(--surface);border:1.5px solid var(--gray-200);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow-sm);margin-bottom:14px}
    .gig-card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:10px;flex-wrap:wrap}
    .gig-card-title{font-size:.97rem;font-weight:700;color:var(--text)}
    .gig-card-meta{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
    .gig-meta-chip{font-size:.73rem;color:var(--gray-500);display:flex;align-items:center;gap:3px}

    /* Status badges */
    .s-badge{font-size:.72rem;font-weight:700;padding:4px 11px;border-radius:10px;white-space:nowrap}
    .s-open{background:rgba(16,185,129,.1);color:#059669}
    .s-taken{background:rgba(245,158,11,.1);color:#b45309}
    .s-completed{background:rgba(107,114,128,.1);color:#374151}

    /* ── Worker applicant row ── */
    .worker-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 14px;background:var(--gray-50);border:1px solid var(--gray-200);border-radius:var(--radius-sm);flex-wrap:wrap}
    .worker-info{display:flex;align-items:center;gap:10px}
    .worker-avatar{width:36px;height:36px;border-radius:50%;background:var(--teal);color:#fff;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;flex-shrink:0}
    .worker-name{font-size:.88rem;font-weight:700;color:var(--text)}
    .worker-phone{font-size:.77rem;color:var(--gray-500)}
    .worker-actions{display:flex;gap:8px;flex-wrap:wrap}

    /* ── Mark complete ── */
    .complete-bar{background:rgba(16,185,129,.06);border:1.5px solid #6ee7b7;border-radius:var(--radius-sm);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-top:12px}
    .complete-bar-text{font-size:.83rem;color:var(--gray-600);flex:1}
    .btn-mark-complete{padding:9px 18px;background:var(--success);color:#fff;border:none;border-radius:var(--radius-sm);font-weight:700;font-size:.82rem;cursor:pointer;transition:opacity .2s;white-space:nowrap}
    .btn-mark-complete:hover{opacity:.88}
    .btn-mark-complete:disabled{opacity:.5;cursor:not-allowed}

    /* ── Cash fee prompt ── */
    .cash-fee-prompt{background:rgba(245,158,11,.08);border:1.5px solid var(--accent);border-radius:var(--radius-sm);padding:14px 16px;margin-top:12px;display:none}
    .cash-fee-prompt.show{display:block}
    .cash-fee-title{font-size:.85rem;font-weight:700;color:#b45309;margin-bottom:6px}
    .cash-fee-desc{font-size:.8rem;color:var(--gray-600);line-height:1.5;margin-bottom:10px}
    .btn-pay-fee{padding:9px 18px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-weight:700;font-size:.82rem;cursor:pointer}

    /* ── Empty ── */
    .empty-box{text-align:center;padding:40px 24px;color:var(--gray-400);background:var(--surface);border:1.5px dashed var(--gray-200);border-radius:var(--radius)}
    .empty-box .ei{font-size:2.5rem;margin-bottom:10px}
    .empty-box p{font-size:.88rem;line-height:1.6}

    /* Dark mode */
    [data-theme=dark] .stat-card{border-color:var(--gray-700)}
    [data-theme=dark] .gig-card{border-color:var(--gray-700)}
    [data-theme=dark] .tab-bar{border-color:var(--gray-700)}
    [data-theme=dark] .worker-row{background:var(--gray-800);border-color:var(--gray-700)}
    [data-theme=dark] .empty-box{border-color:var(--gray-700)}
    [data-theme=dark] .complete-bar{background:rgba(16,185,129,.08)}
    [data-theme=dark] .complete-bar-text{color:var(--gray-300)}
    [data-theme=dark] .cash-fee-desc{color:var(--gray-400)}
  </style>
</head>
<body>
  <div id="announce-bar"></div>
  <nav id="main-nav"></nav>

  <main class="page-wrapper">
    <div class="dash-wrap">

      <nav id="breadcrumb" aria-label="breadcrumb"></nav>

      <!-- Top bar -->
      <div class="dash-topbar">
        <div class="dash-greeting">
          <h1 id="greetingText">Welcome back! 👋</h1>
          <p>Poster Dashboard — Manage your posted gigs</p>
        </div>
        <div class="topbar-actions">
          <button class="btn-switch-role" id="btnSwitchRole">🔄 Switch to Worker Mode</button>
          <button class="btn-post-new" onclick="window.location.href='post-gig.html'">+ Post a New Gig</button>
        </div>
      </div>

      <!-- Stats -->
      
    <!-- 🔑 OTP Card — appears when worker requests completion -->
    <div id="otpCard" style="display:none;margin-bottom:24px;">
      <div style="background:var(--surface);border:2px solid rgba(245,158,11,.4);border-radius:var(--radius);
        padding:20px 22px;box-shadow:0 4px 16px rgba(245,158,11,.15);">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">
          <span style="font-size:1.5rem;">🔑</span>
          <div>
            <div style="font-size:.95rem;font-weight:800;color:var(--text);">Worker ne OTP manga!</div>
            <div style="font-size:.78rem;color:var(--gray-400);" id="otpGigTitle">—</div>
          </div>
          <span style="margin-left:auto;width:10px;height:10px;background:#f59e0b;border-radius:50%;
            animation:pulse-otp 1.2s ease-in-out infinite;flex-shrink:0;"></span>
        </div>
        <div style="font-size:.82rem;color:var(--gray-500);margin-bottom:12px;">
          Yeh OTP worker ko batao. Jab worker complete kare tab OTP enter karega.
        </div>
        <div style="display:flex;gap:8px;justify-content:center;margin-bottom:8px;" id="otpDisplay">
          <!-- digits filled by JS -->
        </div>
        <div style="text-align:center;font-size:.72rem;color:var(--gray-400);" id="otpExpiry"></div>
      </div>
    </div>
    <style>
      @keyframes pulse-otp{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.5);opacity:.5}}
    </style>

    <div class="stats-row">
        <div class="stat-card">
          <div class="stat-label">Total Posted</div>
          <div class="stat-value" id="statTotal">0</div>
          <div class="stat-sub">All time</div>
        </div>
        <div class="stat-card teal">
          <div class="stat-label">Open</div>
          <div class="stat-value" id="statOpen">0</div>
          <div class="stat-sub">Awaiting worker</div>
        </div>
        <div class="stat-card amber">
          <div class="stat-label">In Progress</div>
          <div class="stat-value" id="statProgress">0</div>
          <div class="stat-sub">Worker accepted</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Completed</div>
          <div class="stat-value" id="statCompleted">0</div>
          <div class="stat-sub">All time</div>
        </div>
        <div class="stat-card danger">
          <div class="stat-label">Total Spent</div>
          <div class="stat-value" id="statSpent">₹0</div>
          <div class="stat-sub">On completed gigs</div>
        </div>
      </div>

      <!-- Tabs -->
      <div class="tab-bar">
        <button class="tab-btn active" data-tab="open">🟢 Open (<span id="tabCountOpen">0</span>)</button>
        <button class="tab-btn" data-tab="progress">⚡ In Progress (<span id="tabCountProgress">0</span>)</button>
        <button class="tab-btn" data-tab="completed">✅ Completed (<span id="tabCountCompleted">0</span>)</button>
        <button class="tab-btn" data-tab="all">📋 All Gigs</button>
      </div>

      <div id="tabOpen"      class="tab-panel active"></div>
      <div id="tabProgress"  class="tab-panel"></div>
      <div id="tabCompleted" class="tab-panel"></div>
      <div id="tabAll"       class="tab-panel"></div>

    </div>
  </main>

  <footer id="main-footer"></footer>
  <div id="toast-container"></div>

<script type="module">
import { auth, db } from './firebase-config.js';
import { collection, query, where, onSnapshot, doc, updateDoc, deleteDoc } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';
import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';

var FEE_RATE = 0.06;
var currentUser = null;
var unsubscribe = null;

/* ── Auth guard ── */
onAuthStateChanged(auth, function(user) {
  if (!user) {
    window.location.href = 'login.html?redirect=dashboard-client.html';
    return;
  }
  currentUser = user;
      loadOTPCard(user.uid);
  /* Greeting */
  var hour = new Date().getHours();
  var greet = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';
  document.getElementById('greetingText').textContent = greet + ', ' + (user.displayName || 'Poster') + '! 👋';
  /* Load gigs */
  loadMyGigs(user.uid);
});

/* ── Tabs ── */
document.querySelectorAll('.tab-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
    document.querySelectorAll('.tab-panel').forEach(function(p){ p.classList.remove('active'); });
    btn.classList.add('active');
    document.getElementById('tab' + capitalize(btn.dataset.tab)).classList.add('active');
  });
});

function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

/* ── Load gigs from Firestore ── */
function loadMyGigs(uid) {
  var q = query(collection(db, 'gigs'), where('posterId', '==', uid));
  if (unsubscribe) unsubscribe();
  unsubscribe = onSnapshot(q, function(snapshot) {
    var mine = [];
    snapshot.forEach(function(docSnap) {
      mine.push(Object.assign({ id: docSnap.id }, docSnap.data()));
    });
    renderAll(mine);
  }, function(err) {
    console.error('Error loading gigs:', err);
    if (typeof showToast === 'function') showToast('❌ Error loading gigs: ' + err.message, 'error');
  });
}

/* ── Render ── */
function renderAll(mine) {
  var open = mine.filter(function(g){ return g.status === 'open'; });
  var progress = mine.filter(function(g){ return g.status === 'taken'; });
  var completed = mine.filter(function(g){ return g.status === 'completed'; });
  /* Stats */
  document.getElementById('statTotal').textContent = mine.length;
  document.getElementById('statOpen').textContent = open.length;
  document.getElementById('statProgress').textContent = progress.length;
  document.getElementById('statCompleted').textContent = completed.length;
  var totalSpent = 0;
  completed.forEach(function(g){ totalSpent += g.budget || 0; });
  document.getElementById('statSpent').textContent = '₹' + totalSpent;
  /* Tab counts */
  document.getElementById('tabCountOpen').textContent = open.length;
  document.getElementById('tabCountProgress').textContent = progress.length;
  document.getElementById('tabCountCompleted').textContent = completed.length;
  /* Render panels */
  renderPanel('tabOpen', open, 'open');
  renderPanel('tabProgress', progress, 'taken');
  renderPanel('tabCompleted', completed, 'completed');
  renderPanel('tabAll', mine, 'all');
}

function renderPanel(elId, gigs, status) {
  var el = document.getElementById(elId);
  if (gigs.length === 0) {
    var msgs = {
      open: ['No open gigs.', 'Post a new gig to find workers in your area.'],
      taken: ['No gigs in progress.', 'Once a worker accepts your gig, it appears here.'],
      completed: ['No completed gigs yet.', 'Completed gigs will show up here with payment history.'],
      all: ['You haven\'t posted any gigs yet.', 'Click \'Post a New Gig\' to get started!']
    };
    var m = msgs[status] || msgs.all;
    el.innerHTML = emptyHtml(m[0], m[1]);
    return;
  }
  el.innerHTML = gigs.map(function(g){ return gigCardHtml(g); }).join('');
  bindCardActions(el);
}

function timeAgo(iso) {
  if (!iso) return 'just now';
  var d = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
  if (d < 60) return d + 's ago';
  if (d < 3600) return Math.floor(d/60) + 'm ago';
  if (d < 86400) return Math.floor(d/3600) + 'h ago';
  return Math.floor(d/86400) + 'd ago';
}

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function gigCardHtml(g) {
  var badge = g.status === 'open' ? '<span class="s-badge s-open">🟢 Open</span>' :
              g.status === 'taken' ? '<span class="s-badge s-taken">⚡ In Progress</span>' :
              '<span class="s-badge s-completed">✅ Completed</span>';
  var pay = g.budget ? '₹' + g.budget + (g.payType === 'hourly' ? '/hr' : g.payType === 'daily' ? '/day' : g.payType === 'weekly' ? '/wk' : '') : 'Pay TBD';
  return '<div class="gig-card" data-gig-id="' + g.id + '">' +
    '<div class="gig-card-head"><div class="gig-card-title">' + escHtml(g.title) + '</div>' + badge + '</div>' +
    '<div class="gig-card-meta">' +
    (g.location ? '<span class="gig-meta-chip">📍 ' + escHtml(g.location) + '</span>' : '') +
    '<span class="gig-meta-chip">🕒 ' + timeAgo(g.createdAt) + '</span>' +
    '<span class="gig-meta-chip">💰 ' + pay + '</span>' +
    '<span class="gig-meta-chip">👥 ' + (g.workers||1) + ' worker(s)</span>' +
    '</div>' +
    (g.category ? '<div style="margin-bottom:8px"><span style="background:rgba(13,148,136,.08);border:1px solid rgba(13,148,136,.15);border-radius:5px;padding:2px 9px;font-size:.7rem;font-weight:700;color:var(--teal)">' + escHtml(g.category) + '</span></div>' : '') +
    '<div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">' +
    (g.status === 'taken' && g.workerId
      ? ('<div class="worker-row" style="width:100%;margin-bottom:8px">' +
           '<div class="worker-info">' +
             '<div class="worker-avatar">' + escHtml((g.workerName||'W').split(' ').map(function(w){return w[0];}).join('').toUpperCase().slice(0,2)) + '</div>' +
             '<div><div class="worker-name">' + escHtml(g.workerName||'Worker') + '</div>' +
             '<div class="worker-phone">🔧 Working on this gig</div></div>' +
           '</div>' +
           '<div class="worker-actions">' +
             '<a href="chat.html?with=' + encodeURIComponent(g.workerId) + '&gig=' + encodeURIComponent(g.id) + '" class="btn btn-sm btn-primary">💬 Chat</a>' +
             '<a href="gig-detail.html?id=' + encodeURIComponent(g.id) + '" class="btn btn-sm btn-outline">View Gig</a>' +
           '</div>' +
         '</div>')
      : '<a href="gig-detail.html?id=' + encodeURIComponent(g.id) + '" class="btn btn-sm btn-outline">View →</a>') +
    (g.status === 'open' ? '<button class="btn btn-sm btn-danger" data-delete-id="' + g.id + '">🗑️ Delete</button>' : '') +
    (g.status === 'completed' && g.workerId
      ? '<a href="chat.html?with=' + encodeURIComponent(g.workerId) + '&gig=' + encodeURIComponent(g.id) + '" class="btn btn-sm btn-outline">💬 Worker</a>'
      : '') +
    '</div>' +
    '</div>';
}

function bindCardActions(container) {
  container.querySelectorAll('[data-delete-id]').forEach(function(btn) {
    btn.addEventListener('click', async function() {
      var gigId = btn.getAttribute('data-delete-id');
      if (!confirm('Delete this gig? This cannot be undone.')) return;
      try {
        await deleteDoc(doc(db, 'gigs', gigId));
        if (typeof showToast === 'function') showToast('Gig deleted.', 'success');
      } catch(err) {
        if (typeof showToast === 'function') showToast('❌ Error: ' + err.message, 'error');
      }
    });
  });
}

function emptyHtml(title, sub) {
  return '<div class="empty-box"><div class="ei">📭</div><p><strong>' + title + '</strong><br>' + sub + '</p></div>';
}

/* Role switch */
document.getElementById('btnSwitchRole').addEventListener('click', function() {
  window.location.href = 'dashboard-worker.html';
});



    /* ── OTP Card (onSnapshot) ── */
    var _otpUnsub = null;
    function listenOTPCard(posterId){
      if(typeof firebase !== 'undefined' || !window._fsOnSnapshot) return;
      // Import required Firestore functions via module scope — handled below
    }
    async function loadOTPCard(posterId){
      try {
        // query for gigs with completionRequested == true
        var q = window._fsQuery(
          window._fsCollection(window._db, 'gigs'),
          window._fsWhere('posterId', '==', posterId),
          window._fsWhere('completionRequested', '==', true),
          window._fsWhere('status', '==', 'taken'),
          window._fsLimit(1)
        );
        var snap = await window._fsGetDocs(q);
        if (!snap.empty) {
          var g = snap.docs[0].data();
          showOTPCard(g);
        }
      } catch(e) {}
    }
    function showOTPCard(gig){
      var card = document.getElementById('otpCard');
      if(!card) return;
      card.style.display = 'block';
      var titleEl = document.getElementById('otpGigTitle');
      if(titleEl) titleEl.textContent = '"' + (gig.title||'') + '" ke liye OTP';
      var dispEl = document.getElementById('otpDisplay');
      if(dispEl && gig.completionOTP){
        dispEl.innerHTML = String(gig.completionOTP).split('').map(function(d){
          return '<div style="width:44px;height:52px;background:rgba(245,158,11,.1);border:2px solid rgba(245,158,11,.3);' +
            'border-radius:8px;display:flex;align-items:center;justify-content:center;' +
            'font-size:1.6rem;font-weight:800;color:#b45309;">'+d+'</div>';
        }).join('');
      }
      var expEl = document.getElementById('otpExpiry');
      if(expEl && gig.completionOTPExpiry){
        var exp = new Date(gig.completionOTPExpiry);
        expEl.textContent = 'Valid until: ' + exp.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
      }
    }
</script>
</body>
