<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dashboard — GigLega</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="shared.js"></script>
  </head>
  <body>
    <div id="announce-bar"></div>
    <div id="navbar"></div>
    <main style="padding:80px 0;text-align:center;">
      <p style="color:var(--text-muted);">Loading your dashboard...</p>
    </main>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        if (!requireAuth("dashboard.html")) return;
        var user = getCurrentUser();
        var role = (user && user.role) || "worker";
        window.location.replace(
          role === "client" ? "dashboard-client.html" : "dashboard-worker.html"
        );
      });
    </script>
  </body>
</html>
