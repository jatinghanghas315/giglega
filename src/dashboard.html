<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecting… | GigLega</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="theme-dark.css" />
  <style>
    body{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg,#0f0f0f);flex-direction:column;gap:0;margin:0}
    .rc{background:var(--surface,#1a1a1a);border:1.5px solid var(--border,#2a2a2a);border-radius:16px;padding:44px 36px;text-align:center;max-width:340px;width:90%}
    .ri{font-size:2.6rem;margin-bottom:18px;display:inline-block;animation:spin 1.2s linear infinite}
    .rt{font-size:1.1rem;font-weight:700;color:var(--text,#f0f0f0);margin-bottom:8px}
    .rs{font-size:.84rem;color:var(--text-muted,#888)}
    @keyframes spin{to{transform:rotate(360deg)}}
    .logo{font-size:1.1rem;font-weight:800;color:#0d9488;margin-bottom:28px;letter-spacing:-.5px}
  </style>
</head>
<body>
  <div class="rc">
    <div class="logo">GigLega</div>
    <div class="ri">⏳</div>
    <div class="rt">Taking you to your dashboard…</div>
    <div class="rs" id="msg">Checking your account</div>
  </div>

  <script type="module">
    import { auth, db } from './firebase-config.js';
    import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
    import { doc, getDoc }        from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

    const ROLE_MAP = {
      poster:     'dashboard-client.html',
      client:     'dashboard-client.html',
      tasker:     'dashboard-worker.html',
      worker:     'dashboard-worker.html',
      enterprise: 'dashboard-enterprise.html',
      admin:      'dashboard-admin.html',
    };

    const msg = document.getElementById('msg');
    function go(url, delay=600){ setTimeout(()=>{ window.location.replace(url); }, delay); }

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        msg.textContent = 'Not logged in — redirecting…';
        go('login.html?redirect=dashboard.html', 1200);
        return;
      }
      try {
        msg.textContent = 'Loading your profile…';
        const snap = await getDoc(doc(db, 'users', user.uid));
        if (!snap.exists() || !snap.data().onboardingComplete) {
          msg.textContent = 'Finishing account setup…';
          go('onboarding.html', 800);
          return;
        }
        const role   = snap.data().role || 'tasker';
        const target = ROLE_MAP[role] || 'dashboard-worker.html';
        msg.textContent = 'Redirecting to your ' + role[0].toUpperCase() + role.slice(1) + ' dashboard…';
        go(target, 600);
      } catch(e) {
        msg.textContent = 'Something went wrong — redirecting to login…';
        go('login.html', 1500);
      }
    });
  </script>
</body>
</html>
