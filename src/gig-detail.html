<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gig Detail — GigLega</title>
  <meta name="description" content="GigLega gig details. Full info, pricing, and apply instantly." />
  <link rel="stylesheet" href="styles.css" />
  <script defer src="shared.js"></script>
  <style>
    .detail-wrap{max-width:900px;margin:0 auto;padding:32px 16px 80px}

    /* ── Layout ── */
    .detail-grid{display:grid;grid-template-columns:1fr 340px;gap:24px;align-items:start}
    @media(max-width:720px){.detail-grid{grid-template-columns:1fr}}

    /* ── Main card ── */
    .main-card{background:var(--surface);border:1.5px solid var(--gray-200);border-radius:var(--radius);padding:28px;box-shadow:var(--shadow-sm)}

    /* Type + status row */
    .top-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px}
    .gig-type-tag{display:inline-flex;align-items:center;gap:5px;font-size:.78rem;font-weight:700;padding:4px 12px;border-radius:12px}
    .tag-hyperlocal{background:rgba(245,158,11,.12);color:#b45309}
    .tag-remote{background:rgba(99,102,241,.12);color:#4338ca}
    .status-pill{display:inline-flex;align-items:center;gap:5px;font-size:.78rem;font-weight:700;padding:4px 12px;border-radius:12px}
    .status-open{background:rgba(16,185,129,.12);color:#059669}
    .status-taken{background:rgba(239,68,68,.12);color:#dc2626}
    .status-completed{background:rgba(107,114,128,.12);color:#374151}

    /* Title area */
    .gig-headline{font-size:1.5rem;font-weight:800;color:var(--primary);line-height:1.3;margin-bottom:10px}
    .gig-category{font-size:.85rem;color:var(--gray-400);margin-bottom:18px}

    /* Meta chips */
    .meta-row{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:22px}
    .meta-chip{display:flex;align-items:center;gap:6px;font-size:.83rem;color:var(--gray-600);background:var(--gray-50);border:1px solid var(--gray-200);border-radius:8px;padding:6px 12px}

    /* Description */
    .section-label{font-size:.78rem;font-weight:700;color:var(--gray-400);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}
    .gig-description{font-size:.93rem;color:var(--gray-700);line-height:1.7;white-space:pre-wrap;word-break:break-word}

    /* Divider */
    .divider{border:none;border-top:1px solid var(--gray-200);margin:22px 0}

    /* Poster info — shown after accept */
    .poster-reveal{background:rgba(13,148,136,.06);border:1.5px solid var(--teal);border-radius:var(--radius-sm);padding:18px;margin-top:20px;display:none}
    .poster-reveal.show{display:block}
    .poster-reveal h4{font-size:.9rem;font-weight:700;color:var(--teal);margin-bottom:12px}
    .poster-info-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:.88rem;color:var(--gray-700)}
    .btn-whatsapp{display:inline-flex;align-items:center;gap:7px;background:#25d366;color:#fff;border:none;padding:10px 18px;border-radius:var(--radius-sm);font-weight:700;font-size:.88rem;cursor:pointer;text-decoration:none;margin-top:8px}
    .btn-whatsapp:hover{background:#1fba59}

    /* ── Sidebar ── */
    .sidebar{display:flex;flex-direction:column;gap:16px}

    /* Price card */
    .price-card{background:var(--surface);border:1.5px solid var(--gray-200);border-radius:var(--radius);padding:22px;box-shadow:var(--shadow-sm)}
    .price-big{font-size:2rem;font-weight:800;color:var(--primary);margin-bottom:2px}
    .price-unit{font-size:.85rem;color:var(--gray-400);margin-bottom:16px}

    /* Earnings breakdown */
    .earn-card{background:linear-gradient(135deg,var(--primary) 0%,var(--teal) 100%);border-radius:var(--radius-sm);padding:16px;margin-bottom:16px;color:#fff}
    .earn-title{font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;opacity:.8;margin-bottom:10px}
    .earn-row{display:flex;justify-content:space-between;font-size:.88rem;margin-bottom:6px;opacity:.85}
    .earn-row.total{font-weight:800;font-size:1rem;opacity:1;padding-top:8px;border-top:1px solid rgba(255,255,255,.3);margin-top:4px}

    /* Pay type badge */
    .pay-badge-row{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--gray-50);border:1px solid var(--gray-200);border-radius:var(--radius-sm);font-size:.83rem;font-weight:600;margin-bottom:16px}

    /* Accept button area */
    .accept-area{display:flex;flex-direction:column;gap:10px}
    .btn-accept-main{width:100%;padding:14px;background:linear-gradient(135deg,var(--primary) 0%,var(--teal) 100%);color:#fff;border:none;border-radius:var(--radius-sm);font-weight:800;font-size:1rem;cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:0 4px 14px rgba(13,148,136,.35)}
    .btn-accept-main:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(13,148,136,.45)}
    .btn-accept-main:disabled{opacity:.5;transform:none;cursor:not-allowed;box-shadow:none}
    .accept-note{font-size:.75rem;color:var(--gray-400);text-align:center;line-height:1.5}

    /* Taken state */
    .taken-state{background:rgba(239,68,68,.06);border:1.5px solid #fca5a5;border-radius:var(--radius-sm);padding:16px;text-align:center}
    .taken-state .taken-icon{font-size:2rem;margin-bottom:8px}
    .taken-state h4{font-size:.95rem;font-weight:700;color:#dc2626;margin-bottom:4px}
    .taken-state p{font-size:.82rem;color:var(--gray-500);line-height:1.5}

    /* Countdown bar */
    .countdown-wrap{margin-top:10px}
    .countdown-label{font-size:.72rem;color:var(--danger);font-weight:600;margin-bottom:4px}
    .countdown-bar{height:4px;background:var(--gray-200);border-radius:2px;overflow:hidden}
    .countdown-inner{height:100%;background:var(--danger);border-radius:2px;transition:width linear}

    /* Safety card */
    .safety-card{background:var(--surface);border:1.5px solid var(--gray-200);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow-sm)}
    .safety-card h4{font-size:.88rem;font-weight:700;color:var(--primary);margin-bottom:12px}
    .safety-item{display:flex;align-items:flex-start;gap:8px;font-size:.8rem;color:var(--gray-600);margin-bottom:8px;line-height:1.4}

    /* Loading / Error state */
    .state-box{text-align:center;padding:80px 24px;color:var(--gray-400)}
    .state-box .state-icon{font-size:3rem;margin-bottom:16px}
    .state-box h3{font-size:1.1rem;font-weight:700;color:var(--gray-600);margin-bottom:8px}

    /* Dark mode */
    [data-theme=dark] .main-card{border-color:var(--gray-700)}
    [data-theme=dark] .price-card{border-color:var(--gray-700)}
    [data-theme=dark] .safety-card{border-color:var(--gray-700)}
    [data-theme=dark] .meta-chip{background:var(--gray-800);border-color:var(--gray-700);color:var(--gray-300)}
    [data-theme=dark] .pay-badge-row{background:var(--gray-800);border-color:var(--gray-700)}
    [data-theme=dark] .poster-reveal{background:rgba(13,148,136,.1)}
    [data-theme=dark] .poster-info-row{color:var(--gray-300)}
    [data-theme=dark] .gig-description{color:var(--gray-300)}
    [data-theme=dark] .divider{border-color:var(--gray-700)}
    [data-theme=dark] .taken-state{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.3)}
    [data-theme=dark] .countdown-bar{background:var(--gray-700)}
  </style>
</head>
<body>
  <div id="announce-bar"></div>
  <nav id="main-nav"></nav>

  <main class="page-wrapper">
    <div class="detail-wrap">
      <nav id="breadcrumb" aria-label="breadcrumb"></nav>
      <div id="pageContent">
        <!-- Rendered by JS -->
        <div class="state-box">
          <div class="state-icon">⏳</div>
          <h3>Loading gig...</h3>
        </div>
      </div>
    </div>
  </main>

  <footer id="main-footer"></footer>
  <div id="toast-container"></div>

  <script>
  (function () {

    var FEE_RATE   = 0.06;
    var TAKEN_SHOW = 30000;
    var GIG_KEY    = (typeof GL !== "undefined" && GL.STORAGE_KEY_GIGS) ? GL.STORAGE_KEY_GIGS : "gl_gigs";

    /* ── Get gig ID from URL ── */
    function getParam(name) {
      return new URLSearchParams(window.location.search).get(name);
    }

    var gigId = getParam("id");

    /* ── Breadcrumb ── */
    if (typeof buildBreadcrumb === "function") {
      buildBreadcrumb("breadcrumb", [
        { label: "Home",        href: "index.html" },
        { label: "Browse Gigs", href: "browse.html" },
        { label: "Gig Detail" }
      ]);
    }

    /* ── Load gigs ── */
    function getGigs() { return JSON.parse(localStorage.getItem(GIG_KEY) || "[]"); }
    function saveGigs(g) { localStorage.setItem(GIG_KEY, JSON.stringify(g)); }

    function findGig(id) {
      return getGigs().find(function (g) { return g.id === id; }) || null;
    }

    /* ── Time ago ── */
    function timeAgo(iso) {
      var d = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
      if (d < 60)   return d + "s ago";
      if (d < 3600) return Math.floor(d / 60) + "m ago";
      if (d < 86400)return Math.floor(d / 3600) + "h ago";
      return Math.floor(d / 86400) + "d ago";
    }

    function escHtml(s) {
      return String(s || "")
        .replace(/&/g,"&amp;").replace(/</g,"&lt;")
        .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    function payLabel(t) {
      if (t === "cash")   return "💵 Cash Payment";
      if (t === "wallet") return "🔒 Secure Wallet";
      return "✅ Pay After Completion";
    }

    /* ══════════════════════════════════════
       RENDER PAGE
    ══════════════════════════════════════ */
    function render() {
      var pageContent = document.getElementById("pageContent");

      if (!gigId) {
        pageContent.innerHTML = notFoundHtml("No gig ID provided.", "Browse Gigs", "browse.html");
        return;
      }

      var gig = findGig(gigId);
      if (!gig) {
        pageContent.innerHTML = notFoundHtml("This gig doesn't exist or has been removed.", "Browse Gigs", "browse.html");
        return;
      }

      var user    = typeof getCurrentUser === "function" ? getCurrentUser() : null;
      var isOwn   = user && gig.posterId && user.id === gig.posterId;
      var isTaken = gig.status === "taken";
      var isDone  = gig.status === "completed";
      var isOpen  = gig.status === "open";

      var fee    = Math.round(gig.pricePerHr * FEE_RATE);
      var earn   = gig.pricePerHr - fee;

      /* ── Type tag ── */
      var typeTag = gig.type === "hyperlocal"
        ? '<span class="gig-type-tag tag-hyperlocal">📍 Hyperlocal</span>'
        : '<span class="gig-type-tag tag-remote">💻 Remote</span>';

      /* ── Status pill ── */
      var statusPill = isOpen
        ? '<span class="status-pill status-open">🟢 Open</span>'
        : isTaken
          ? '<span class="status-pill status-taken">🔒 Taken</span>'
          : '<span class="status-pill status-completed">✅ Completed</span>';

      /* ── Accept / taken sidebar block ── */
      var sidebarAction = "";
      if (isDone) {
        sidebarAction =
          '<div class="taken-state">' +
          '<div class="taken-icon">✅</div>' +
          '<h4>Gig Completed</h4>' +
          '<p>This gig has already been completed.</p>' +
          '</div>';
      } else if (isTaken) {
        var takenRemaining = gig.takenAt
          ? Math.max(0, TAKEN_SHOW - (Date.now() - new Date(gig.takenAt).getTime()))
          : 0;
        sidebarAction =
          '<div class="taken-state">' +
          '<div class="taken-icon">🔒</div>' +
          '<h4>This gig has been taken!</h4>' +
          '<p>A worker just accepted this gig. Check browse for more open gigs.</p>' +
          (takenRemaining > 0
            ? '<div class="countdown-wrap">' +
              '<div class="countdown-label">Removing in ' + Math.ceil(takenRemaining / 1000) + 's...</div>' +
              '<div class="countdown-bar"><div class="countdown-inner" id="countdownInner" style="width:100%"></div></div>' +
              '</div>'
            : '') +
          '</div>' +
          '<a href="browse.html" class="btn btn-primary" style="display:block;text-align:center;margin-top:12px;padding:12px">🔍 Browse More Gigs</a>';
      } else if (isOwn) {
        sidebarAction =
          '<div class="taken-state" style="background:rgba(245,158,11,.06);border-color:#fcd34d">' +
          '<div class="taken-icon">👤</div>' +
          '<h4 style="color:#b45309">This is your gig</h4>' +
          '<p>You posted this gig. Workers will contact you once they accept.</p>' +
          '</div>' +
          '<a href="dashboard-client.html" class="btn btn-primary" style="display:block;text-align:center;margin-top:12px;padding:12px">📊 View Your Dashboard</a>';
      } else {
        sidebarAction =
          '<div class="accept-area">' +
          '<button class="btn-accept-main" id="acceptBtn">⚡ Accept This Gig</button>' +
          '<div class="accept-note">By accepting, you commit to completing this task.<br>First to accept gets the gig.</div>' +
          '</div>';
      }

      /* ── Poster info block (revealed after accept) ── */
      var posterBlock =
        '<div class="poster-reveal" id="posterReveal">' +
        '<h4>📞 Poster Contact Details</h4>' +
        '<div class="poster-info-row">👤 <strong>' + escHtml(gig.posterName || "Posted by user") + '</strong></div>' +
        (gig.posterPhone
          ? '<div class="poster-info-row">📱 ' + escHtml(gig.posterPhone) + '</div>' +
            '<a class="btn-whatsapp" href="https://wa.me/91' + gig.posterPhone.replace(/\D/g,"") +
            '?text=' + encodeURIComponent("Hi! I accepted your gig on GigLega: "" + gig.title + "". I'm on my way!") +
            '" target="_blank" rel="noopener">💬 Message on WhatsApp</a>'
          : '') +
        '</div>';

      /* ── Full HTML ── */
      pageContent.innerHTML =
        '<div class="detail-grid">' +

        /* LEFT: Main info */
        '<div class="main-card">' +
          '<div class="top-row">' + typeTag + statusPill + '</div>' +
          '<div class="gig-category">' + escHtml(gig.categoryLabel || gig.category) + '</div>' +
          '<h1 class="gig-headline">' + escHtml(gig.title) + '</h1>' +

          '<div class="meta-row">' +
            (gig.location ? '<span class="meta-chip">📍 ' + escHtml(gig.location) + '</span>' : '') +
            '<span class="meta-chip">🕒 Posted ' + timeAgo(gig.postedAt) + '</span>' +
            '<span class="meta-chip">' + payLabel(gig.payType) + '</span>' +
            '<span class="meta-chip">👤 ' + escHtml(gig.posterName || "Anonymous") + '</span>' +
          '</div>' +

          '<div class="section-label">About this gig</div>' +
          '<div class="gig-description">' + escHtml(gig.description || "No description provided.") + '</div>' +

          posterBlock +
        '</div>' +

        /* RIGHT: Sidebar */
        '<div class="sidebar">' +

          /* Price card */
          '<div class="price-card">' +
            '<div class="price-big">₹' + gig.pricePerHr + '</div>' +
            '<div class="price-unit">per hour</div>' +

            /* Earnings breakdown */
            '<div class="earn-card">' +
              '<div class="earn-title">💸 Your Earnings Breakdown</div>' +
              '<div class="earn-row"><span>Gig Price</span><span>₹' + gig.pricePerHr + '</span></div>' +
              '<div class="earn-row"><span>GigLega Support Fee (6%)</span><span>–₹' + fee + '</span></div>' +
              '<div class="earn-row total"><span>You Receive</span><span>₹' + earn + '</span></div>' +
            '</div>' +

            /* Payment type */
            '<div class="pay-badge-row">' + payLabel(gig.payType) + '</div>' +

            sidebarAction +
          '</div>' +

          /* Safety tips */
          '<div class="safety-card">' +
            '<h4>🛡️ Safety Tips</h4>' +
            '<div class="safety-item">✅ <span>Always verify the location before heading out.</span></div>' +
            '<div class="safety-item">✅ <span>Chat with the poster through GigLega only.</span></div>' +
            '<div class="safety-item">✅ <span>Mark the gig complete only after payment.</span></div>' +
            '<div class="safety-item">✅ <span>Report any issues to <strong>support@giglega.in</strong></span></div>' +
          '</div>' +

        '</div>' + /* end sidebar */
        '</div>'; /* end detail-grid */

      /* ── Update document title ── */
      document.title = escHtml(gig.title) + " — GigLega";

      /* ── Bind accept button ── */
      var acceptBtn = document.getElementById("acceptBtn");
      if (acceptBtn) {
        acceptBtn.addEventListener("click", function () { handleAccept(gig); });
      }

      /* ── Start countdown if taken ── */
      if (isTaken && gig.takenAt) {
        var elapsed   = Date.now() - new Date(gig.takenAt).getTime();
        var remaining = Math.max(0, TAKEN_SHOW - elapsed);
        if (remaining > 0) {
          setTimeout(function () {
            var inner = document.getElementById("countdownInner");
            if (inner) {
              inner.style.transition = "width " + (remaining / 1000) + "s linear";
              inner.style.width = "0%";
            }
          }, 50);
          setTimeout(function () {
            window.location.href = "browse.html";
          }, remaining);
        } else {
          window.location.href = "browse.html";
        }
      }
    }

    /* ══════════════════════════════════════
       HANDLE ACCEPT
    ══════════════════════════════════════ */
    function handleAccept(gig) {
      var user = typeof getCurrentUser === "function" ? getCurrentUser() : null;

      /* Auth guard */
      if (!user) {
        if (typeof showToast === "function") showToast("Please log in to accept a gig.", "error");
        setTimeout(function () {
          window.location.href = "login.html?redirect=" + encodeURIComponent("gig-detail.html?id=" + gig.id);
        }, 1200);
        return;
      }

      /* Re-fetch latest state */
      var gigs    = getGigs();
      var fresh   = gigs.find(function (g) { return g.id === gig.id; });

      if (!fresh || fresh.status !== "open") {
        if (typeof showToast === "function") showToast("Sorry, this gig was just taken by someone else!", "error");
        setTimeout(function () { render(); }, 800);
        return;
      }

      /* Lock instantly */
      var acceptBtn = document.getElementById("acceptBtn");
      if (acceptBtn) {
        acceptBtn.disabled    = true;
        acceptBtn.textContent = "⏳ Accepting...";
      }

      fresh.status  = "taken";
      fresh.takenAt = new Date().toISOString();
      fresh.takenBy = user.id || user.name;
      saveGigs(gigs);

      /* Reveal poster contact */
      var posterReveal = document.getElementById("posterReveal");
      if (posterReveal) posterReveal.classList.add("show");

      if (typeof showToast === "function") showToast("🎉 Gig accepted! Poster details revealed below.", "success");

      /* Update accept area to taken state */
      setTimeout(function () {
        var acceptArea = document.querySelector(".accept-area");
        if (acceptArea) {
          acceptArea.innerHTML =
            '<div class="taken-state" style="background:rgba(16,185,129,.06);border-color:#6ee7b7">' +
            '<div class="taken-icon">🎉</div>' +
            '<h4 style="color:#059669">You accepted this gig!</h4>' +
            '<p>Contact the poster and head to the location. Good luck!</p>' +
            '</div>' +
            '<a href="dashboard-worker.html?gigId=' + gig.id + '" class="btn btn-primary" style="display:block;text-align:center;margin-top:12px;padding:12px">📊 Go to Dashboard</a>';
        }
      }, 600);
    }

    /* ══════════════════════════════════════
       NOT FOUND HTML
    ══════════════════════════════════════ */
    function notFoundHtml(msg, linkLabel, linkHref) {
      return '<div class="state-box">' +
        '<div class="state-icon">😕</div>' +
        '<h3>Gig Not Found</h3>' +
        '<p style="font-size:.88rem;color:var(--gray-500);margin-bottom:20px">' + msg + '</p>' +
        '<a href="' + linkHref + '" class="btn btn-primary">' + linkLabel + '</a>' +
        '</div>';
    }

    /* ── Sync across tabs ── */
    window.addEventListener("storage", function (e) {
      if (e.key === GIG_KEY) render();
    });

    render();

  })();
  </script>
</body>
</html>
