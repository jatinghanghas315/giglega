<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gig Detail — GigLega</title>
  <meta name="description" content="GigLega pe gig ki poori details dekho — budget, location, skills aur poster ki info. Abhi accept karo aur kaam shuru karo." />
    <meta name="keywords" content="gig detail GigLega, book gig Gurugram, accept gig, view gig info, hyperlocal work India" />
  <meta property="og:title" content="Gig Detail - GigLega" />
  <meta property="og:description" content="View full gig details on GigLega - budget, location, skills needed. Book or accept this gig today in Gurugram NCR." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://giglega.vercel.app/gig-detail.html" />
  <meta property="og:image" content="https://giglega.vercel.app/logo.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="theme-dark.css" />
  
  <link rel="stylesheet" href="mobile.css?v=20260411-0200" />
<script src="shared.js?v=20260411" defer></script>
  <style>

    /* ══════════════════════════════════
       PAGE LAYOUT
    ══════════════════════════════════ */
    .detail-page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 20px 80px;
    }
    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 28px;
      align-items: start;
    }
    @media(max-width: 860px) {
      .detail-grid { grid-template-columns: 1fr; }
    }

    /* ══════════════════════════════════
       MAIN CONTENT (LEFT)
    ══════════════════════════════════ */
    .detail-main { min-width: 0; }

    .gig-header {
      background: var(--surface);
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius);
      padding: 28px;
      margin-bottom: 20px;
      box-shadow: var(--shadow-sm);
    }

    .gig-header-top {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .gig-type-tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: .72rem;
      font-weight: 700;
      padding: 4px 11px;
      border-radius: 10px;
    }
    .tag-hyperlocal { background: rgba(245,158,11,.12); color: #b45309; }
    .tag-remote     { background: rgba(99,102,241,.12);  color: #4338ca; }

    .gig-status-pill {
      font-size: .72rem;
      font-weight: 700;
      padding: 4px 11px;
      border-radius: var(--radius-full);
    }
    .status-open   { background: rgba(16,185,129,.12); color: #059669; }
    .status-taken  { background: rgba(239,68,68,.1);   color: #dc2626; }
    .status-done   { background: rgba(99,102,241,.1);  color: #4338ca; }

    .gig-cat-tag {
      font-size: .72rem;
      font-weight: 700;
      padding: 4px 11px;
      border-radius: 10px;
      background: rgba(26,60,94,.08);
      color: var(--primary);
    }

    .gig-title {
      font-size: 1.5rem;
      font-weight: 900;
      color: var(--primary);
      line-height: 1.25;
      margin-bottom: 10px;
    }

    .gig-meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 0;
    }
    .gig-meta-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: .82rem;
      color: var(--gray-500);
      font-weight: 500;
    }
    .gig-meta-item strong { color: var(--text); font-weight: 700; }

    /* Description card */
    .detail-card {
      background: var(--surface);
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius);
      padding: 24px 28px;
      margin-bottom: 20px;
      box-shadow: var(--shadow-sm);
    }
    .detail-card-title {
      font-size: .82rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--gray-400);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .gig-description {
      font-size: .92rem;
      color: var(--gray-600);
      line-height: 1.8;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* Skills needed */
    .skills-wrap { display: flex; flex-wrap: wrap; gap: 8px; }
    .skill-tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 13px;
      border-radius: var(--radius-full);
      background: rgba(13,148,136,.08);
      border: 1px solid rgba(13,148,136,.2);
      font-size: .8rem;
      font-weight: 600;
      color: var(--teal);
    }

    /* Timeline */
    .timeline { display: flex; flex-direction: column; gap: 14px; }
    .tl-item  { display: flex; gap: 14px; align-items: flex-start; }
    .tl-dot   {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--teal);
      flex-shrink: 0; margin-top: 5px;
      box-shadow: 0 0 0 3px rgba(13,148,136,.15);
    }
    .tl-label { font-size: .84rem; font-weight: 700; color: var(--text); margin-bottom: 2px; }
    .tl-val   { font-size: .8rem;  color: var(--gray-500); }

    /* Poster info */
    .poster-card {
      background: var(--surface);
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius);
      padding: 24px 28px;
      margin-bottom: 20px;
      box-shadow: var(--shadow-sm);
    }
    .poster-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 14px;
    }
    .poster-avatar-lg {
      width: 52px; height: 52px; border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--teal));
      display: flex; align-items: center; justify-content: center;
      font-size: .95rem; font-weight: 800; color: #fff;
      flex-shrink: 0;
    }
    .poster-name  { font-size: 1rem;  font-weight: 800; color: var(--text); margin-bottom: 2px; }
    .poster-since { font-size: .76rem; color: var(--gray-400); }
    .poster-stats {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }
    .ps-item { text-align: center; }
    .ps-val  { font-size: 1.1rem; font-weight: 900; color: var(--primary); }
    .ps-lbl  { font-size: .72rem; color: var(--gray-400); margin-top: 1px; }

    /* Similar gigs */
    .similar-card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 0;
      border-bottom: 1px solid var(--gray-100);
      cursor: pointer;
      transition: var(--transition);
      text-decoration: none;
    }
    .similar-card:last-child { border-bottom: none; }
    .similar-card:hover .similar-title { color: var(--teal); }
    .similar-icon {
      width: 40px; height: 40px; border-radius: 10px;
      background: linear-gradient(135deg, rgba(26,60,94,.08), rgba(13,148,136,.08));
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; flex-shrink: 0;
    }
    .similar-title  { font-size: .88rem; font-weight: 700; color: var(--text); margin-bottom: 2px; }
    .similar-budget { font-size: .78rem; color: var(--teal); font-weight: 700; }

    [data-theme=dark] .gig-header,
    [data-theme=dark] .detail-card,
    [data-theme=dark] .poster-card { border-color: var(--gray-700); }
    [data-theme=dark] .similar-card { border-color: var(--gray-700); }

    /* ══════════════════════════════════
       SIDEBAR (RIGHT)
    ══════════════════════════════════ */
    .detail-sidebar { position: sticky; top: 80px; }

    /* Pricing card */
    .pricing-card {
      background: var(--surface);
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: var(--shadow-md);
    }
    .price-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 0;
      font-size: .88rem;
      border-bottom: 1px solid var(--gray-100);
    }
    .price-row:last-of-type { border-bottom: none; }
    .price-row .label { color: var(--gray-500); font-weight: 500; }
    .price-row .value { font-weight: 700; color: var(--text); }
    .price-row.earn   { background: rgba(13,148,136,.06); border-radius: 8px; padding: 10px 12px; margin: 10px 0; }
    .price-row.earn .label { color: var(--teal); font-weight: 700; }
    .price-row.earn .value { color: var(--teal); font-size: 1.2rem; font-weight: 900; }

    .action-zone { display: flex; flex-direction: column; gap: 10px; margin-top: 18px; }

    .btn-accept {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--teal) 100%);
      color: #fff; border: none; border-radius: var(--radius-sm);
      font-weight: 800; font-size: 1rem; cursor: pointer;
      font-family: var(--font);
      box-shadow: 0 4px 14px rgba(13,148,136,.35);
      transition: transform .15s, box-shadow .15s, opacity .2s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-accept:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(13,148,136,.45); }
    .btn-accept:disabled { opacity: .5; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn-accept .spinner { display: none; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.35); border-top-color: #fff; border-radius: 50%; animation: spin .65s linear infinite; }
    .btn-accept.loading .btn-text { display: none; }
    .btn-accept.loading .spinner  { display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .btn-chat {
      width: 100%;
      padding: 12px;
      background: transparent;
      color: var(--teal);
      border: 2px solid var(--teal);
      border-radius: var(--radius-sm);
      font-weight: 700; font-size: .92rem; cursor: pointer;
      font-family: var(--font);
      transition: all .2s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      text-decoration: none;
    }
    .btn-chat:hover { background: var(--teal); color: #fff; text-decoration: none; }

    .btn-save {
      width: 100%;
      padding: 11px;
      background: transparent;
      color: var(--gray-500);
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius-sm);
      font-weight: 600; font-size: .86rem; cursor: pointer;
      font-family: var(--font);
      transition: all .2s;
      display: flex; align-items: center; justify-content: center; gap: 7px;
    }
    .btn-save:hover { border-color: var(--danger); color: var(--danger); }
    .btn-save.saved { border-color: var(--danger); color: var(--danger); background: rgba(239,68,68,.05); }

    /* Already accepted */
    .accepted-banner {
      background: rgba(16,185,129,.08);
      border: 1.5px solid rgba(16,185,129,.3);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      text-align: center;
      margin-bottom: 10px;
      display: none;
    }
    .accepted-banner.show { display: block; }
    .accepted-banner h4   { font-size: .9rem; font-weight: 800; color: #059669; margin-bottom: 3px; }
    .accepted-banner p    { font-size: .78rem; color: #065f46; }

    /* Own gig actions */
    .owner-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 18px;
      display: none;
    }
    .owner-actions.show { display: flex; }

    /* Safety tips */
    .safety-card {
      background: rgba(99,102,241,.05);
      border: 1.5px solid rgba(99,102,241,.2);
      border-radius: var(--radius-sm);
      padding: 16px;
    }
    .safety-title { font-size: .8rem; font-weight: 800; color: #4338ca; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
    .safety-item  { font-size: .78rem; color: var(--gray-500); display: flex; align-items: flex-start; gap: 7px; margin-bottom: 7px; line-height: 1.5; }
    .safety-item:last-child { margin-bottom: 0; }
    [data-theme=dark] .safety-card { background: rgba(99,102,241,.08); }

    [data-theme=dark] .pricing-card { border-color: var(--gray-700); }
    [data-theme=dark] .price-row    { border-color: var(--gray-700); }
    [data-theme=dark] .btn-save     { border-color: var(--gray-700); }

    /* ══════════════════════════════════
       ACCEPT MODAL
    ══════════════════════════════════ */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.55);
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0; visibility: hidden;
      transition: opacity .25s, visibility .25s;
    }
    .modal-overlay.open { opacity: 1; visibility: visible; }
    .modal {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow-xl);
      width: 100%; max-width: 460px;
      max-height: 90vh;
      overflow-y: auto;
      transform: translateY(20px) scale(.97);
      transition: transform .25s;
    }
    .modal-overlay.open .modal { transform: translateY(0) scale(1); }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 24px 14px;
      border-bottom: 1.5px solid var(--gray-200);
    }
    .modal-title { font-size: .98rem; font-weight: 800; color: var(--primary); }
    .modal-close {
      background: none; border: none; cursor: pointer;
      font-size: 1.2rem; color: var(--gray-400); padding: 4px; line-height: 1;
      transition: color .2s;
    }
    .modal-close:hover { color: var(--gray-700); }
    .modal-body   { padding: 20px 24px; }
    .modal-footer { padding: 14px 24px 20px; border-top: 1.5px solid var(--gray-200); display: flex; gap: 10px; justify-content: flex-end; }

    .confirm-gig-name {
      background: var(--gray-50);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      margin-bottom: 16px;
      border: 1px solid var(--gray-200);
    }
    .confirm-gig-name .cgn-label { font-size: .74rem; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--gray-400); margin-bottom: 4px; }
    .confirm-gig-name .cgn-title { font-size: .95rem; font-weight: 800; color: var(--text); }
    .confirm-price-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      font-size: .88rem;
      border-bottom: 1px solid var(--gray-100);
    }
    .confirm-price-row:last-of-type { border-bottom: none; }
    .confirm-price-row .cp-label { color: var(--gray-500); }
    .confirm-price-row .cp-val   { font-weight: 700; color: var(--text); }
    .confirm-price-row.cp-earn .cp-val { color: var(--teal); font-size: 1rem; }

    .confirm-note {
      background: rgba(245,158,11,.06);
      border: 1px solid rgba(245,158,11,.25);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      font-size: .8rem;
      color: #92400e;
      line-height: 1.6;
      margin-top: 14px;
      display: flex;
      gap: 8px;
      align-items: flex-start;
    }

    [data-theme=dark] .modal { border: 1.5px solid var(--gray-700); }
    [data-theme=dark] .modal-header, [data-theme=dark] .modal-footer { border-color: var(--gray-700); }
    [data-theme=dark] .confirm-gig-name { background: var(--gray-800); border-color: var(--gray-700); }
    [data-theme=dark] .confirm-price-row { border-color: var(--gray-700); }

    /* ══════════════════════════════════
       NOT FOUND / ERROR STATE
    ══════════════════════════════════ */
    .not-found {
      text-align: center;
      padding: 80px 24px;
    }
    .not-found .nf-icon  { font-size: 4rem; margin-bottom: 18px; }
    .not-found h2        { font-size: 1.3rem; font-weight: 800; color: var(--primary); margin-bottom: 8px; }
    .not-found p         { font-size: .9rem; color: var(--gray-500); margin-bottom: 24px; line-height: 1.6; }

  
    /* ── Mobile sticky Book CTA ── */
    .mobile-book-bar {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--surface);
      border-top: 1px solid var(--gray-200);
      padding: 12px 20px;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
      z-index: 200;
      gap: 12px;
      align-items: center;
      box-shadow: 0 -4px 16px rgba(0,0,0,.08);
    }
    [data-theme=dark] .mobile-book-bar {
      border-color: var(--gray-700);
      box-shadow: 0 -4px 16px rgba(0,0,0,.3);
    }
    .mobile-book-bar .mbb-price {
      flex: 1;
      min-width: 0;
    }
    .mobile-book-bar .mbb-earn {
      font-size: 1.1rem;
      font-weight: 900;
      color: var(--teal);
      font-family: var(--font-display);
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }
    .mobile-book-bar .mbb-label {
      font-size: .68rem;
      color: var(--gray-400);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .3px;
      margin-top: 2px;
    }
    .mobile-book-bar .btn-mobile-book {
      flex-shrink: 0;
      padding: 12px 24px;
      font-size: .9rem;
      font-weight: 800;
      background: var(--teal);
      color: #fff;
      border: none;
      border-radius: var(--radius-full);
      cursor: pointer;
      transition: background .2s, transform .15s;
    }
    .mobile-book-bar .btn-mobile-book:hover { background: var(--primary); transform: scale(1.02); }
    .mobile-book-bar .btn-mobile-book:disabled { opacity: .5; cursor: not-allowed; }
    @media (max-width: 860px) {
      .mobile-book-bar { display: flex; }
      /* Add bottom padding so content isn't hidden behind bar */
      .page-wrap { padding-bottom: 80px; }
    }

  </style>
</head>
<body>
  <div id="page-loader"></div>
  <div id="announce-bar"></div>
  <nav id="main-nav"></nav>

  <main>
    <div class="detail-page">

      <!-- Breadcrumb -->
      <div id="breadcrumb"></div>

      <!-- Main content injected by JS -->
      <main id="pageContent" aria-label="Gig Detail"></main>

    </div>
  </main>

  <!-- Accept Confirmation Modal -->
  <div class="modal-overlay" id="acceptModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="modalTitle">⚡ Confirm Gig Acceptance</span>
        <button class="modal-close" id="modalClose" aria-label="Close">✕</button>
      </div>
      <div class="modal-body">
        <div class="confirm-gig-name">
          <div class="cgn-label">Gig</div>
          <div class="cgn-title" id="modalGigTitle">—</div>
        </div>
        <div class="confirm-price-row">
          <span class="cp-label">Posted Budget</span>
          <span class="cp-val" id="modalBudget">—</span>
        </div>
        <div class="confirm-price-row">
          <span class="cp-label">Platform Fee (6%)</span>
          <span class="cp-val" id="modalFee" style="color:var(--danger)">—</span>
        </div>
        <div class="confirm-price-row cp-earn">
          <span class="cp-label" style="font-weight:700;color:var(--teal)">💰 You Earn</span>
          <span class="cp-val" id="modalEarn">—</span>
        </div>
        <div class="confirm-note">
          <span>⚠️</span>
          <span>Gig accept karne ke baad poster se in-app chat mein baat karo — address aur timing confirm karo before visiting.</span>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost btn-sm" id="modalCancelBtn">Cancel</button>
        <button class="btn btn-primary btn-sm" id="modalConfirmBtn">
          <span class="btn-text">✅ Yes, Accept Gig</span>
          <span class="spinner" style="display:none;width:14px;height:14px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spin .65s linear infinite"></span>
        </button>
      </div>
    </div>
  </div>

  <footer id="main-footer"></footer>
  <div id="toast-container"></div>

  <script type="module">
    import { auth, db } from './firebase-config.js';
    import {
      doc, getDoc, collection, getDocs, query, where, limit,
      updateDoc, deleteDoc, setDoc, addDoc, serverTimestamp
    } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';
    import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';

    var FEE_RATE = 0.06;
    var currentUser = null;

    /* ── Helpers ── */
    function escH(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
    function getParam(n){ return new URLSearchParams(window.location.search).get(n); }
    function fmtCur(n){ return "₹"+Number(n||0).toLocaleString("en-IN"); }
    function getUserInitials(name){ return (name||"U").split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase(); }
    function formatDate(iso){ if(!iso) return "—"; return new Date(iso).toLocaleDateString("en-IN",{day:"numeric",month:"short",year:"numeric"}); }
    function timeAgo(iso){
      if(!iso) return "";
      var d=Math.floor((Date.now()-new Date(iso).getTime())/1000);
      if(d<60) return d+"s ago"; if(d<3600) return Math.floor(d/60)+"m ago";
      if(d<86400) return Math.floor(d/3600)+"h ago"; return Math.floor(d/86400)+"d ago";
    }
    function showToast(msg,type){
      var t=document.createElement("div");
      var bg=type==="error"?"#dc2626":type==="success"?"#16a34a":"#1a3c5e";
      t.style.cssText="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:"+bg+";color:#fff;padding:10px 22px;border-radius:99px;font-size:.84rem;font-weight:700;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.25);transition:opacity .3s";
      t.textContent=msg; document.body.appendChild(t);
      setTimeout(function(){t.style.opacity="0"; setTimeout(function(){t.remove();},300);},3000);
    }

    /* ── Not found ── */
    function renderNotFound(msg){
      document.getElementById("pageContent").innerHTML=
        '<div class="not-found" style="text-align:center;padding:80px 20px">'+
          '<div class="nf-icon" style="font-size:4rem;margin-bottom:18px">🔍</div>'+
          '<h2 style="font-size:1.3rem;font-weight:800;color:var(--primary);margin-bottom:8px">Gig Not Found</h2>'+
          '<p style="font-size:.9rem;color:var(--gray-500);margin-bottom:24px">'+escH(msg)+'</p>'+
          '<a href="browse.html" class="btn btn-primary">Browse All Gigs →</a>'+
        '</div>';
    }

    /* ── Render gig using original CSS classes ── */
    function renderGig(gig, poster, similar, isOwner){
      var fee   = Math.round((gig.budget||0)*FEE_RATE);
      var earn  = (gig.budget||0)-fee;
      var isOpen   = gig.status==="open";
      var isTaken  = gig.status==="taken";
      var isWorkerWhoBooked = currentUser && gig.workerId===currentUser.uid;
      var posterName= (poster && poster.name) || gig.posterName || "User";
      var posterInits= getUserInitials(posterName);
      var convId = currentUser
        ? [currentUser.uid, gig.posterId].sort().join("_")+"_"+gig.id
        : null;

      /* Status pill */
      var statusClass = isOpen ? "open" : "";
      var statusText  = isOpen ? "Open" : isTaken ? "Taken" : "Done";

      /* Skills */
      var skillsHtml = (gig.skills||[]).length
        ? (gig.skills||[]).map(function(s){
            return '<span style="display:inline-block;padding:4px 12px;background:var(--teal-light,#e0f2f1);color:var(--teal,#0d9488);border-radius:99px;font-size:.78rem;font-weight:700;margin:3px">'+escH(s)+'</span>';
          }).join("")
        : '<span style="color:var(--gray-400);font-size:.85rem">No specific skills required</span>';

      /* Similar gigs */
      var simHtml = similar.length
        ? similar.map(function(sg){
            return '<a href="gig-detail.html?id='+escH(sg.id)+'" class="similar-card">'+
              '<div style="font-weight:700;font-size:.88rem;color:var(--text);margin-bottom:4px">'+escH(sg.title)+'</div>'+
              '<div style="font-size:.78rem;color:var(--gray-500)">'+escH(sg.location||"Gurugram")+'  •  ₹'+Number(sg.budget||0).toLocaleString("en-IN")+'</div>'+
              '</a>';
          }).join("")
        : '<p style="color:var(--gray-400);font-size:.85rem">No similar gigs right now.</p>';

      /* ─── Action zone logic (Option A: book first, message after) ─── */
      var actionHtml = "";
      var posterCardCTA = "";

      if(isOwner){
        /* POSTER viewing their own gig */
        actionHtml =
          '<button class="btn btn-danger" id="btnDeleteGig" style="width:100%">Delete This Gig</button>'+
          '<a href="post-gig.html" class="btn btn-outline" style="width:100%;margin-top:8px;display:block;text-align:center">+ Post Another Gig</a>';
        posterCardCTA = ""; /* No message button for owner */
        if(isTaken && gig.workerId){
          /* Show message worker option */
          var workerConvId = [gig.posterId, gig.workerId].sort().join("_")+"_"+gig.id;
          posterCardCTA = '<a href="chat.html?with='+escH(gig.workerId)+'&gig='+escH(gig.id)+'" class="btn btn-primary btn-block" style="width:100%;display:block;text-align:center;margin-top:12px">Message Worker</a>';
        }
      } else if(isWorkerWhoBooked){
        /* WORKER who already booked this gig */
        actionHtml = '<div style="background:#dcfce7;border-radius:10px;padding:14px;text-align:center;font-weight:700;color:#16a34a;margin-bottom:10px">You have Booked This Gig!</div>';
        posterCardCTA = '<a href="chat.html?with='+escH(gig.posterId)+'&gig='+escH(gig.id)+'" class="btn btn-primary" style="width:100%;display:block;text-align:center;margin-top:12px">Message Poster</a>';
      } else if(isOpen){
        /* WORKER on open gig — show book button, no message */
        actionHtml = '<button class="btn btn-primary btn-accept" id="btnAccept" style="width:100%;font-size:1rem;padding:14px">Book This Gig</button>'+
          '<p style="font-size:.75rem;color:var(--gray-400);text-align:center;margin-top:8px">Book karo, phir poster se chat karo</p>';
        posterCardCTA = ""; /* No message until booked */
      } else {
        /* Taken by someone else or done */
        actionHtml = '<button class="btn btn-outline" style="width:100%;cursor:not-allowed;opacity:.6" disabled>Gig Already Taken</button>';
        posterCardCTA = "";
      }

      /* ─── Poster card: hide if owner is viewing ─── */
      var posterCardHtml = isOwner ? "" :
        '<div class="poster-card" style="margin-top:16px">'+
          '<div class="poster-row" style="display:flex;align-items:center;gap:12px">'+
            '<div class="poster-avatar-lg" style="width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--teal,#0d9488));display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:1rem;flex-shrink:0">'+escH(posterInits)+'</div>'+
            '<div>'+
              '<div class="poster-name">'+escH(posterName)+'</div>'+
              '<div class="poster-since">'+((poster && poster.city)||gig.area||"Gurugram")+'</div>'+
            '</div>'+
          '</div>'+
          posterCardCTA+
        '</div>';

      /* ─── Render page ─── */
      document.getElementById("pageContent").innerHTML =
        '<div class="detail-page">'+

          /* Header */
          '<div class="gig-header">'+
            '<div class="gig-header-top" style="margin-bottom:10px">'+
              '<span class="gig-status-pill '+statusClass+'">'+statusText+'</span>'+
              (gig.urgency==="urgent" ? '<span class="gig-cat-tag" style="background:#fef3c7;color:#b45309">🔥 Urgent</span>' : "")+
            '</div>'+
            '<h1 class="gig-title">'+escH(gig.title)+'</h1>'+
            '<div class="gig-meta-row">'+
              '<span class="gig-meta-item">'+escH(gig.location||gig.area||"Gurugram")+'</span>'+
              '<span class="gig-meta-item">🏷️ '+escH(gig.category||"General")+'</span>'+
              '<span class="gig-meta-item">🕐 '+timeAgo(gig.createdAt)+'</span>'+
              '<span class="gig-meta-item">'+(gig.workType==="on-site"?"🏠 On-site":"🌐 Remote")+'</span>'+
            '</div>'+
          '</div>'+

          /* Two-column body */
          '<div style="display:grid;grid-template-columns:1fr 340px;gap:24px;align-items:start">'+

            /* Left: main content */
            '<div class="detail-main">'+

              '<div class="detail-card">'+
                '<div class="detail-card-title">📋 Description</div>'+
                '<p class="gig-description">'+escH(gig.description||"No description provided.")+'</p>'+
              '</div>'+

              '<div class="detail-card">'+
                '<div class="detail-card-title">🛠️ Skills Needed</div>'+
                '<div style="margin-top:8px">'+skillsHtml+'</div>'+
              '</div>'+

              '<div class="detail-card">'+
                '<div class="detail-card-title">📅 Schedule</div>'+
                '<div class="detail-grid">'+
                  '<div class="ps-item"><span class="ps-lbl">Date</span><span class="ps-val">'+formatDate(gig.date)+'</span></div>'+
                  '<div class="ps-item"><span class="ps-lbl">Time</span><span class="ps-val">'+(gig.time||"Flexible")+'</span></div>'+
                  '<div class="ps-item"><span class="ps-lbl">Duration</span><span class="ps-val">'+(gig.duration||"As discussed")+'</span></div>'+
                  '<div class="ps-item"><span class="ps-lbl">Workers</span><span class="ps-val">'+(gig.workers||1)+'</span></div>'+
                '</div>'+
              '</div>'+

              (similar.length ? '<div class="detail-card"><div class="detail-card-title">🔥 Similar Gigs</div><div style="margin-top:8px">'+simHtml+'</div></div>' : "")+

            '</div>'+

            /* Right: sidebar */
            '<div class="detail-sidebar">'+

              /* Pricing card */
              '<div class="pricing-card">'+
                '<div class="price-row" style="flex-direction:column;gap:0">'+
                  '<span style="font-size:.78rem;color:var(--gray-400);font-weight:600;text-transform:uppercase;letter-spacing:.04em">Budget</span>'+
                  '<span style="font-size:2rem;font-weight:900;color:var(--primary)">'+fmtCur(gig.budget)+'</span>'+
                '</div>'+
                '<div class="price-row">'+
                  '<span class="label">GigLega Fee (6%)</span>'+
                  '<span class="cp-val" style="color:var(--gray-500)">- '+fmtCur(fee)+'</span>'+
                '</div>'+
                '<div class="price-row">'+
                  '<span class="label" style="font-weight:800">You Earn</span>'+
                  '<span class="earn">'+fmtCur(earn)+'</span>'+
                '</div>'+
                '<div id="actionZone" class="action-zone" style="margin-top:16px">'+actionHtml+'</div>'+
              '</div>'+

              posterCardHtml+

            '</div>'+
          '</div>'+
        '</div>';

      /* ─── Bind buttons after render ─── */

      /* Book This Gig */
      var btnAccept = document.getElementById("btnAccept");
      if(btnAccept){
        btnAccept.addEventListener("click", function(){
          if(!currentUser){ window.location.href="login.html?redirect="+encodeURIComponent(window.location.href); return; }
          openBookingModal(gig, earn, fee);
        });
      }

      /* Delete gig */
      var btnDelete = document.getElementById("btnDeleteGig");
      if(btnDelete){
        btnDelete.addEventListener("click", async function(){
          if(!confirm("Delete this gig? Yeh action undo nahi ho sakta.")) return;
          try{
            await deleteDoc(doc(db,"gigs",gig.id));
            showToast("🗑️ Gig deleted","info");
            setTimeout(function(){ window.location.href="dashboard-client.html"; },1200);
          }catch(e){ showToast("Error: "+e.message,"error"); }
        });
      }
    }

    /* ─── Booking modal ─── */
    function openBookingModal(gig, earn, fee){
      var existing = document.getElementById("acceptModal");
      if(existing) existing.remove();

      var modal = document.createElement("div");
      modal.id = "acceptModal";
      modal.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px";
      modal.innerHTML=
        '<div style="background:#fff;border-radius:20px;padding:28px;max-width:420px;width:100%;box-shadow:0 24px 64px rgba(0,0,0,.3)">'+
          '<h3 style="font-size:1.1rem;font-weight:800;color:var(--primary,#1a3c5e);margin-bottom:4px">🚀 Confirm Booking</h3>'+
          '<p style="font-size:.82rem;color:var(--gray-500);margin-bottom:18px">Book karne ke baad aap poster se chat kar sakte hain</p>'+
          '<p style="font-weight:700;margin-bottom:14px;font-size:.95rem">'+escH(gig.title)+'</p>'+
          '<div style="background:#f0fdf4;border-radius:12px;padding:16px;margin-bottom:20px">'+
            '<div style="display:flex;justify-content:space-between;margin-bottom:8px;font-size:.88rem"><span>Budget</span><span style="font-weight:700">'+fmtCur(gig.budget)+'</span></div>'+
            '<div style="display:flex;justify-content:space-between;margin-bottom:8px;font-size:.88rem"><span>GigLega Fee (6%)</span><span style="color:#dc2626">- '+fmtCur(fee)+'</span></div>'+
            '<div style="display:flex;justify-content:space-between;font-size:1rem;font-weight:800;color:#16a34a"><span>You Earn</span><span>'+fmtCur(earn)+'</span></div>'+
          '</div>'+
          '<div style="display:flex;gap:10px">'+
            '<button id="modalCancelBtn" style="flex:1;padding:12px;border:1.5px solid #d1d5db;border-radius:10px;font-weight:700;cursor:pointer;background:#fff">Cancel</button>'+
            '<button id="modalConfirmBtn" style="flex:2;padding:12px;background:linear-gradient(135deg,#1a3c5e,#0d9488);color:#fff;border:none;border-radius:10px;font-weight:800;cursor:pointer;font-size:.95rem">Confirm Booking ✅</button>'+
          '</div>'+
        '</div>';
      document.body.appendChild(modal);

      document.getElementById("modalCancelBtn").onclick=function(){ modal.remove(); };

      document.getElementById("modalConfirmBtn").onclick=async function(){
        var btn=this; btn.disabled=true; btn.textContent="⏳ Booking…";
        try{
          var workerName = currentUser.displayName || "Worker";
          var uid = currentUser.uid;

          /* 1. Update gig status */
          await updateDoc(doc(db,"gigs",gig.id),{
            status:     "taken",
            workerId:   uid,
            workerName: workerName,
            bookedAt:   new Date().toISOString()
          });

          /* 2. Create conversation + system message */
          var convId = [uid, gig.posterId].sort().join("_")+"_"+gig.id;
          await setDoc(doc(db,"conversations",convId),{
            participants:  [uid, gig.posterId],
            gigId:         gig.id,
            gigTitle:      gig.title,
            createdAt:     serverTimestamp(),
            lastMessageAt: serverTimestamp(),
            lastMessage:   "Gig booked!"
          });
          await addDoc(collection(db,"conversations",convId,"messages"),{
            text:     "🎉 "+workerName+" ne aapki gig book kar li! Kaam shuru karne ke liye chat karen.",
            senderId: "system",
            type:     "system",
            timestamp: serverTimestamp()
          });

          /* 3. Create notification for poster */
          var chatUrl = "chat.html?with="+encodeURIComponent(uid)+"&gig="+encodeURIComponent(gig.id);
          await addDoc(collection(db,"notifications",gig.posterId,"items"),{
            type:     "gig_booked",
            title:    "Gig Booked!",
            body:     workerName+" ne aapki gig '"+gig.title+"' book kar li hai.",
            gigId:    gig.id,
            workerId: uid,
            workerName: workerName,
            chatUrl:  chatUrl,
            read:     false,
            createdAt: serverTimestamp()
          });

          modal.remove();
          showToast("🎉 Gig booked! Ab poster se chat karo.","success");
          setTimeout(function(){
            window.location.href="chat.html?with="+encodeURIComponent(gig.posterId)+"&gig="+encodeURIComponent(gig.id);
          },1000);

        }catch(e){
          showToast("Booking failed: "+e.message,"error");
          btn.disabled=false; btn.textContent="Confirm Booking ✅";
        }
      };
    }

    /* ══════ MAIN ══════ */
    var _initDone = false;
    onAuthStateChanged(auth, function(user){
      currentUser = user;
      if(!_initDone){ _initDone=true; init(); }
    });

    async function init(){
      var gigId = getParam("id");
      if(!gigId){ renderNotFound("No gig ID provided."); return; }

      document.getElementById("pageContent").innerHTML=
        '<div style="text-align:center;padding:80px 20px;color:var(--gray-400)"><div style="font-size:2rem;margin-bottom:12px">⏳</div>Loading gig...</div>';

      try{
        var gigSnap = await getDoc(doc(db,"gigs",gigId));
        if(!gigSnap.exists()){ renderNotFound("Gig not found or may have been removed."); return; }
        var gig = Object.assign({id:gigSnap.id}, gigSnap.data());

        var poster = null;
        if(gig.posterId){
          try{ var ps=await getDoc(doc(db,"users",gig.posterId)); if(ps.exists()) poster=ps.data(); }catch(e){}
        }

        var similar = [];
        try{
          var simSnap = await getDocs(query(collection(db,"gigs"),where("category","==",gig.category),where("status","==","open"),limit(5)));
          similar = simSnap.docs.filter(function(d){return d.id!==gigId;}).slice(0,3).map(function(d){return Object.assign({id:d.id},d.data());});
        }catch(e){}

        var isOwner = currentUser && currentUser.uid===gig.posterId;
        document.title=(gig.title||"Gig Detail")+" — GigLega";
        renderGig(gig, poster, similar, isOwner);

      }catch(err){
        console.error("Gig load error:",err);
        renderNotFound("Could not load gig. Please try again.");
      }
    }
  
    /* ── Mobile Book Bar wiring ── */
    function initMobileBookBar(gig, isOpen, isOwner, isWorkerWhoBooked) {
      var bar = document.getElementById('mobileBookBar');
      var earnEl = document.getElementById('mbbEarn');
      var btn = document.getElementById('btnMobileBook');
      if (!bar) return;
      var FEE = 0.06;
      var earn = Math.round((gig.budget||0) * (1 - FEE));
      if (earnEl) earnEl.textContent = '₹' + earn.toLocaleString('en-IN');
      if (isOwner || isWorkerWhoBooked) {
        bar.style.display = 'none';
        return;
      }
      bar.style.display = 'flex';
      if (isOpen) {
        btn.disabled = false;
        btn.textContent = 'Book Gig';
        btn.onclick = function() {
          var mainBtn = document.getElementById('btnAccept');
          if (mainBtn) mainBtn.click();
          else btn.textContent = 'Scroll up to book';
        };
      } else {
        btn.disabled = true;
        btn.textContent = 'Already Taken';
      }
    }

  </script>

  <!-- Mobile sticky Book bar (injected by JS) -->
  <div class="mobile-book-bar" id="mobileBookBar" style="display:none">
    <div class="mbb-price">
      <div class="mbb-earn" id="mbbEarn">₹0</div>
      <div class="mbb-label">You Earn</div>
    </div>
    <button class="btn-mobile-book" id="btnMobileBook" disabled>Book Gig</button>
  </div>
</body>
</html>
