<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - GigLega Beta</title>
    <link rel="stylesheet" href="./styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body style="background: var(--color-bg)">
    <!-- Beta Banner -->
    <div class="beta-banner">
      🚀 GigLega Beta ab Gurugram mein Live hai! Pehle 100 users mein shaamil ho
      jao — Join Karo, Free Hai!
    </div>

    <!-- Main Content -->
    <main
      style="
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 60px 20px 40px;
      "
    >
      <div
        style="
          background: white;
          border-radius: 20px;
          box-shadow: 0 8px 40px rgba(0, 0, 0, 0.12);
          padding: 48px;
          max-width: 450px;
          width: 100%;
          text-align: center;
        "
      >
        <!-- Logo -->
        <div
          style="
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 32px;
          "
        >
          <svg
            style="width: 60px; height: 60px"
            viewBox="0 0 100 100"
            xmlns="http://www.w3.org/2000/svg"
          >
            <defs>
              <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop
                  offset="0%"
                  style="stop-color: #0d2157; stop-opacity: 1"
                />
                <stop
                  offset="100%"
                  style="stop-color: #00b894; stop-opacity: 1"
                />
              </linearGradient>
            </defs>
            <circle cx="50" cy="50" r="48" fill="url(#logoGrad)" />
            <text
              x="50"
              y="58"
              text-anchor="middle"
              fill="white"
              font-size="36"
              font-weight="bold"
              font-family="Poppins, sans-serif"
            >
              GL
            </text>
          </svg>
        </div>

        <h1
          style="
            font-size: 2rem;
            color: var(--color-primary);
            font-weight: 800;
            margin-bottom: 8px;
          "
        >
          Wapas Aaye! 🙏
        </h1>
        <p style="color: #666; margin-bottom: 32px">
          Apne account mein login karein aur kaam dhundo ya post karein!
        </p>

        <form
          id="loginForm"
          style="
            display: flex;
            flex-direction: column;
            gap: 20px;
            text-align: left;
          "
        >
          <div>
            <label
              style="
                display: block;
                font-weight: 600;
                color: var(--color-primary);
                margin-bottom: 8px;
              "
              >Email ya Phone Number *</label
            >
            <input
              type="text"
              placeholder="example@gmail.com ya +91 00000-00000"
              required
              style="
                width: 100%;
                padding: 14px 16px;
                border: 2px solid #e1e5e9;
                border-radius: 10px;
                font-size: 1rem;
                font-family: Poppins, sans-serif;
                box-sizing: border-box;
                outline: none;
                transition: border-color 0.2s;
              "
              onfocus="this.style.borderColor='#00b894'"
              onblur="this.style.borderColor='#e1e5e9'"
            />
          </div>

          <div>
            <label
              style="
                display: block;
                font-weight: 600;
                color: var(--color-primary);
                margin-bottom: 8px;
              "
              >Password *</label
            >
            <input
              type="password"
              placeholder="Min. 8 characters"
              required
              style="
                width: 100%;
                padding: 14px 16px;
                border: 2px solid #e1e5e9;
                border-radius: 10px;
                font-size: 1rem;
                font-family: Poppins, sans-serif;
                box-sizing: border-box;
                outline: none;
                transition: border-color 0.2s;
              "
              onfocus="this.style.borderColor='#00b894'"
              onblur="this.style.borderColor='#e1e5e9'"
            />
          </div>

          <div style="text-align: right">
            <a
              href="#"
              style="
                color: var(--color-accent);
                text-decoration: none;
                font-size: 0.9rem;
                font-weight: 600;
              "
              >Password Bhool Gaye?</a
            >
          </div>

          <button
            type="submit"
            class="btn btn-primary"
            style="
              padding: 16px;
              font-size: 1.1rem;
              border: none;
              cursor: pointer;
              border-radius: 10px;
              margin-top: 8px;
            "
          >
            🚀 Login Karein!
          </button>
        </form>

        <div
          style="
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #eee;
          "
        >
          <p style="color: #666; font-size: 0.95rem">
            Pehli baar aaye ho?
            <a
              href="signup.html"
              style="
                color: var(--color-accent);
                text-decoration: none;
                font-weight: 600;
              "
              >Account Banao — Free Hai!</a
            >
          </p>
        </div>

        <div style="margin-top: 32px">
          <a
            href="index.html"
            style="
              color: var(--color-primary);
              text-decoration: none;
              font-weight: 600;
              font-size: 0.9rem;
            "
          >
            ← Homepage pe Wapas Jao
          </a>
        </div>
      </div>
    </main>

    <script>
      document.getElementById("loginForm").addEventListener("submit", (e) => {
        e.preventDefault();
        alert("Login successful! Aap ab apne dashboard pe ja rahe hain. 🎉");
        window.location.href = "index.html";
      });
    </script>
  </body>
</html>
