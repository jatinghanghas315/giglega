<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Login — GigLega</title>
  <link rel="icon" href="../favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="theme-dark.css" />
  
  <link rel="stylesheet" href="mobile.css?v=20260411-0215" />
<style>
    .auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px 16px;background:linear-gradient(135deg,rgba(26,60,94,.04) 0%,rgba(13,148,136,.06) 100%)}
    .auth-card{background:var(--surface);border:1.5px solid var(--gray-200);border-radius:var(--radius);box-shadow:var(--shadow-lg);width:100%;max-width:460px;overflow:hidden}
    .auth-brand{background:linear-gradient(135deg,var(--primary) 0%,var(--teal) 100%);padding:28px 32px 24px;text-align:center;color:#fff}
    .auth-logo{font-size:1.9rem;font-weight:900;letter-spacing:-1.5px;margin-bottom:4px;font-family:var(--font-display)}
    .auth-logo span{opacity:.75}
    .auth-tagline{font-size:.82rem;opacity:.75}
    .auth-tabs{display:grid;grid-template-columns:1fr 1fr;border-bottom:2px solid var(--gray-200)}
    .auth-tab{padding:14px;border:none;background:transparent;font-weight:700;font-size:.9rem;color:var(--gray-500);cursor:pointer;border-bottom:2.5px solid transparent;margin-bottom:-2px;transition:var(--transition);font-family:var(--font)}
    .auth-tab.active{color:var(--primary);border-bottom-color:var(--primary);background:rgba(26,60,94,.03)}
    .auth-tab:hover:not(.active){color:var(--gray-700);background:var(--gray-50)}
    .auth-body{padding:28px 32px 32px}
    @media(max-width:480px){.auth-body{padding:20px 20px 24px}}
    .auth-panel{display:none}
    .auth-panel.active{display:block}
    .field{margin-bottom:18px}
    .field label{display:block;font-weight:600;font-size:.86rem;color:var(--gray-700);margin-bottom:6px}
    .field-input-wrap{position:relative}
    .field-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:1rem;pointer-events:none;display:flex;align-items:center;color:var(--gray-400)}
    .field input{width:100%;padding:11px 14px;border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);font-size:.93rem;background:var(--surface);color:var(--text);font-family:var(--font);transition:border .2s,box-shadow .2s;box-sizing:border-box}
    .field input.has-icon{padding-left:38px}
    .field input.has-icon-right{padding-right:42px}
    .field input:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px rgba(13,148,136,.1)}
    .field input.is-error{border-color:var(--danger)}
    .field-error{font-size:.76rem;color:var(--danger);margin-top:5px;font-weight:600;display:none}
    .field-error.show{display:block}
    .btn-eye{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1rem;color:var(--gray-400);padding:4px;line-height:1}
    .btn-eye:hover{color:var(--gray-700)}
    .pw-strength{margin-top:8px;display:none}
    .pw-strength.show{display:block}
    .pw-bars{display:flex;gap:4px;margin-bottom:4px}
    .pw-bar{flex:1;height:4px;border-radius:2px;background:var(--gray-200);transition:background .3s}
    .pw-lbl{font-size:.74rem;font-weight:600;color:var(--gray-400)}
    .check-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:8px}
    .check-label{display:flex;align-items:center;gap:8px;font-size:.83rem;color:var(--gray-600);cursor:pointer;user-select:none}
    .check-label input{width:15px;height:15px;accent-color:var(--teal);cursor:pointer}
    .btn-forgot{background:none;border:none;color:var(--teal);font-size:.83rem;font-weight:600;cursor:pointer;padding:0;font-family:var(--font)}
    .btn-forgot:hover{text-decoration:underline}
    .btn-submit{width:100%;padding:13px;background:var(--teal);color:#fff;border:none;border-radius:var(--radius-sm);font-weight:800;font-size:.95rem;cursor:pointer;transition:transform .15s,box-shadow .15s,opacity .2s;box-shadow:0 3px 12px rgba(13,148,136,.3);margin-bottom:16px;font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:8px}
    .btn-submit:hover:not(:disabled){background:var(--primary);transform:translateY(-2px);box-shadow:0 5px 18px rgba(13,148,136,.4)}
    .btn-submit:disabled{opacity:.55;transform:none;cursor:not-allowed;box-shadow:none}
    .btn-submit .spinner{display:none;width:16px;height:16px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spin .65s linear infinite}
    .btn-submit.loading .btn-text{display:none}
    .btn-submit.loading .spinner{display:inline-block}
    @keyframes spin{to{transform:rotate(360deg)}}
    .btn-social{width:100%;padding:11px;border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);background:var(--surface);color:var(--gray-700);font-weight:600;font-size:.88rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:var(--transition);margin-bottom:10px;font-family:var(--font)}
    .btn-social:hover{border-color:var(--teal);background:rgba(13,148,136,.04)}
    .auth-switch{text-align:center;font-size:.83rem;color:var(--gray-500)}
    .auth-switch button{background:none;border:none;color:var(--teal);font-weight:700;cursor:pointer;font-size:.83rem;padding:0;font-family:var(--font)}
    .auth-switch button:hover{text-decoration:underline}
    .terms-note{font-size:.74rem;color:var(--gray-400);text-align:center;line-height:1.6;margin-top:12px}
    .terms-note a{color:var(--teal)}
    .terms-note a:hover{text-decoration:underline}
    .forgot-panel{display:none;padding:28px 32px 32px}
    .forgot-panel.active{display:block}
    @media(max-width:480px){.forgot-panel{padding:20px 20px 24px}}
    .forgot-back{background:none;border:none;color:var(--teal);font-weight:700;font-size:.84rem;cursor:pointer;padding:0;margin-bottom:20px;display:flex;align-items:center;gap:5px;font-family:var(--font)}
    .forgot-back:hover{text-decoration:underline}
    .forgot-title{font-size:1.1rem;font-weight:800;color:var(--primary);margin-bottom:6px}
    .forgot-sub{font-size:.84rem;color:var(--gray-500);margin-bottom:22px;line-height:1.5}
    .auth-success{text-align:center;padding:32px 24px;display:none}
    .auth-success.show{display:block}
    .auth-success .s-icon{font-size:3rem;margin-bottom:14px}
    .auth-success h3{font-size:1.1rem;font-weight:800;color:var(--success);margin-bottom:8px}
    .auth-success p{font-size:.85rem;color:var(--gray-500);line-height:1.6}
    /* Toast */
    #gl-toast-box{position:fixed;bottom:24px;right:24px;z-index:99999;display:flex;flex-direction:column;gap:10px;pointer-events:none}
    .gl-toast{padding:12px 18px;border-radius:10px;font-size:.88rem;font-weight:600;color:#fff;box-shadow:0 6px 24px rgba(0,0,0,.18);opacity:0;transform:translateY(12px);transition:opacity .3s,transform .3s;pointer-events:none;max-width:300px}
    .gl-toast.show{opacity:1;transform:translateY(0)}
    .gl-toast.success{background:#059669}
    .gl-toast.error{background:#dc2626}
    .gl-toast.warning{background:#d97706}
    .gl-toast.info{background:#2563eb}
    /* Dark */
    
    const lbl = document.getElementById('pwLbl');
    if (lbl) lbl.textContent = score > 0 ? labels[score-1] : 'Too short';
  });

  /* ════════════════════ LOGIN ════════════════════ */
  document.getElementById('btnLogin').addEventListener('click', doLogin);
  ['loginId','loginPw'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  });

  async function doLogin() {
    clearErrs();
    const id = document.getElementById('loginId').value.trim();
    const pw = document.getElementById('loginPw').value;

    if (!id)          { showErr('loginIdErr','Please enter your email address.'); return; }
    if (!isEmail(id)) { showErr('loginIdErr','Enter a valid email address.'); return; }
    if (!pw)          { showErr('loginPwErr','Please enter your password.'); return; }

    setLoading('btnLogin', true);
    try {
      const cred = await signInWithEmailAndPassword(auth, id, pw);
      const snap = await getDoc(doc(db, 'users', cred.user.uid));
      let userData = { id: cred.user.uid, email: id, name: cred.user.displayName || 'User' };
      if (snap.exists()) userData = { ...userData, ...snap.data() };
      localStorage.setItem(USER_KEY, JSON.stringify(userData));
      showToast('✅ Welcome back, ' + (userData.name || 'User') + '!', 'success');
      setTimeout(() => window.location.replace(redirectTo), 900);
    } catch (err) {
      setLoading('btnLogin', false);
      const code = err.code || '';
      if (code === 'auth/user-not-found' || code === 'auth/invalid-credential' || code === 'auth/invalid-email') {
        showErr('loginIdErr','No account found. Please register first.');
      } else if (code === 'auth/wrong-password') {
        showErr('loginPwErr','Incorrect password. Please try again.');
      } else if (code === 'auth/too-many-requests') {
        showErr('loginPwErr','Too many attempts. Please wait and try again.');
      } else {
        showErr('loginIdErr', err.message || 'Login failed. Please try again.');
      }
    }
  }

  /* ════════════════════ REGISTER ════════════════════ */
  document.getElementById('btnRegister').addEventListener('click', doRegister);
  document.getElementById('regPwConf').addEventListener('keydown', e => { if (e.key === 'Enter') doRegister(); });

  async function doRegister() {
    clearErrs();
    const name   = document.getElementById('regName').value.trim();
    const id     = document.getElementById('regId').value.trim();
    const city   = document.getElementById('regCity').value.trim();
    const pw     = document.getElementById('regPw').value;
    const pwConf = document.getElementById('regPwConf').value;

    let ok = true;
    if (!name || name.length < 2)  { showErr('regNameErr'); ok = false; }
    if (!id || !isEmail(id))       { showErr('regIdErr','Enter a valid email address.'); ok = false; }
    if (!city)                     { showErr('regCityErr'); ok = false; }
    if (!pw || pw.length < 6)      { showErr('regPwErr'); ok = false; }
    if (pw !== pwConf)             { showErr('regPwConfErr'); ok = false; }
    if (!ok) return;

    setLoading('btnRegister', true);
    try {
      const cred = await createUserWithEmailAndPassword(auth, id, pw);
      await updateProfile(cred.user, { displayName: name });

      const userData = {
        id:        cred.user.uid,
        name:      name,
        email:     id,
        phone:     null,
        city:      city,
        role:      prefRole === 'poster' ? 'poster' : 'worker',
        createdAt: new Date().toISOString(),
        skills:    [],
        avatar:    null,
        bio:       '',
        workType:  ''
      };

      await setDoc(doc(db, 'users', cred.user.uid), userData);
      localStorage.setItem(USER_KEY, JSON.stringify(userData));

      document.getElementById('panelRegister').style.display = 'none';
      document.getElementById('authTabs').style.display = 'none';
      document.getElementById('registerSuccess').classList.add('show');
      showToast('🎉 Welcome to GigLega, ' + name + '!', 'success');
      setTimeout(() => {
        window.location.replace(prefRole === 'poster' ? 'dashboard-client.html' : 'dashboard-worker.html');
      }, 1800);
    } catch (err) {
      setLoading('btnRegister', false);
      const code = err.code || '';
      if (code === 'auth/email-already-in-use') {
        showErr('regIdErr','Account already exists with this email. Please login.');
      } else if (code === 'auth/invalid-email') {
        showErr('regIdErr','Invalid email address.');
      } else if (code === 'auth/weak-password') {
        showErr('regPwErr','Password is too weak. Use at least 6 characters.');
      } else {
        showErr('regIdErr', err.message || 'Registration failed. Please try again.');
      }
    }
  }

  /* ════════════════════ GOOGLE LOGIN ════════════════════ */
  document.getElementById('btnGoogleLogin').addEventListener('click', async () => {
    try {
      const result = await signInWithPopup(auth, googleProvider);
      const user   = result.user;

      const snap = await getDoc(doc(db, 'users', user.uid));
      let userData;

      if (snap.exists()) {
        userData = { id: user.uid, ...snap.data() };
      } else {
        userData = {
          id:        user.uid,
          name:      user.displayName || 'GigLega User',
          email:     user.email,
          phone:     null,
          city:      'Gurugram',
          role:      prefRole === 'poster' ? 'poster' : 'worker',
          createdAt: new Date().toISOString(),
          skills:    [],
          avatar:    user.photoURL || null,
          bio:       '',
          workType:  ''
        };
        await setDoc(doc(db, 'users', user.uid), userData);
      }

      localStorage.setItem(USER_KEY, JSON.stringify(userData));
      showToast('✅ Welcome, ' + (userData.name || 'User') + '!', 'success');
      setTimeout(() => window.location.replace(redirectTo), 900);
    } catch (err) {
      if (err.code !== 'auth/popup-closed-by-user' && err.code !== 'auth/cancelled-popup-request') {
        showToast('Google login failed: ' + (err.message || 'Please try again.'), 'error');
      }
    }
  });

  /* ════════════════════ FORGOT PASSWORD ════════════════════ */
  document.getElementById('btnSendOtp').addEventListener('click', async () => {
    clearErrs();
    const id = document.getElementById('forgotId').value.trim();
    if (!id || !isEmail(id)) {
      showErr('forgotIdErr','Please enter a valid email address.');
      return;
    }

    setLoading('btnSendOtp', true);
    try {
      await sendPasswordResetEmail(auth, id);
      setLoading('btnSendOtp', false);
      document.getElementById('fStep1').style.display = 'none';
      document.getElementById('forgotSuccess').innerHTML = `
        <div class="s-icon">📧</div>
        <h3 style="color:var(--success)">Reset Email Sent!</h3>
        <p>We sent a password reset link to <strong>${id}</strong>.<br>
        Check your inbox (and spam folder) and click the link to set a new password.</p>
        <button onclick="location.reload()" style="margin-top:16px;background:none;border:1.5px solid var(--teal);color:var(--teal);padding:9px 22px;border-radius:8px;font-weight:700;cursor:pointer;font-family:var(--font)">← Back to Login</button>
      `;
      document.getElementById('forgotSuccess').classList.add('show');
      showToast('✅ Reset link sent to ' + id, 'success');
    } catch (err) {
      setLoading('btnSendOtp', false);
      const code = err.code || '';
      if (code === 'auth/user-not-found') {
        showErr('forgotIdErr','No account found with this email.');
      } else {
        showErr('forgotIdErr','Failed to send reset email. Please try again.');
      }
    }
  });

</script>
</body>
</html>
