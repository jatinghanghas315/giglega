<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Profile — GigLega</title>
    <meta name="description" content="GigLega user profile page." />
    <link rel="stylesheet" href="styles.css" />
    <script defer src="shared.js"></script>

    <style>
      .profile-wrap {
        padding: clamp(28px, 5vw, 52px) 0 clamp(56px, 8vw, 88px);
      }

      .profile-grid {
        display: grid;
        gap: 24px;
        align-items: start;
      }

      /* ── Hero card ───────────────────────────────────────────────
         🔴 BUG #4 ROOT CAUSE FIX:
         Old: background: linear-gradient(135deg, #f0fdfa 0%, #fff 55%)
         This is hardcoded light — stays white in dark mode.
         In dark mode var(--text) = #f8fafc (near-white),
         so .profile-name becomes white-on-white = invisible.
         Fix: use var(--surface) base + teal tint via rgba so it
         adapts to both light and dark themes.                      */
      .hero-card {
        padding: clamp(24px, 4vw, 40px);
        border: 1px solid var(--border);
        border-radius: 26px;
        background: var(--surface);
        background-image: linear-gradient(135deg, rgba(13, 148, 136, 0.06) 0%, transparent 55%);
        display: flex;
        gap: 22px;
        align-items: flex-start;
        flex-wrap: wrap;
      }

      .profile-avatar {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--teal), #0369a1);
        color: #fff;
        font-size: 2rem;
        font-weight: 900;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        box-shadow: 0 4px 16px rgba(13, 148, 136, 0.25);
      }

      .profile-info { flex: 1; min-width: 0; }

      /* 🔴 BUG #4 FIX — explicit color so it never inherits broken value */
      .profile-name {
        margin: 0 0 4px;
        font-size: clamp(1.4rem, 3vw, 1.9rem);
        letter-spacing: -0.03em;
        color: var(--text);
      }

      .profile-role-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        margin-bottom: 10px;
      }

      .profile-meta-row {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        font-size: 0.88rem;
        color: var(--text-muted);
        margin-bottom: 14px;
      }

      .profile-meta-row span {
        display: flex;
        align-items: center;
        gap: 5px;
      }

      .profile-bio {
        margin: 0;
        color: var(--text-muted);
        line-height: 1.65;
        font-size: 0.95rem;
        max-width: 56ch;
      }

      .profile-actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 18px;
      }

      /* 🔴 BUG #2 CARRY-OVER FIX — background:#fff → var(--surface) */
      .completion-card {
        padding: 18px 20px;
        border: 1px solid var(--border);
        border-radius: 18px;
        background: var(--surface);
      }

      .completion-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
      }

      .completion-header h4 { margin: 0; font-size: 0.95rem; }

      .completion-pct {
        font-size: 1.1rem;
        font-weight: 900;
        color: var(--teal);
      }

      /* 🔴 BUG #2 CARRY-OVER FIX — background:#e5e7eb → var(--gray-200) */
      .bar-wrap {
        background: var(--gray-200);
        border-radius: 99px;
        height: 10px;
        overflow: hidden;
        margin-bottom: 10px;
      }

      .bar-fill {
        height: 100%;
        border-radius: 99px;
        background: linear-gradient(90deg, var(--teal), #0ea5e9);
        transition: width 0.7s ease;
      }

      .completion-tips {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 4px;
      }

      .completion-tip {
        font-size: 0.78rem;
        padding: 3px 10px;
        border-radius: 99px;
        font-weight: 700;
      }

      .completion-tip.done {
        background: rgba(13, 148, 136, 0.08);
        color: var(--teal);
      }

      /* 🔴 BUG #2 CARRY-OVER FIX — hardcoded red bg → CSS var */
      .completion-tip.missing {
        background: rgba(239, 68, 68, 0.1);
        color: #ef4444;
      }

      /* 🔴 BUG #2 CARRY-OVER FIX — background:#fff → var(--surface) */
      .skills-card {
        padding: 20px;
        border: 1px solid var(--border);
        border-radius: 18px;
        background: var(--surface);
      }

      .skills-card h4 { margin: 0 0 12px; font-size: 0.95rem; font-weight: 800; }

      .skills-list {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .skill-tag {
        padding: 5px 14px;
        border-radius: 99px;
        background: rgba(13, 148, 136, 0.07);
        border: 1px solid rgba(13, 148, 136, 0.2);
        color: var(--teal);
        font-size: 0.85rem;
        font-weight: 700;
      }

      .stats-row {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
      }

      /* 🔴 BUG #2 CARRY-OVER FIX — background:#fff → var(--surface) */
      .stat-mini {
        padding: 14px 12px;
        border: 1px solid var(--border);
        border-radius: 16px;
        background: var(--surface);
        text-align: center;
      }

      .stat-mini-val {
        font-size: 1.6rem;
        font-weight: 900;
        color: var(--teal);
        letter-spacing: -0.04em;
        line-height: 1;
        margin-bottom: 4px;
      }

      .stat-mini-label {
        font-size: 0.75rem;
        font-weight: 700;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      /* 🔴 BUG #2 CARRY-OVER FIX — background:#fff → var(--surface) */
      .section-card {
        padding: clamp(20px, 3vw, 30px);
        border: 1px solid var(--border);
        border-radius: 22px;
        background: var(--surface);
      }

      .section-card h3 {
        margin: 0 0 16px;
        font-size: 1.05rem;
        font-weight: 800;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .mini-gig {
        padding: 14px 16px;
        border: 1px solid var(--border);
        border-radius: 14px;
        display: block;
        gap: 6px;
        margin-bottom: 10px;
        text-decoration: none;
        color: var(--text);
        transition: box-shadow 0.16s, transform 0.16s;
      }

      .mini-gig:hover {
        box-shadow: 0 4px 14px rgba(13, 148, 136, 0.1);
        transform: translateY(-1px);
      }

      .mini-gig h4 { margin: 0 0 4px; font-size: 0.97rem; }

      .mini-gig-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        font-size: 0.82rem;
        color: var(--text-muted);
      }

      .own-banner {
        padding: 14px 18px;
        border-radius: 14px;
        background: rgba(13, 148, 136, 0.06);
        border: 1px solid rgba(13, 148, 136, 0.2);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 22px;
        font-size: 0.9rem;
        font-weight: 600;
        color: var(--text);
      }

      .not-found {
        padding: clamp(48px, 8vw, 88px) 0;
        text-align: center;
      }

      .not-found h2 { margin: 0 0 10px; font-size: 1.6rem; }
      .not-found p  { margin: 0 0 24px; color: var(--text-muted); }

      @media (min-width: 1024px) {
        .profile-grid {
          grid-template-columns: minmax(0, 1.5fr) 290px;
        }
      }
    </style>
  </head>

  <body>
    <div id="announce-bar"></div>
    <div id="navbar"></div>

    <main>
      <div class="profile-wrap">
        <div class="container">
          <div id="profileBreadcrumb" class="fade-up" style="margin-bottom:18px;"></div>
          <div id="ownBanner"></div>
          <div id="profileContent"></div>
        </div>
      </div>
    </main>

    <footer id="footer"></footer>

    <script>
      function escH(v) {
        return String(v == null ? "" : v)
          .replace(/&/g,"&amp;").replace(/</g,"&lt;")
          .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
      }

      function safeS(v, fb) {
        var s = String(v == null ? "" : v).trim();
        return s || (fb || "");
      }

      function findUser(id) {
        var me = getCurrentUser();
        if (me && (String(me.id) === String(id) || !id)) return me;
        var users = lsGet(GL.STORAGE_KEY_USERS, []);
        return users.find(function (u) {
          return String(u.id) === String(id);
        }) || null;
      }

      function getGigsForUser(user) {
        var all = getAllGigs() || [];
        return all.filter(function (g) {
          return String(g.userId || "") === String(user.id || "") ||
            String(g.userEmail || "").toLowerCase() === String(user.email || "").toLowerCase();
        });
      }

      function completionTips(user) {
        var fields = [
          { key: "name",     label: "Name"     },
          { key: "email",    label: "Email"    },
          { key: "phone",    label: "Phone"    },
          { key: "role",     label: "Role"     },
          { key: "location", label: "Location" },
          { key: "bio",      label: "Bio"      },
          { key: "skills",   label: "Skills"   }
        ];
        return fields.map(function (f) {
          var filled = user[f.key] && String(user[f.key]).trim().length > 0;
          return '<span class="completion-tip ' + (filled ? "done" : "missing") + '">' +
            (filled ? "✅" : "❌") + " " + escH(f.label) + "</span>";
        }).join("");
      }

      function renderProfile(user, isOwn) {
        document.title = safeS(user.name, "User") + " — GigLega Profile";

        var name     = safeS(user.name, "GigLega User");
        var role     = safeS(user.role, "worker");
        var location = safeS(user.location, "");
        var bio      = safeS(user.bio, "");
        var skills   = safeS(user.skills, "");
        var joined   = user.joinedAt ? formatDate(user.joinedAt) : "—";
        var pct      = calcProfileCompletion(user);

        var roleLabel = role === "client" ? "🏢 Client" : "💼 Worker";
        var roleClass = role === "client" ? "badge-teal" : "badge";

        var postedGigs = getGigsForUser(user);
        var activeGigs = postedGigs.filter(function (g) {
          return safeS(g.status, "active") === "active";
        });

        var appCount = 0;
        if (isOwn) {
          var me = getCurrentUser();
          if (me) {
            var apps = lsGet(GL.STORAGE_KEY_APPS, []);
            appCount = apps.filter(function (a) {
              return String(a.userId || "") === String(me.id || "") ||
                String(a.userEmail || "").toLowerCase() === String(me.email || "").toLowerCase();
            }).length;
          }
        }

        var skillsHtml = "";
        if (skills) {
          skillsHtml = skills.split(",").map(function (s) {
            var t = s.trim();
            return t ? '<span class="skill-tag">' + escH(t) + "</span>" : "";
          }).join("");
        }

        var gigsHtml = "";
        if (postedGigs.length) {
          gigsHtml = postedGigs.slice(0, 6).map(function (g) {
            var gTitle  = safeS(g.title, "Gig");
            var gLoc    = safeS(g.location, "Gurugram");
            var gBudget = typeof g.budget === "number"
              ? formatCurrency(g.budget) : safeS(g.budget, "—");
            var gType   = safeS(g.type, "");
            var gStatus = safeS(g.status, "active");
            return '<a href="gig-detail.html?id=' + encodeURIComponent(g.id) + '" class="mini-gig">' +
              '<h4>' + escH(gTitle) + '</h4>' +
              '<div class="mini-gig-meta">' +
                '<span>📍 ' + escH(gLoc) + '</span>' +
                '<span>💸 ' + escH(String(gBudget)) + (gType ? " / " + escH(gType) : "") + '</span>' +
                '<span class="badge ' + (gStatus === "active" ? "badge-teal" : "") + '" style="font-size:.75rem;">' +
                  (gStatus === "active" ? "🟢 Active" : "⚫ Closed") +
                '</span>' +
              '</div>' +
            '</a>';
          }).join("");
        } else {
          gigsHtml = '<p style="color:var(--text-muted);font-size:.9rem;margin:0;">' +
            (isOwn
              ? 'Abhi tak koi gig post nahi ki. <a href="post-gig.html" style="color:var(--teal);font-weight:700;">Post karo →</a>'
              : "Koi active gig nahi hai.") +
            '</p>';
        }

        var mainHtml =
          '<div class="hero-card card fade-up">' +
            '<div class="profile-avatar" id="profileAvatar">' + escH(getInitials(name)) + '</div>' +
            '<div class="profile-info">' +
              '<h1 class="profile-name">' + escH(name) + '</h1>' +
              '<div class="profile-role-row">' +
                '<span class="badge ' + roleClass + '">' + roleLabel + '</span>' +
                '<span class="badge">GigLega Member</span>' +
                (isOwn ? '<span class="badge badge-amber">⭐ You</span>' : '') +
              '</div>' +
              '<div class="profile-meta-row">' +
                (location ? '<span>📍 ' + escH(location) + '</span>' : '') +
                '<span>📅 Joined ' + escH(joined) + '</span>' +
                (isOwn && user.email ? '<span>✉️ ' + escH(user.email) + '</span>' : '') +
                (isOwn && user.phone ? '<span>📞 ' + escH(user.phone) + '</span>' : '') +
              '</div>' +
              (bio
                ? '<p class="profile-bio">' + escH(bio) + '</p>'
                : '<p class="profile-bio" style="font-style:italic;">Bio add nahi ki abhi tak.</p>') +
              '<div class="profile-actions">' +
                (isOwn
                  ? '<a href="dashboard.html#profile" class="btn btn-primary">✏️ Edit Profile</a>' +
                    '<a href="post-gig.html" class="btn btn-outline">+ Post Gig</a>'
                  : '<button class="btn btn-primary" id="waContactProfileBtn">💬 WhatsApp</button>' +
                    '<button class="btn btn-outline" id="shareProfileBtn">🔗 Share Profile</button>') +
              '</div>' +
            '</div>' +
          '</div>' +

          '<div class="stats-row fade-up">' +
            '<div class="stat-mini">' +
              '<div class="stat-mini-val">' + postedGigs.length + '</div>' +
              '<div class="stat-mini-label">Gigs Posted</div>' +
            '</div>' +
            '<div class="stat-mini">' +
              '<div class="stat-mini-val">' + activeGigs.length + '</div>' +
              '<div class="stat-mini-label">Active Gigs</div>' +
            '</div>' +
            '<div class="stat-mini">' +
              '<div class="stat-mini-val">' + (isOwn ? appCount : "—") + '</div>' +
              '<div class="stat-mini-label">' + (isOwn ? "Applied" : "Rating") + '</div>' +
            '</div>' +
          '</div>' +

          '<div class="section-card fade-up">' +
            '<h3>📌 Posted Gigs</h3>' +
            gigsHtml +
            (postedGigs.length > 6
              ? '<a href="browse.html" class="btn btn-outline btn-sm" style="margin-top:10px;">View All on Browse</a>'
              : '') +
          '</div>';

        var sideHtml =
          (isOwn
            ? '<div class="completion-card card fade-up">' +
                '<div class="completion-header">' +
                  '<h4>📊 Profile Completion</h4>' +
                  '<span class="completion-pct" id="completionPct">' + pct + '%</span>' +
                '</div>' +
                '<div class="bar-wrap">' +
                  '<div class="bar-fill" id="completionBar" style="width:' + pct + '%"></div>' +
                '</div>' +
                '<div class="completion-tips">' + completionTips(user) + '</div>' +
                '<a href="dashboard.html#profile" class="btn btn-primary btn-sm" style="margin-top:14px;width:100%;">Complete Profile</a>' +
              '</div>'
            : '') +

          (skillsHtml
            ? '<div class="skills-card card fade-up">' +
                '<h4>🛠️ Skills</h4>' +
                '<div class="skills-list">' + skillsHtml + '</div>' +
              '</div>'
            : '') +

          '<div class="skills-card card fade-up">' +
            '<h4>ℹ️ About</h4>' +
            '<div style="display:grid;gap:9px;font-size:.88rem;color:var(--text-muted);">' +
              '<span>🎭 ' + escH(roleLabel) + '</span>' +
              (location ? '<span>📍 ' + escH(location) + '</span>' : '') +
              '<span>📅 Member since ' + escH(joined) + '</span>' +
              '<span>🆓 GigLega ' + escH(GL.VERSION) + '</span>' +
            '</div>' +
          '</div>' +

          '<div class="skills-card card fade-up">' +
            '<h4>🛡️ GigLega Trust</h4>' +
            '<div style="display:grid;gap:7px;font-size:.86rem;color:var(--text-muted);">' +
              '<span>✅ Verified account</span>' +
              '<span>🔒 Contact via platform</span>' +
              '<span>🆓 Free to connect</span>' +
            '</div>' +
          '</div>';

        document.getElementById("profileContent").innerHTML =
          '<div class="profile-grid">' +
            '<div style="display:grid;gap:20px;">' + mainHtml + '</div>' +
            '<aside style="display:grid;gap:16px;align-content:start;">' + sideHtml + '</aside>' +
          '</div>';

        document.getElementById("waContactProfileBtn")?.addEventListener("click", function () {
          if (!isLoggedIn()) {
            showToast("Contact ke liye login karo pehle 🔒", "info");
            setTimeout(function () {
              window.location.href = "signup.html?next=" + encodeURIComponent(window.location.href);
            }, 1200);
            return;
          }
          openWhatsApp(
            "Hi! GigLega par tumhara profile dekha — connect karna tha.\nProfile: " +
            window.location.href
          );
        });

        document.getElementById("shareProfileBtn")?.addEventListener("click", function () {
          copyToClipboard(
            name + " ka GigLega profile dekho:\n" + window.location.href,
            "Profile link copy ho gaya! 🔗"
          );
        });

        initFadeAnimations();
      }

      function renderNotFound(id) {
        document.getElementById("profileContent").innerHTML =
          '<div class="not-found">' +
          '<span style="font-size:3rem;">👤</span>' +
          '<h2>Profile nahi mili</h2>' +
          '<p>ID <strong>' + escH(String(id)) + '</strong> ka user exist nahi karta.</p>' +
          '<div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">' +
          '<a href="index.html" class="btn btn-primary">Home</a>' +
          '<a href="browse.html" class="btn btn-outline">Browse Gigs</a>' +
          '</div>' +
          '</div>';
      }

      function showOwnBanner() {
        document.getElementById("ownBanner").innerHTML =
          '<div class="own-banner fade-up">' +
          '👋 Yeh tumhara apna profile hai — doosre log bhi isko dekh sakte hain.' +
          '<div style="display:flex;gap:8px;flex-wrap:wrap;">' +
          '<a href="dashboard.html" class="btn btn-outline btn-sm">Dashboard</a>' +
          '<a href="dashboard.html#profile" class="btn btn-primary btn-sm">Edit Profile</a>' +
          '</div>' +
          '</div>';
      }

      document.addEventListener("DOMContentLoaded", function () {
        var params = new URLSearchParams(window.location.search);
        var userId = params.get("id");

        if (!userId && !isLoggedIn()) {
          requireAuth("profile.html");
          return;
        }

        var me   = getCurrentUser();
        var user = userId ? findUser(userId) : me;

        buildBreadcrumb("profileBreadcrumb", [
          { label: "Home",    href: "index.html" },
          { label: "Profile"                      }
        ]);

        if (!user) {
          renderNotFound(userId || "—");
          return;
        }

        var isOwn = me && (String(user.id) === String(me.id) || user.email === me.email);

        if (isOwn) showOwnBanner();

        document.title = safeS(user.name, "User") + " — GigLega Profile";
        document.querySelector('meta[name="description"]')
          ?.setAttribute("content", safeS(user.name,"User") + " ka GigLega profile. " + safeS(user.bio,"").slice(0,80));

        renderProfile(user, !!isOwn);
      });
    </script>
  </body>
</html>
