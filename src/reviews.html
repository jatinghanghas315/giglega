<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reviews — GigLega</title>

  <script src="shared.js"></script>
  <link rel="stylesheet" href="styles.css" />

  <style>
    .reviews-wrap { max-width: 900px; margin: 0 auto; padding: 28px 16px 80px; }

    /* ── Profile summary card ── */
    .profile-card {
      background: var(--surface);
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius);
      padding: 24px;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
      margin-bottom: 24px;
      box-shadow: var(--shadow-sm);
    }
    .profile-avatar {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--teal));
      color: #fff;
      font-size: 1.6rem;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 4px 14px rgba(13,148,136,.3);
    }
    .profile-info { flex: 1; min-width: 0; }
    .profile-name { font-size: 1.1rem; font-weight: 900; color: var(--primary); margin-bottom: 3px; }
    .profile-role { font-size: .82rem; color: var(--gray-500); margin-bottom: 8px; }
    .profile-badges { display: flex; gap: 8px; flex-wrap: wrap; }
    .profile-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 12px;
      border-radius: 14px;
      font-size: .75rem;
      font-weight: 700;
    }
    .badge-verified { background: rgba(16,185,129,.1); color: var(--success); }
    .badge-top      { background: rgba(245,158,11,.1);  color: #b45309; }
    .badge-new      { background: rgba(13,148,136,.1);  color: var(--teal); }

    /* ── Rating hero ── */
    .rating-hero {
      background: linear-gradient(135deg, var(--primary) 0%, var(--teal) 100%);
      border-radius: var(--radius);
      padding: 28px;
      color: #fff;
      margin-bottom: 24px;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 28px;
      align-items: center;
    }
    @media (max-width: 560px) { .rating-hero { grid-template-columns: 1fr; text-align: center; } }
    .rating-big { text-align: center; }
    .rating-number {
      font-size: clamp(3rem, 8vw, 4.5rem);
      font-weight: 900;
      line-height: 1;
      color: #fff;
    }
    .rating-stars-big { font-size: 1.4rem; margin: 6px 0; letter-spacing: 2px; }
    .rating-total { font-size: .82rem; opacity: .7; }

    /* Breakdown bars */
    .rating-breakdown { }
    .breakdown-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .breakdown-row:last-child { margin-bottom: 0; }
    .breakdown-label { font-size: .78rem; opacity: .85; white-space: nowrap; min-width: 36px; text-align: right; }
    .breakdown-bar-wrap {
      flex: 1;
      height: 7px;
      background: rgba(255,255,255,.2);
      border-radius: 4px;
      overflow: hidden;
    }
    .breakdown-bar-fill {
      height: 100%;
      background: #fff;
      border-radius: 4px;
      transition: width .6s ease;
    }
    .breakdown-count { font-size: .75rem; opacity: .7; min-width: 20px; }

    /* ── Stats row ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 14px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--surface);
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius);
      padding: 16px 18px;
      box-shadow: var(--shadow-sm);
      text-align: center;
    }
    .stat-icon { font-size: 1.4rem; margin-bottom: 6px; display: block; }
    .stat-val  { font-size: 1.3rem; font-weight: 800; color: var(--primary); }
    .stat-val.green { color: var(--success); }
    .stat-val.amber { color: var(--accent); }
    .stat-lbl  { font-size: .73rem; color: var(--gray-400); margin-top: 3px; }

    /* ── Controls ── */
    .controls-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 18px;
    }
    .filter-chips { display: flex; gap: 7px; flex-wrap: wrap; }
    .chip {
      padding: 6px 14px;
      border-radius: 16px;
      border: 1.5px solid var(--gray-200);
      font-size: .78rem;
      font-weight: 700;
      color: var(--gray-500);
      cursor: pointer;
      background: transparent;
      white-space: nowrap;
      transition: all .2s;
      font-family: var(--font);
    }
    .chip.active { border-color: var(--teal); background: rgba(13,148,136,.08); color: var(--teal); }
    .chip:hover:not(.active) { border-color: var(--gray-400); color: var(--gray-700); }

    .sort-select {
      padding: 7px 12px;
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius-sm);
      font-size: .82rem;
      font-family: var(--font);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
    }
    .sort-select:focus { outline: none; border-color: var(--teal); }

    /* ── Review cards ── */
    .review-card {
      background: var(--surface);
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 12px;
      box-shadow: var(--shadow-sm);
      transition: border .2s;
    }
    .review-card:hover { border-color: rgba(13,148,136,.3); }
    .review-card.highlighted { border-color: var(--teal); background: rgba(13,148,136,.02); }

    .review-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .reviewer-info { display: flex; align-items: center; gap: 11px; }
    .reviewer-avatar {
      width: 42px; height: 42px;
      border-radius: 50%;
      background: var(--primary);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .85rem;
      font-weight: 700;
      flex-shrink: 0;
    }
    .reviewer-name  { font-size: .9rem; font-weight: 700; color: var(--text); margin-bottom: 2px; }
    .reviewer-role  { font-size: .75rem; color: var(--gray-400); }

    /* Star rating */
    .star-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .stars { font-size: .95rem; letter-spacing: 1px; }
    .star-num { font-size: .82rem; font-weight: 700; color: var(--accent); }
    .review-date { font-size: .74rem; color: var(--gray-400); }

    /* Review body */
    .review-gig-tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      background: var(--gray-100);
      border-radius: 8px;
      font-size: .75rem;
      font-weight: 600;
      color: var(--gray-600);
      margin-bottom: 10px;
      text-decoration: none;
    }
    .review-gig-tag:hover { background: rgba(13,148,136,.1); color: var(--teal); text-decoration: none; }
    .review-text {
      font-size: .88rem;
      color: var(--gray-700);
      line-height: 1.7;
      margin-bottom: 12px;
    }
    .review-text.collapsed {
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .btn-read-more {
      background: none;
      border: none;
      color: var(--teal);
      font-size: .8rem;
      font-weight: 700;
      cursor: pointer;
      padding: 0;
      font-family: var(--font);
      margin-bottom: 10px;
      display: block;
    }

    /* Skill tags */
    .skill-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
    .skill-tag {
      padding: 3px 10px;
      background: rgba(13,148,136,.08);
      color: var(--teal);
      border-radius: 8px;
      font-size: .72rem;
      font-weight: 700;
    }

    /* Helpful */
    .review-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
      padding-top: 12px;
      border-top: 1px solid var(--gray-100);
    }
    .helpful-row { display: flex; align-items: center; gap: 8px; font-size: .78rem; color: var(--gray-500); }
    .btn-helpful {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 12px;
      border: 1.5px solid var(--gray-200);
      border-radius: 12px;
      font-size: .75rem;
      font-weight: 700;
      color: var(--gray-500);
      background: transparent;
      cursor: pointer;
      font-family: var(--font);
      transition: all .2s;
    }
    .btn-helpful:hover,
    .btn-helpful.active { border-color: var(--success); color: var(--success); background: rgba(16,185,129,.06); }
    .review-type-badge {
      font-size: .68rem;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 8px;
      text-transform: uppercase;
      letter-spacing: .4px;
    }
    .type-worker { background: rgba(13,148,136,.1); color: var(--teal); }
    .type-poster { background: rgba(26,60,94,.1); color: var(--primary); }

    /* ── Write a review ── */
    .write-card {
      background: var(--surface);
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 24px;
      box-shadow: var(--shadow-sm);
    }
    .write-card-header {
      padding: 16px 20px;
      border-bottom: 1.5px solid var(--gray-100);
      font-size: .95rem;
      font-weight: 800;
      color: var(--primary);
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      justify-content: space-between;
    }
    .write-card-body { padding: 20px; display: none; }
    .write-card-body.open { display: block; }

    /* Star picker */
    .star-picker { display: flex; gap: 6px; margin-bottom: 16px; }
    .star-pick {
      font-size: 1.8rem;
      cursor: pointer;
      transition: transform .15s;
      line-height: 1;
      color: var(--gray-300);
      background: none;
      border: none;
      padding: 0;
    }
    .star-pick:hover,
    .star-pick.active { color: var(--accent); transform: scale(1.15); }

    .form-field { margin-bottom: 14px; }
    .form-field label { display: block; font-size: .83rem; font-weight: 600; color: var(--gray-700); margin-bottom: 5px; }
    .form-field input,
    .form-field select,
    .form-field textarea {
      width: 100%;
      padding: 10px 13px;
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius-sm);
      font-size: .88rem;
      font-family: var(--font);
      background: var(--surface);
      color: var(--text);
      transition: border .2s;
      box-sizing: border-box;
    }
    .form-field input:focus,
    .form-field select:focus,
    .form-field textarea:focus { outline: none; border-color: var(--teal); box-shadow: 0 0 0 3px rgba(13,148,136,.1); }
    .form-field textarea { resize: vertical; min-height: 100px; line-height: 1.6; }
    .char-count { font-size: .73rem; color: var(--gray-400); text-align: right; margin-top: 4px; }

    /* Skill chips selector */
    .skill-selector { display: flex; flex-wrap: wrap; gap: 7px; }
    .skill-opt {
      padding: 5px 13px;
      border: 1.5px solid var(--gray-200);
      border-radius: 14px;
      font-size: .78rem;
      font-weight: 700;
      color: var(--gray-500);
      cursor: pointer;
      background: transparent;
      transition: all .2s;
      font-family: var(--font);
    }
    .skill-opt.selected { border-color: var(--teal); background: rgba(13,148,136,.08); color: var(--teal); }

    .btn-submit-review {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, var(--primary), var(--teal));
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: .9rem;
      font-weight: 800;
      cursor: pointer;
      font-family: var(--font);
      transition: all .2s;
      box-shadow: 0 3px 10px rgba(13,148,136,.3);
    }
    .btn-submit-review:hover { opacity: .88; transform: translateY(-1px); }
    .btn-submit-review:disabled { opacity: .5; cursor: not-allowed; transform: none; }

    /* ── Empty ── */
    .reviews-empty {
      text-align: center;
      padding: 56px 20px;
      color: var(--gray-400);
      background: var(--surface);
      border: 1.5px dashed var(--gray-200);
      border-radius: var(--radius);
    }
    .reviews-empty .ei { font-size: 2.8rem; margin-bottom: 12px; display: block; }
    .reviews-empty h3  { font-size: 1rem; font-weight: 800; color: var(--primary); margin-bottom: 6px; }
    .reviews-empty p   { font-size: .85rem; line-height: 1.6; }

    /* ── Load more ── */
    .btn-load-more {
      width: 100%;
      padding: 12px;
      background: transparent;
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius-sm);
      font-size: .88rem;
      font-weight: 700;
      color: var(--gray-600);
      cursor: pointer;
      font-family: var(--font);
      transition: all .2s;
      margin-top: 8px;
    }
    .btn-load-more:hover { border-color: var(--teal); color: var(--teal); }

    /* Dark mode */
    [data-theme="dark"] .profile-card  { border-color: var(--gray-700); }
    [data-theme="dark"] .stat-card     { border-color: var(--gray-700); }
    [data-theme="dark"] .review-card   { border-color: var(--gray-700); }
    [data-theme="dark"] .review-foot   { border-color: var(--gray-800); }
    [data-theme="dark"] .write-card    { border-color: var(--gray-700); }
    [data-theme="dark"] .write-card-header { border-color: var(--gray-700); }
    [data-theme="dark"] .review-gig-tag{ background: var(--gray-800); color: var(--gray-400); }
    [data-theme="dark"] .review-text   { color: var(--gray-300); }
    [data-theme="dark"] .chip          { border-color: var(--gray-700); color: var(--gray-400); }
    [data-theme="dark"] .form-field label { color: var(--gray-300); }
    [data-theme="dark"] .form-field input,
    [data-theme="dark"] .form-field select,
    [data-theme="dark"] .form-field textarea { background: var(--gray-800); border-color: var(--gray-600); }
    [data-theme="dark"] .star-pick     { color: var(--gray-600); }
    [data-theme="dark"] .reviews-empty { border-color: var(--gray-700); }
    [data-theme="dark"] .btn-load-more { border-color: var(--gray-700); color: var(--gray-400); }
    [data-theme="dark"] .sort-select   { background: var(--gray-800); border-color: var(--gray-700); }
  </style>
</head>
<body>

  <div id="announce-bar"></div>
  <nav id="main-nav"></nav>

  <main>
    <div class="reviews-wrap">

      <nav id="breadcrumb"></nav>

      <!-- Profile Card -->
      <div class="profile-card" id="profileCard"></div>

      <!-- Rating Hero -->
      <div class="rating-hero" id="ratingHero"></div>

      <!-- Stats Row -->
      <div class="stats-row" id="statsRow"></div>

      <!-- Write a Review (collapsible) -->
      <div class="write-card" id="writeCard"></div>

      <!-- Controls -->
      <div class="controls-bar">
        <div class="filter-chips" id="filterChips">
          <button class="chip active" data-filter="all">All Reviews</button>
          <button class="chip" data-filter="5">⭐⭐⭐⭐⭐ 5 Star</button>
          <button class="chip" data-filter="4">⭐⭐⭐⭐ 4 Star</button>
          <button class="chip" data-filter="worker">As Worker</button>
          <button class="chip" data-filter="poster">As Poster</button>
        </div>
        <select class="sort-select" id="sortSelect">
          <option value="newest">Newest First</option>
          <option value="highest">Highest Rating</option>
          <option value="lowest">Lowest Rating</option>
          <option value="helpful">Most Helpful</option>
        </select>
      </div>

      <!-- Review list -->
      <div id="reviewList"></div>
      <button class="btn-load-more" id="btnLoadMore" style="display:none">Load More Reviews</button>

    </div>
  </main>

  <footer id="main-footer"></footer>
  <div id="toast-container"></div>

  <script>
  (function () {

    /* ── Auth ── */
    var user = (function () {
      try {
        var u = JSON.parse(localStorage.getItem("gl_user") || "null");
        return (u && u.id) ? u : null;
      } catch(e) { return null; }
    })();
    if (!user) { window.location.href = "login.html?redirect=reviews.html"; return; }

    /* ── URL param — whose reviews? default = logged in user ── */
    var params     = new URLSearchParams(window.location.search);
    var targetId   = params.get("uid") || user.id;
    var isOwnPage  = targetId === user.id;

    /* ── Breadcrumb ── */
    if (typeof buildBreadcrumb === "function") {
      buildBreadcrumb("breadcrumb", [
        { label: "Home",    href: "index.html" },
        { label: "Profile", href: "profile.html" },
        { label: "Reviews" }
      ]);
    }

    /* ── Storage ── */
    var REVIEW_KEY = "gl_reviews_" + targetId;
    function getReviews()   { return JSON.parse(localStorage.getItem(REVIEW_KEY) || "[]"); }
    function saveReviews(r) { localStorage.setItem(REVIEW_KEY, JSON.stringify(r)); }

    /* ── Seed demo reviews ── */
    (function seed() {
      if (getReviews().length) return;
      var now = Date.now();
      saveReviews([
        {
          id:"r1", rating:5, type:"worker",
          reviewer:"Priya Mehta", reviewerInitials:"PM", reviewerRole:"Poster · DLF Phase 2",
          gigTitle:"Office Cleaning — DLF Phase 2",
          text:"Absolutely fantastic work! Arrived on time, completed everything thoroughly and even cleaned areas I didn't ask for. Will definitely hire again. Very professional attitude.",
          skills:["Punctual","Professional","Hard Working"],
          helpful:8, helpedByMe:false,
          date: new Date(now - 86400000).toISOString()
        },
        {
          id:"r2", rating:5, type:"worker",
          reviewer:"Rahul Sharma", reviewerInitials:"RS", reviewerRole:"Poster · Sector 45",
          gigTitle:"Delivery — Sector 45 to Cyber City",
          text:"Super fast delivery! Package arrived in perfect condition. Rahul was very communicative throughout and kept me updated at every step. Highly recommended.",
          skills:["Fast","Reliable","Communicative"],
          helpful:5, helpedByMe:false,
          date: new Date(now - 172800000).toISOString()
        },
        {
          id:"r3", rating:4, type:"worker",
          reviewer:"Sneha T.", reviewerInitials:"ST", reviewerRole:"Poster · Sector 29",
          gigTitle:"Data Entry Task — 200 Records",
          text:"Good work overall. Data was entered accurately with zero errors. Took slightly longer than expected but quality was excellent. Would hire again for similar tasks.",
          skills:["Accurate","Detail Oriented"],
          helpful:3, helpedByMe:false,
          date: new Date(now - 259200000).toISOString()
        },
        {
          id:"r4", rating:5, type:"poster",
          reviewer:"Amit Kumar", reviewerInitials:"AK", reviewerRole:"Worker · Gurugram",
          gigTitle:"Photography — Product Shoot",
          text:"Great poster! Very clear instructions, payment released immediately after completion. Professional communication and fair pay. Would love to work with again.",
          skills:["Fair Pay","Clear Instructions","Fast Payment"],
          helpful:6, helpedByMe:false,
          date: new Date(now - 345600000).toISOString()
        },
        {
          id:"r5", rating:4, type:"worker",
          reviewer:"Vikram S.", reviewerInitials:"VS", reviewerRole:"Poster · MG Road",
          gigTitle:"Event Setup — Corporate Event",
          text:"Worked very hard throughout the 6-hour event. Helped with setup, managed tables and assisted guests politely. Minor issue with timing at start but resolved quickly.",
          skills:["Hard Working","Team Player","Polite"],
          helpful:2, helpedByMe:false,
          date: new Date(now - 432000000).toISOString()
        },
        {
          id:"r6", rating:3, type:"worker",
          reviewer:"Neha G.", reviewerInitials:"NG", reviewerRole:"Poster · Sohna Road",
          gigTitle:"Tutoring — Class 10 Maths",
          text:"Teaching was okay. Explained concepts clearly but was late on two occasions. Students found the sessions helpful overall. Needs to improve punctuality.",
          skills:["Knowledgeable"],
          helpful:1, helpedByMe:false,
          date: new Date(now - 518400000).toISOString()
        }
      ]);
    })();

    /* ── Helpers ── */
    function escH(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
    function starsHtml(n) {
      var s = "";
      for (var i = 1; i <= 5; i++) s += i <= n ? "⭐" : "☆";
      return s;
    }
    function timeAgo(iso) {
      var d = Math.floor((Date.now() - new Date(iso).getTime()) / 86400000);
      if (d === 0) return "Today";
      if (d === 1) return "Yesterday";
      if (d < 30)  return d + " days ago";
      if (d < 365) return Math.floor(d/30) + " months ago";
      return Math.floor(d/365) + " year ago";
    }

    /* ── Compute stats ── */
    function computeStats(reviews) {
      if (!reviews.length) return { avg:0, total:0, dist:{5:0,4:0,3:0,2:0,1:0}, worker:0, poster:0, helpful:0 };
      var dist = {5:0,4:0,3:0,2:0,1:0};
      var sum  = 0, worker = 0, poster = 0, helpful = 0;
      reviews.forEach(function(r) {
        sum += r.rating;
        dist[r.rating] = (dist[r.rating]||0) + 1;
        if (r.type === "worker") worker++;
        else poster++;
        helpful += (r.helpful||0);
      });
      return {
        avg:    (sum / reviews.length).toFixed(1),
        total:  reviews.length,
        dist:   dist,
        worker: worker,
        poster: poster,
        helpful:helpful
      };
    }

    /* ── Render profile card ── */
    function renderProfile() {
      var initials = (user.name || "U").split(" ").map(function(w){ return w[0]; }).join("").toUpperCase().slice(0,2);
      document.getElementById("profileCard").innerHTML =
        '<div class="profile-avatar">' + initials + '</div>' +
        '<div class="profile-info">' +
          '<div class="profile-name">' + escH(user.name || "My Profile") + '</div>' +
          '<div class="profile-role">📍 Gurugram, Haryana · GigLega Member</div>' +
          '<div class="profile-badges">' +
            '<span class="profile-badge badge-verified">✅ Verified</span>' +
            '<span class="profile-badge badge-top">🏆 Top Rated</span>' +
            '<span class="profile-badge badge-new">⚡ Active</span>' +
          '</div>' +
        '</div>' +
        (isOwnPage ? '<a href="profile.html" class="btn btn-sm btn-outline">Edit Profile →</a>' : '');
    }

    /* ── Render rating hero ── */
    function renderRatingHero(stats) {
      var total = stats.total || 1;
      var bars  = [5,4,3,2,1].map(function(n) {
        var pct = Math.round(((stats.dist[n]||0) / total) * 100);
        return '<div class="breakdown-row">' +
          '<div class="breakdown-label">' + n + '★</div>' +
          '<div class="breakdown-bar-wrap"><div class="breakdown-bar-fill" style="width:' + pct + '%"></div></div>' +
          '<div class="breakdown-count">' + (stats.dist[n]||0) + '</div>' +
        '</div>';
      }).join("");

      document.getElementById("ratingHero").innerHTML =
        '<div class="rating-big">' +
          '<div class="rating-number">' + stats.avg + '</div>' +
          '<div class="rating-stars-big">' + starsHtml(Math.round(stats.avg)) + '</div>' +
          '<div class="rating-total">' + stats.total + ' review' + (stats.total !== 1 ? "s" : "") + '</div>' +
        '</div>' +
        '<div class="rating-breakdown">' + bars + '</div>';
    }

    /* ── Render stats row ── */
    function renderStats(stats) {
      document.getElementById("statsRow").innerHTML =
        '<div class="stat-card"><span class="stat-icon">⭐</span><div class="stat-val green">' + stats.avg + '</div><div class="stat-lbl">Avg Rating</div></div>' +
        '<div class="stat-card"><span class="stat-icon">📋</span><div class="stat-val">'       + stats.total  + '</div><div class="stat-lbl">Total Reviews</div></div>' +
        '<div class="stat-card"><span class="stat-icon">🔧</span><div class="stat-val">'       + stats.worker + '</div><div class="stat-lbl">As Worker</div></div>' +
        '<div class="stat-card"><span class="stat-icon">📢</span><div class="stat-val">'       + stats.poster + '</div><div class="stat-lbl">As Poster</div></div>' +
        '<div class="stat-card"><span class="stat-icon">👍</span><div class="stat-val amber">' + stats.helpful+ '</div><div class="stat-lbl">Helpful Votes</div></div>';
    }

    /* ── Render write form (only own page) ── */
    var selectedStars  = 0;
    var selectedSkills = [];

    function renderWriteCard() {
      if (!isOwnPage) {
        /* On other user's page — show write form */
        document.getElementById("writeCard").innerHTML =
          '<div class="write-card-header" id="writeToggle">✍️ Write a Review <span id="writeArrow">▼</span></div>' +
          '<div class="write-card-body" id="writeBody">' +
            '<div style="margin-bottom:14px;font-size:.84rem;color:var(--gray-500)">Share your experience working with this person.</div>' +
            '<div class="form-field"><label>Your Rating <span style="color:var(--danger)">*</span></label>' +
              '<div class="star-picker" id="starPicker">' +
                [1,2,3,4,5].map(function(n){ return '<button class="star-pick" data-star="' + n + '">★</button>'; }).join("") +
              '</div>' +
            '</div>' +
            '<div class="form-field"><label>Gig Title</label><input type="text" id="reviewGig" placeholder="Which gig was this for?" /></div>' +
            '<div class="form-field"><label>Your Review <span style="color:var(--danger)">*</span></label><textarea id="reviewText" maxlength="500" placeholder="Describe your experience honestly..."></textarea><div class="char-count" id="reviewCharCount">0/500</div></div>' +
            '<div class="form-field"><label>Skills Demonstrated</label>' +
              '<div class="skill-selector" id="skillSelector">' +
                ["Punctual","Reliable","Professional","Hard Working","Communicative","Fast","Accurate","Creative","Team Player","Polite"].map(function(s){
                  return '<button class="skill-opt" data-skill="' + s + '">' + s + '</button>';
                }).join("") +
              '</div>' +
            '</div>' +
            '<div class="form-field"><label>Review Type</label><select id="reviewType"><option value="worker">As Worker (they worked for me)</option><option value="poster">As Poster (I worked for them)</option></select></div>' +
            '<button class="btn-submit-review" id="btnSubmitReview" disabled>Submit Review</button>' +
          '</div>';
        bindWriteForm();
      } else {
        document.getElementById("writeCard").style.display = "none";
      }
    }

    function bindWriteForm() {
      /* Toggle open/close */
      document.getElementById("writeToggle").addEventListener("click", function() {
        var body  = document.getElementById("writeBody");
        var arrow = document.getElementById("writeArrow");
        body.classList.toggle("open");
        arrow.textContent = body.classList.contains("open") ? "▲" : "▼";
      });

      /* Star picker */
      document.getElementById("starPicker").addEventListener("click", function(e) {
        var btn = e.target.closest(".star-pick");
        if (!btn) return;
        selectedStars = parseInt(btn.dataset.star);
        document.querySelectorAll(".star-pick").forEach(function(b, i) {
          b.classList.toggle("active", i < selectedStars);
        });
        checkSubmit();
      });

      /* Char counter */
      document.getElementById("reviewText").addEventListener("input", function() {
        var len = this.value.length;
        document.getElementById("reviewCharCount").textContent = len + "/500";
        checkSubmit();
      });

      /* Skill selector */
      document.getElementById("skillSelector").addEventListener("click", function(e) {
        var btn = e.target.closest(".skill-opt");
        if (!btn) return;
        var skill = btn.dataset.skill;
        if (selectedSkills.includes(skill)) {
          selectedSkills = selectedSkills.filter(function(s){ return s !== skill; });
          btn.classList.remove("selected");
        } else if (selectedSkills.length < 5) {
          selectedSkills.push(skill);
          btn.classList.add("selected");
        }
      });

      /* Submit check */
      function checkSubmit() {
        var txt = (document.getElementById("reviewText").value || "").trim();
        document.getElementById("btnSubmitReview").disabled = !(selectedStars > 0 && txt.length >= 10);
      }

      /* Submit */
      document.getElementById("btnSubmitReview").addEventListener("click", function() {
        var text = document.getElementById("reviewText").value.trim();
        var gig  = document.getElementById("reviewGig").value.trim();
        var type = document.getElementById("reviewType").value;
        var btn  = this;

        btn.disabled    = true;
        btn.textContent = "⏳ Submitting...";

        var initials = (user.name || "U").split(" ").map(function(w){ return w[0]; }).join("").toUpperCase().slice(0,2);
        var review = {
          id:               "r_" + Date.now(),
          rating:           selectedStars,
          type:             type,
          reviewer:         user.name || "Anonymous",
          reviewerInitials: initials,
          reviewerRole:     "GigLega User",
          gigTitle:         gig || "Gig on GigLega",
          text:             text,
          skills:           selectedSkills.slice(),
          helpful:          0,
          helpedByMe:       false,
          date:             new Date().toISOString()
        };

        setTimeout(function() {
          var reviews = getReviews();
          reviews.unshift(review);
          saveReviews(reviews);
          btn.textContent = "Submit Review";
          document.getElementById("writeBody").classList.remove("open");
          document.getElementById("writeArrow").textContent = "▼";
          selectedStars  = 0;
          selectedSkills = [];
          document.getElementById("reviewText").value = "";
          document.getElementById("reviewGig").value  = "";
          document.querySelectorAll(".star-pick").forEach(function(b){ b.classList.remove("active"); });
          document.querySelectorAll(".skill-opt").forEach(function(b){ b.classList.remove("selected"); });
          render();
          if (typeof showToast === "function") showToast("✅ Review submitted! Thank you.", "success");
        }, 800);
      });
    }

    /* ── Render review list ── */
    var currentFilter = "all";
    var currentSort   = "newest";
    var showCount     = 5;

    function applyFilterSort(reviews) {
      var filtered = reviews.filter(function(r) {
        if (currentFilter === "all")    return true;
        if (currentFilter === "worker") return r.type === "worker";
        if (currentFilter === "poster") return r.type === "poster";
        return r.rating === parseInt(currentFilter);
      });
      filtered.sort(function(a, b) {
        if (currentSort === "newest")  return new Date(b.date) - new Date(a.date);
        if (currentSort === "highest") return b.rating - a.rating;
        if (currentSort === "lowest")  return a.rating - b.rating;
        if (currentSort === "helpful") return (b.helpful||0) - (a.helpful||0);
        return 0;
      });
      return filtered;
    }

    function renderReviews(reviews) {
      var list     = document.getElementById("reviewList");
      var filtered = applyFilterSort(reviews);
      var visible  = filtered.slice(0, showCount);
      var loadMore = document.getElementById("btnLoadMore");

      if (!filtered.length) {
        list.innerHTML =
          '<div class="reviews-empty"><span class="ei">⭐</span><h3>No reviews yet</h3><p>Reviews will appear here after completing gigs.</p></div>';
        loadMore.style.display = "none";
        return;
      }

      list.innerHTML = visible.map(function(r) {
        var skillTags = (r.skills||[]).map(function(s){ return '<span class="skill-tag">' + escH(s) + '</span>'; }).join("");
        var isLong    = (r.text||"").length > 180;

        return '<div class="review-card' + (r.rating === 5 ? " highlighted" : "") + '" data-id="' + r.id + '">' +
          '<div class="review-head">' +
            '<div class="reviewer-info">' +
              '<div class="reviewer-avatar" style="background:' + avatarColor(r.reviewerInitials) + '">' + escH(r.reviewerInitials||"?") + '</div>' +
              '<div>' +
                '<div class="reviewer-name">' + escH(r.reviewer) + '</div>' +
                '<div class="reviewer-role">' + escH(r.reviewerRole||"") + '</div>' +
              '</div>' +
            '</div>' +
            '<div style="text-align:right">' +
              '<div class="star-row">' +
                '<span class="stars">' + starsHtml(r.rating) + '</span>' +
                '<span class="star-num">' + r.rating + '.0</span>' +
              '</div>' +
              '<div class="review-date">' + timeAgo(r.date) + '</div>' +
            '</div>' +
          '</div>' +
          '<div class="review-gig-tag">📋 ' + escH(r.gigTitle||"Gig on GigLega") + '</div>' +
          '<div class="review-text' + (isLong ? " collapsed" : "") + '" id="rt_' + r.id + '">' + escH(r.text) + '</div>' +
          (isLong ? '<button class="btn-read-more" data-id="' + r.id + '">Read more ▼</button>' : '') +
          (skillTags ? '<div class="skill-tags">' + skillTags + '</div>' : '') +
          '<div class="review-foot">' +
            '<div class="helpful-row">' +
              'Helpful? ' +
              '<button class="btn-helpful' + (r.helpedByMe ? " active" : "") + '" data-helpful="' + r.id + '">👍 ' + (r.helpful||0) + '</button>' +
            '</div>' +
            '<span class="review-type-badge ' + (r.type==="worker" ? "type-worker" : "type-poster") + '">' +
              (r.type === "worker" ? "🔧 Worker" : "📢 Poster") +
            '</span>' +
          '</div>' +
        '</div>';
      }).join("");

      loadMore.style.display = filtered.length > showCount ? "block" : "none";
      loadMore.textContent   = "Load More (" + (filtered.length - showCount) + " remaining)";
      bindReviewActions();
    }

    function avatarColor(initials) {
      var colors = ["#1a3c5e","#0d9488","#7c3aed","#db2777","#ea580c","#16a34a","#2563eb"];
      var idx    = (initials || "A").charCodeAt(0) % colors.length;
      return colors[idx];
    }

    function bindReviewActions() {
      /* Read more */
      document.querySelectorAll(".btn-read-more").forEach(function(btn) {
        btn.addEventListener("click", function() {
          var el = document.getElementById("rt_" + btn.dataset.id);
          el.classList.toggle("collapsed");
          btn.textContent = el.classList.contains("collapsed") ? "Read more ▼" : "Show less ▲";
        });
      });

      /* Helpful */
      document.querySelectorAll(".btn-helpful").forEach(function(btn) {
        btn.addEventListener("click", function() {
          var id      = btn.dataset.helpful;
          var reviews = getReviews();
          var r       = reviews.find(function(x){ return x.id === id; });
          if (!r) return;
          if (r.helpedByMe) {
            r.helpful--;
            r.helpedByMe = false;
          } else {
            r.helpful++;
            r.helpedByMe = true;
          }
          saveReviews(reviews);
          render();
        });
      });
    }

    /* ── Filter & sort bindings ── */
    document.getElementById("filterChips").addEventListener("click", function(e) {
      var chip = e.target.closest(".chip");
      if (!chip) return;
      currentFilter = chip.dataset.filter;
      showCount     = 5;
      document.querySelectorAll(".chip").forEach(function(c){ c.classList.remove("active"); });
      chip.classList.add("active");
      render();
    });

    document.getElementById("sortSelect").addEventListener("change", function() {
      currentSort = this.value;
      render();
    });

    /* ── Load more ── */
    document.getElementById("btnLoadMore").addEventListener("click", function() {
      showCount += 5;
      render();
    });

    /* ── Main render ── */
    function render() {
      var reviews = getReviews();
      var stats   = computeStats(reviews);
      renderProfile();
      renderRatingHero(stats);
      renderStats(stats);
      renderWriteCard();
      renderReviews(reviews);
    }

    render();

  })();
  </script>

</body>
</html>
