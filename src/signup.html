<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up - GigLega Beta</title>
    <link rel="stylesheet" href="./styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      .signup-container {
        max-width: 600px;
        margin: 60px auto;
        background: white;
        padding: 40px;
        border-radius: 14px;
        box-shadow: 0 4px 25px rgba(0, 0, 0, 0.1);
      }
      .signup-title {
        font-size: 32px;
        font-weight: 800;
        color: var(--color-primary);
        margin-bottom: 8px;
        text-align: center;
      }
      .signup-subtitle {
        font-size: 15px;
        color: #666;
        text-align: center;
        margin-bottom: 32px;
      }
      .form-group {
        margin-bottom: 20px;
      }
      .form-group label {
        display: block;
        font-weight: 600;
        margin-bottom: 8px;
        color: var(--color-primary);
      }
      .form-control {
        width: 100%;
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-family: inherit;
      }

      .role-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 12px;
        margin-top: 8px;
      }
      .role-card {
        border: 2px solid #eee;
        padding: 16px;
        border-radius: 10px;
        cursor: pointer;
        transition: all 0.2s;
        position: relative;
      }
      .role-card:hover {
        border-color: var(--color-secondary);
        background: var(--color-card-remote);
      }
      .role-card input {
        position: absolute;
        opacity: 0;
      }
      .role-card.selected {
        border-color: var(--color-secondary);
        background: var(--color-card-remote);
      }
      .role-name {
        font-weight: 700;
        color: var(--color-primary);
        display: block;
        margin-bottom: 2px;
      }
      .role-desc {
        font-size: 13px;
        color: #666;
      }
    </style>
  </head>
  <body style="background: var(--color-bg)">
    <!-- Beta Banner -->
    <div class="beta-banner">
      🚀 GigLega Beta ab Gurugram mein Live hai! Pehle 100 users mein shaamil ho
      jao — Join Karo, Free Hai!
    </div>

    <div class="signup-container">
      <div style="text-align: center; margin-bottom: 24px">
        <svg
          width="60"
          height="60"
          viewBox="0 0 100 100"
          xmlns="http://www.w3.org/2000/svg"
        >
          <defs>
            <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color: #0d2157; stop-opacity: 1" />
              <stop
                offset="100%"
                style="stop-color: #00b4a6; stop-opacity: 1"
              />
            </linearGradient>
          </defs>
          <circle cx="50" cy="50" r="48" fill="url(#logoGrad)" />
          <text
            x="50"
            y="62"
            font-family="Poppins, sans-serif"
            font-size="38"
            font-weight="800"
            fill="white"
            text-anchor="middle"
          >
            GL
          </text>
        </svg>
      </div>

      <h1 class="signup-title">Join GigLega</h1>
      <p class="signup-subtitle">Bharat ke badalte kaam ka naya thikana.</p>

      <form id="signupForm">
        <div class="form-group">
          <label>Full Name</label>
          <input
            type="text"
            class="form-control"
            placeholder="Aapka Naam"
            required
          />
        </div>

        <div class="form-group">
          <label>Phone Number</label>
          <input
            type="tel"
            class="form-control"
            placeholder="+91 00000-00000"
            required
          />
        </div>

        <div class="form-group">
          <label>Email Address</label>
          <input
            type="email"
            class="form-control"
            placeholder="example@gmail.com"
            required
          />
        </div>

        <div class="form-group">
          <label>Main kaun hoon? (Select your role)</label>
          <div class="role-grid">
            <label class="role-card" id="role-freelancer">
              <input type="radio" name="role" value="freelancer" required />
              <span class="role-name">💻 Freelancer</span>
              <span class="role-desc"
                >Main online/remotely kaam karta hoon (design, coding, writing,
                etc.)</span
              >
            </label>
            <label class="role-card" id="role-gigworker">
              <input type="radio" name="role" value="gigworker" />
              <span class="role-name">🛵 Gig Worker</span>
              <span class="role-desc"
                >Main apne area mein local kaam karta hoon (delivery, cleaning,
                tutoring, etc.)</span
              >
            </label>
            <label class="role-card" id="role-client">
              <input type="radio" name="role" value="client" />
              <span class="role-name">🤝 Client / Hirer</span>
              <span class="role-desc"
                >Mujhe kisi ko hire karna hai ya kaam karwana hai</span
              >
            </label>
          </div>
        </div>

        <div class="form-group">
          <label>Password</label>
          <input
            type="password"
            class="form-control"
            placeholder="Min. 8 characters"
            required
          />
        </div>

        <button
          type="submit"
          class="btn btn-primary"
          style="width: 100%; padding: 16px; font-size: 18px; margin-top: 10px"
        >
          Account Banao — Free Hai!
        </button>
      </form>

      <div
        style="
          text-align: center;
          margin-top: 24px;
          font-size: 14px;
          color: #666;
        "
      >
        Pehle se account hai?
        <a
          href="login.html"
          style="color: var(--color-secondary); font-weight: 600"
          >Login Karein</a
        >
      </div>
    </div>

    <script>
      // Visual selection for role cards
      const roleCards = document.querySelectorAll(".role-card");
      roleCards.forEach((card) => {
        card.addEventListener("click", () => {
          roleCards.forEach((c) => c.classList.remove("selected"));
          card.classList.add("selected");
        });
      });

      document.getElementById("signupForm").addEventListener("submit", (e) => {
        e.preventDefault();
        alert("Aapka account ban gaya hai! Namaste to GigLega.");
        window.location.href = "index.html";
      });
    </script>
  </body>
</html>
