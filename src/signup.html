<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Register on GigLega - Gurugram's hyperlocal gig platform. Join free to post gigs or find work near you in Gurugram NCR." />
  <meta name="robots" content="noindex, nofollow" />
  <title>Redirecting… | GigLega</title>
  <script>
    (function () {
      var q = new URLSearchParams(window.location.search || '');
      var h = new URLSearchParams((window.location.hash || '').replace(/^#/, ''));
      h.forEach(function (v, k) { if (!q.has(k)) q.set(k, v); });
      if (!q.get('mode')) q.set('mode', 'register');
      var target = 'login.html#' + q.toString();
      window.location.replace(target);
    })();
  </script>
</head>
<body>
  <p>Redirecting to registration…</p>
</body>
